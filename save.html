
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Ghost | Backup</title>
<style>
@font-face{font-family:gs;src:url("/assets/ghostincimgs/GoogleSans-Regular.ttf") format("truetype");font-display:swap}
*{box-sizing:border-box;font-family:gs,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100dvh;overflow:hidden;background:#fff;color:#111}
body{display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:20px 18px env(safe-area-inset-bottom,18px)}
.logo{width:30px;height:30px;opacity:.9}
.head{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:4px}
.title{font-size:18px;font-weight:600;letter-spacing:-.2px}
.sub{font-size:11px;color:#888}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px}
.tile{aspect-ratio:1/1;border:1px solid #ececec;border-radius:14px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:transform .12s ease,background .12s ease,border-color .12s ease}
.tile:active{transform:scale(.96);background:#fafafa}
.tile svg{width:26px;height:26px;stroke:#111;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.tile span{font-size:11px;color:#333;font-weight:500}
.tile.dark{background:#000;border-color:#000}
.tile.dark svg{stroke:#fff}
.tile.dark span{color:#fff}
.tile.muted span{color:#666}
.tile.danger svg{stroke:#d11}
.tile.danger span{color:#d11}
.file{display:none}
.loaded{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:#22c55e;display:none}
.tile{position:relative}
.tile.has-file .loaded{display:block}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);background:#000;color:#fff;font-size:12px;padding:9px 14px;border-radius:999px;opacity:0;pointer-events:none;transition:all .22s ease}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="head">
<img class="logo" src="/assets/ghostincimgs/ghost_dark_logo.svg" alt="">
<div class="title">Backup</div>
<div class="sub">Manage your Ghost data</div>
</div>

<div class="grid">

<div class="tile dark" id="exportFull" title="Download full backup">
<svg viewBox="0 0 24 24"><path d="M12 4v12"/><path d="M6 12l6 6 6-6"/><path d="M5 20h14"/></svg>
<span>Export</span>
</div>

<label class="tile" id="importTile" for="importFile" title="Load backup file">
<svg viewBox="0 0 24 24"><path d="M12 20V8"/><path d="M6 14l6-6 6 6"/><path d="M5 4h14"/></svg>
<span>Import</span>
<div class="loaded"></div>
</label>
<input type="file" id="importFile" class="file" accept=".json,.ghost">

<div class="tile" id="restoreAll" title="Restore everything">
<svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
<span>Restore All</span>
</div>

<div class="tile muted" id="restoreStorage" title="Restore localStorage">
<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="6" rx="1"/><rect x="3" y="14" width="18" height="6" rx="1"/><path d="M7 7h.01"/><path d="M7 17h.01"/></svg>
<span>Storage</span>
</div>

<div class="tile muted" id="restoreCookies" title="Restore cookies">
<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10 5 5 0 0 1-5-5 5 5 0 0 1-5-5z"/><circle cx="9" cy="11" r=".8"/><circle cx="14" cy="14" r=".8"/><circle cx="10" cy="16" r=".8"/></svg>
<span>Cookies</span>
</div>

<div class="tile danger" id="wipeAll" title="Factory reset">
<svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>
<span>Reset</span>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
const toast=(m)=>{const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove("show"),2200)};

async function exportIndexedDB(){
  if(!indexedDB.databases)return{};
  const dbs=await indexedDB.databases();const result={};
  for(const i of dbs){try{
    const db=await new Promise(r=>{const q=indexedDB.open(i.name);q.onsuccess=()=>r(q.result);q.onerror=()=>r(null)});
    if(!db)continue;result[i.name]={};
    for(const s of db.objectStoreNames){
      const tx=db.transaction(s,"readonly");const st=tx.objectStore(s);
      result[i.name][s]=await new Promise(r=>{const q=st.getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>r([])});
    }
  }catch(e){}}
  return result;
}

const BackupSystem={
  version:"3.0",
  async generate(){
    return{meta:{version:this.version,site:location.origin,exportedAt:new Date().toISOString()},
      localStorage:{...localStorage},sessionStorage:{...sessionStorage},
      cookies:document.cookie.split("; ").filter(Boolean).map(c=>{const[n,...r]=c.split("=");return{name:n,value:r.join("="),path:"/"}}),
      indexedDB:await exportIndexedDB()};
  },
  async download(){
    toast("Preparing...");
    const data=await this.generate();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`ghost-backup-${Date.now()}.ghost`;a.click();URL.revokeObjectURL(url);
    toast("Backup downloaded");
  },
  readFile(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{try{res(JSON.parse(r.result))}catch{rej()}};r.onerror=rej;r.readAsText(f)})},
  validate(d){if(!d.meta||!d.localStorage||!d.cookies)throw new Error("bad")},
  restoreStorage(d){localStorage.clear();Object.entries(d.localStorage).forEach(([k,v])=>localStorage.setItem(k,v))},
  restoreSession(d){if(!d.sessionStorage)return;sessionStorage.clear();Object.entries(d.sessionStorage).forEach(([k,v])=>sessionStorage.setItem(k,v))},
  restoreCookies(d){d.cookies.forEach(c=>{document.cookie=`${c.name}=${c.value};path=/`})},
  wipe(){localStorage.clear();sessionStorage.clear();document.cookie.split(";").forEach(c=>{const n=c.split("=")[0].trim();document.cookie=`${n}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/`})}
};

let importedData=null;
const importTile=document.getElementById("importTile");

document.getElementById("exportFull").onclick=()=>BackupSystem.download();

document.getElementById("importFile").onchange=async(e)=>{
  const f=e.target.files[0];if(!f)return;
  try{importedData=await BackupSystem.readFile(f);BackupSystem.validate(importedData);importTile.classList.add("has-file");toast("Backup loaded")}
  catch{importedData=null;importTile.classList.remove("has-file");toast("Invalid file")}
};

document.getElementById("restoreAll").onclick=()=>{
  if(!importedData)return toast("Import a backup first");
  if(!confirm("Restore EVERYTHING?"))return;
  BackupSystem.restoreStorage(importedData);BackupSystem.restoreSession(importedData);BackupSystem.restoreCookies(importedData);
  toast("Restoring...");setTimeout(()=>location.reload(),1100);
};

document.getElementById("restoreStorage").onclick=()=>{
  if(!importedData)return toast("Import a backup first");
  BackupSystem.restoreStorage(importedData);toast("Storage restored");
};

document.getElementById("restoreCookies").onclick=()=>{
  if(!importedData)return toast("Import a backup first");
  BackupSystem.restoreCookies(importedData);toast("Cookies restored");
};

document.getElementById("wipeAll").onclick=()=>{
  if(!confirm("Factory reset? This cannot be undone."))return;
  BackupSystem.wipe();toast("All data wiped");setTimeout(()=>location.reload(),1100);
};
</script>
</body>
</html>
