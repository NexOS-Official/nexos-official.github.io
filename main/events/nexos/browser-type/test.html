<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GIF Background Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .overlay {
    min-height: 100vh;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    color: white;
  }

  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
  }

  button {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #4CAF50;
    color: white;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }

  .gif {
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
  }

  .gif img {
    width: 100%;
    display: block;
  }
</style>
</head>

<body>

<div class="overlay">
  <h2>GIF Background Search</h2>

  <div class="search-bar">
    <input id="searchInput" placeholder="Search GIFs..." />
    <button onclick="searchGIFs()">Search</button>
  </div>

  <div class="grid" id="gifGrid"></div>
</div>

<script>
const API_KEY = "LIVDSRZULELA"; // Tenor public key

async function searchGIFs() {
  const query = document.getElementById("searchInput").value;
  const grid = document.getElementById("gifGrid");

  if (!query) return;

  grid.innerHTML = "Loading...";

  try {
    const res = await fetch(
      `https://tenor.googleapis.com/v2/search?q=${encodeURIComponent(query)}&key=${API_KEY}&limit=24`
    );

    const data = await res.json();
    grid.innerHTML = "";

    data.results.forEach(gif => {
      const url = gif.media_formats.gif.url;

      const div = document.createElement("div");
      div.className = "gif";

      const img = document.createElement("img");
      img.src = url;

      div.appendChild(img);

      div.onclick = () => {
        document.body.style.backgroundImage = `url(${url})`;
        localStorage.setItem("bg", url);
      };

      grid.appendChild(div);
    });

  } catch (err) {
    grid.innerHTML = "Failed 😭";
    console.error(err);
  }
}

// restore background
const saved = localStorage.getItem("bg");
if (saved) {
  document.body.style.backgroundImage = `url(${saved})`;
}
</script>

</body>
</html>
