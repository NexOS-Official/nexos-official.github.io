        // LRU Cache
        class LRUCache {
            constructor(capacity) {
                this.capacity = capacity;
                this.cache = new Map();
            }
            
            get(key) {
                if (!this.cache.has(key)) {
                    return undefined;
                }
                const value = this.cache.get(key);
                this.cache.delete(key);
                this.cache.set(key, value);
                return value;
            }
            
            set(key, value) {
                if (this.cache.has(key)) {
                    this.cache.delete(key);
                } else if (this.cache.size >= this.capacity) {
                    const firstKey = this.cache.keys().next().value;
                    this.cache.delete(firstKey);
                }
                this.cache.set(key, value);
            }
            
            has(key) {
                return this.cache.has(key);
            }
            
            delete(key) {
                return this.cache.delete(key);
            }
            
            clear() {
                this.cache.clear();
            }
            
            get size() {
                return this.cache.size;
            }
        }

        // Trie
        class TrieNode {
            constructor() {
                this.children = {};
                this.isEndOfWord = false;
            }
        }

        class Trie {
            constructor() {
                this.root = new TrieNode();
            }
            
            insert(word) {
                let current = this.root;
                for (const char of word) {
                    if (!current.children[char]) {
                        current.children[char] = new TrieNode();
                    }
                    current = current.children[char];
                }
                current.isEndOfWord = true;
            }
            
            search(word) {
                let current = this.root;
                for (const char of word) {
                    if (!current.children[char]) {
                        return false;
                    }
                    current = current.children[char];
                }
                return current.isEndOfWord;
            }
            
            startsWith(prefix) {
                let current = this.root;
                for (const char of prefix) {
                    if (!current.children[char]) {
                        return false;
                    }
                    current = current.children[char];
                }
                return true;
            }
            
            getWordsWithPrefix(prefix) {
                const words = [];
                let current = this.root;
                
                for (const char of prefix) {
                    if (!current.children[char]) {
                        return words;
                    }
                    current = current.children[char];
                }
                
                this._collectWords(current, prefix, words);
                return words;
            }
            
            _collectWords(node, prefix, words) {
                if (node.isEndOfWord) {
                    words.push(prefix);
                }
                for (const char in node.children) {
                    this._collectWords(node.children[char], prefix + char, words);
                }
            }
        }

        // Binary Search Tree
        class BSTNode {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }

        class BinarySearchTree {
            constructor() {
                this.root = null;
            }
            
            insert(value) {
                const newNode = new BSTNode(value);
                if (!this.root) {
                    this.root = newNode;
                    return this;
                }
                
                let current = this.root;
                while (true) {
                    if (value === current.value) return this;
                    if (value < current.value) {
                        if (!current.left) {
                            current.left = newNode;
                            return this;
                        }
                        current = current.left;
                    } else {
                        if (!current.right) {
                            current.right = newNode;
                            return this;
                        }
                        current = current.right;
                    }
                }
            }
            
            search(value) {
                let current = this.root;
                while (current) {
                    if (value === current.value) return true;
                    if (value < current.value) {
                        current = current.left;
                    } else {
                        current = current.right;
                    }
                }
                return false;
            }
            
            inOrder(callback) {
                const traverse = (node) => {
                    if (node) {
                        traverse(node.left);
                        callback(node.value);
                        traverse(node.right);
                    }
                };
                traverse(this.root);
            }
            
            preOrder(callback) {
                const traverse = (node) => {
                    if (node) {
                        callback(node.value);
                        traverse(node.left);
                        traverse(node.right);
                    }
                };
                traverse(this.root);
            }
            
            postOrder(callback) {
                const traverse = (node) => {
                    if (node) {
                        traverse(node.left);
                        traverse(node.right);
                        callback(node.value);
                    }
                };
                traverse(this.root);
            }
            
            min() {
                if (!this.root) return null;
                let current = this.root;
                while (current.left) {
                    current = current.left;
                }
                return current.value;
            }
            
            max() {
                if (!this.root) return null;
                let current = this.root;
                while (current.right) {
                    current = current.right;
                }
                return current.value;
            }
        }

        // Graph
        class Graph {
            constructor(directed = false) {
                this.adjacencyList = {};
                this.directed = directed;
            }
            
            addVertex(vertex) {
                if (!this.adjacencyList[vertex]) {
                    this.adjacencyList[vertex] = [];
                }
            }
            
            addEdge(vertex1, vertex2, weight = 1) {
                this.addVertex(vertex1);
                this.addVertex(vertex2);
                this.adjacencyList[vertex1].push({ node: vertex2, weight });
                if (!this.directed) {
                    this.adjacencyList[vertex2].push({ node: vertex1, weight });
                }
            }
            
            removeEdge(vertex1, vertex2) {
                this.adjacencyList[vertex1] = this.adjacencyList[vertex1].filter(
                    v => v.node !== vertex2
                );
                if (!this.directed) {
                    this.adjacencyList[vertex2] = this.adjacencyList[vertex2].filter(
                        v => v.node !== vertex1
                    );
                }
            }
            
            removeVertex(vertex) {
                while (this.adjacencyList[vertex]?.length) {
                    const adjacent = this.adjacencyList[vertex].pop();
                    this.removeEdge(vertex, adjacent.node);
                }
                delete this.adjacencyList[vertex];
            }
            
            bfs(start, callback) {
                const visited = new Set();
                const queue = [start];
                visited.add(start);
                
                while (queue.length) {
                    const vertex = queue.shift();
                    callback(vertex);
                    
                    for (const neighbor of this.adjacencyList[vertex] || []) {
                        if (!visited.has(neighbor.node)) {
                            visited.add(neighbor.node);
                            queue.push(neighbor.node);
                        }
                    }
                }
            }
            
            dfs(start, callback) {
                const visited = new Set();
                
                const traverse = (vertex) => {
                    visited.add(vertex);
                    callback(vertex);
                    
                    for (const neighbor of this.adjacencyList[vertex] || []) {
                        if (!visited.has(neighbor.node)) {
                            traverse(neighbor.node);
                        }
                    }
                };
                
                traverse(start);
            }
        }

        // Color utilities
        const Color = {
            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            },
            
            rgbToHex(r, g, b) {
                return '#' + [r, g, b].map(x => {
                    const hex = x.toString(16);
                    return hex.length === 1 ? '0' + hex : hex;
                }).join('');
            },
            
            lighten(hex, percent) {
                const rgb = this.hexToRgb(hex);
                if (!rgb) return hex;
                
                const r = Math.min(255, Math.round(rgb.r + (255 - rgb.r) * (percent / 100)));
                const g = Math.min(255, Math.round(rgb.g + (255 - rgb.g) * (percent / 100)));
                const b = Math.min(255, Math.round(rgb.b + (255 - rgb.b) * (percent / 100)));
                
                return this.rgbToHex(r, g, b);
            },
            
            darken(hex, percent) {
                const rgb = this.hexToRgb(hex);
                if (!rgb) return hex;
                
                const r = Math.max(0, Math.round(rgb.r * (1 - percent / 100)));
                const g = Math.max(0, Math.round(rgb.g * (1 - percent / 100)));
                const b = Math.max(0, Math.round(rgb.b * (1 - percent / 100)));
                
                return this.rgbToHex(r, g, b);
            },
            
            randomHex() {
                return '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
            }
        };

        // Date utilities
        const DateUtils = {
            format(date, formatStr) {
                const d = new Date(date);
                const pad = (num) => num.toString().padStart(2, '0');
                
                const replacements = {
                    'YYYY': d.getFullYear(),
                    'MM': pad(d.getMonth() + 1),
                    'DD': pad(d.getDate()),
                    'HH': pad(d.getHours()),
                    'mm': pad(d.getMinutes()),
                    'ss': pad(d.getSeconds())
                };
                
                return formatStr.replace(/YYYY|MM|DD|HH|mm|ss/g, match => replacements[match]);
            },
            
            addDays(date, days) {
                const result = new Date(date);
                result.setDate(result.getDate() + days);
                return result;
            },
            
            addMonths(date, months) {
                const result = new Date(date);
                result.setMonth(result.getMonth() + months);
                return result;
            },
            
            addYears(date, years) {
                const result = new Date(date);
                result.setFullYear(result.getFullYear() + years);
                return result;
            },
            
            diffInDays(date1, date2) {
                const diffTime = Math.abs(new Date(date2) - new Date(date1));
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            },
            
            isLeapYear(year) {
                return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
            },
            
            getDaysInMonth(year, month) {
                return new Date(year, month + 1, 0).getDate();
            },
            
            getWeekNumber(date) {
                const d = new Date(date);
                d.setHours(0, 0, 0, 0);
                d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                const yearStart = new Date(d.getFullYear(), 0, 1);
                return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
            },
            
            isWeekend(date) {
                const day = new Date(date).getDay();
                return day === 0 || day === 6;
            },
            
            relativeTime(date) {
                const now = new Date();
                const diff = now - new Date(date);
                const seconds = Math.floor(diff / 1000);
                const minutes = Math.floor(seconds / 60);
                const hours = Math.floor(minutes / 60);
                const days = Math.floor(hours / 24);
                const months = Math.floor(days / 30);
                const years = Math.floor(months / 12);
                
                if (years > 0) return `${years} year${years > 1 ? 's' : ''} ago`;
                if (months > 0) return `${months} month${months > 1 ? 's' : ''} ago`;
                if (days > 0) return `${days} day${days > 1 ? 's' : ''} ago`;
                if (hours > 0) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
                if (minutes > 0) return `${minutes} minute${minutes > 1 ? 's' : ''} ago`;
                return 'just now';
            }
        };

        // DOM utilities
        const DOM = {
            create(tag, attributes = {}, children = []) {
                const element = document.createElement(tag);
                Object.entries(attributes).forEach(([key, value]) => {
                    if (key === 'className') {
                        element.className = value;
                    } else if (key === 'style' && typeof value === 'object') {
                        Object.assign(element.style, value);
                    } else if (key.startsWith('on') && typeof value === 'function') {
                        element.addEventListener(key.slice(2).toLowerCase(), value);
                    } else {
                        element.setAttribute(key, value);
                    }
                });
                children.forEach(child => {
                    if (typeof child === 'string') {
                        element.appendChild(document.createTextNode(child));
                    } else if (child instanceof HTMLElement) {
                        element.appendChild(child);
                    }
                });

            query(selector, parent = document) {

            empty(element) {

            wrap(element, wrapper) {
                element.parentNode.insertBefore(wrapper, element);
                wrapper.appendChild(element);
            },
            
            unwrap(element) {
                const parent = element.parentNode;
                while (element.firstChild) {
                    parent.insertBefore(element.firstChild, element);

        };

        // Animation utilities
        const Animation = {
            fadeIn(element, duration = 300) {
                element.style.opacity = 0;
                element.style.display = '';
                
                const start = performance.now();
                
                const animate = (time) => {
                    const progress = Math.min((time - start) / duration, 1);
                    element.style.opacity = progress;
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    }
                };
                
                requestAnimationFrame(animate);
            },
            
            fadeOut(element, duration = 300) {
                const start = performance.now();
                
                const animate = (time) => {
                    const progress = Math.min((time - start) / duration, 1);
                    element.style.opacity = 1 - progress;
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        element.style.display = 'none';
                    }
                };
                
                requestAnimationFrame(animate);
            },
            
            slideDown(element, duration = 300) {
                element.style.overflow = 'hidden';
                element.style.height = 0;
                element.style.display = '';
                
                const height = element.scrollHeight;
                const start = performance.now();
                
                const animate = (time) => {
                    const progress = Math.min((time - start) / duration, 1);
                    element.style.height = `${height * progress}px`;
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        element.style.height = '';
                        element.style.overflow = '';
                    }
                };
                
                requestAnimationFrame(animate);
            },
            
            slideUp(element, duration = 300) {
                element.style.overflow = 'hidden';
                const height = element.offsetHeight;
                const start = performance.now();
                
                const animate = (time) => {
                    const progress = Math.min((time - start) / duration, 1);
                    element.style.height = `${height * (1 - progress)}px`;
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        element.style.display = 'none';
                        element.style.height = '';
                        element.style.overflow = '';
                    }
                };
                
                requestAnimationFrame(animate);
            }
        };

        // Validation utilities
        const Validate = {
            email(value) {

            url(value) {

            phone(value) {
                return /^\+?[\d\s\-()]+$/.test(value);

            creditCard(value) {
                const sanitized = value.replace(/\D/g, '');
                if (sanitized.length < 13 || sanitized.length > 19) return false;
                
                let sum = 0;
                let isEven = false;
                
                for (let i = sanitized.length - 1; i >= 0; i--) {
                    let digit = parseInt(sanitized[i], 10);
                    
                    if (isEven) {
                        digit *= 2;
                        if (digit > 9) digit -= 9;
                    }
                    
                    sum += digit;
                    isEven = !isEven;
                }
                
                return sum % 10 === 0;
            },
            
            minLength(value, length) {
                return value.length >= length;
            },
            
            maxLength(value, length) {
                return value.length <= length;
            },
            
            pattern(value, regex) {
                return regex.test(value);
            },
            
            required(value) {
                return value !== null && value !== undefined && value !== '';
            },
            
            numeric(value) {
                return !isNaN(parseFloat(value)) && isFinite(value);
            },
            
            integer(value) {
                return Number.isInteger(Number(value));
            },
            
            between(value, min, max) {
                const num = Number(value);
                return num >= min && num <= max;
            }
        };

        // HTTP utilities
        const HTTP = {
            async get(url, options = {}) {
                const response = await fetch(url, { ...options, method: 'GET' });
                return response.json();
            },
            
            async post(url, data, options = {}) {
                const response = await fetch(url, {
                    ...options,
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    body: JSON.stringify(data)
                });
                return response.json();
            },
            
            async put(url, data, options = {}) {
                const response = await fetch(url, {
                    ...options,
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    body: JSON.stringify(data)
                });
                return response.json();
            },
            
            async delete(url, options = {}) {
                const response = await fetch(url, { ...options, method: 'DELETE' });
                return response.json();
            }
        };
    </script>
