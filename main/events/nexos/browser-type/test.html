<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromeOS Web</title>
    <style>
        /* ============================================
           RESET AND BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Google Sans', 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ============================================
           CSS VARIABLES
           ============================================ */
        :root {
            --shelf-height: 48px;
            --shelf-bg: rgba(32, 33, 36, 0.85);
            --shelf-bg-light: rgba(255, 255, 255, 0.9);
            --launcher-bg: rgba(255, 255, 255, 0.95);
            --launcher-search-bg: rgba(241, 243, 244, 1);
            --app-icon-size: 48px;
            --app-icon-bg: #3c4043;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --accent-blue: #1a73e8;
            --border-radius: 8px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.2);
            --shadow-xl: 0 12px 48px rgba(0, 0, 0, 0.25);
        }

        /* ============================================
           DESKTOP CONTAINER
           ============================================ */
        #desktop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
        }

        /* Desktop area that adjusts based on shelf position */
        #desktop-area {
            position: absolute;
            display: flex;
            flex-direction: column;
            transition: all var(--transition-normal);
        }

        /* Shelf positions */
        .shelf-bottom #desktop-area {
            top: 0;
            left: 0;
            right: 0;
            bottom: var(--shelf-height);
        }

        .shelf-top #desktop-area {
            top: var(--shelf-height);
            left: 0;
            right: 0;
            bottom: 0;
        }

        .shelf-left #desktop-area {
            top: 0;
            left: var(--shelf-height);
            right: 0;
            bottom: 0;
        }

        .shelf-right #desktop-area {
            top: 0;
            left: 0;
            right: var(--shelf-height);
            bottom: 0;
        }

        /* ============================================
           SHELF (TASKBAR)
           ============================================ */
        #shelf {
            position: fixed;
            background: var(--shelf-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            transition: all var(--transition-normal);
        }

        /* Shelf positions */
        .shelf-bottom #shelf {
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--shelf-height);
            flex-direction: row;
            padding: 0 12px;
        }

        .shelf-top #shelf {
            top: 0;
            left: 0;
            right: 0;
            height: var(--shelf-height);
            flex-direction: row;
            padding: 0 12px;
        }

        .shelf-left #shelf {
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--shelf-height);
            flex-direction: column;
            padding: 12px 0;
        }

        .shelf-right #shelf {
            top: 0;
            right: 0;
            bottom: 0;
            width: var(--shelf-height);
            flex-direction: column;
            padding: 12px 0;
        }

        /* Shelf sections */
        .shelf-left-section,
        .shelf-right-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shelf-left #shelf .shelf-left-section,
        .shelf-left #shelf .shelf-right-section,
        .shelf-right #shelf .shelf-left-section,
        .shelf-right #shelf .shelf-right-section {
            flex-direction: column;
        }

        /* ============================================
           LAUNCHER BUTTON (BLACK CIRCLE)
           ============================================ */
        #launcher-button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #202124;
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #launcher-button:hover {
            background: #3c4043;
            transform: scale(1.1);
        }

        #launcher-button:active {
            transform: scale(0.95);
        }

        #launcher-button.active {
            background: #5f6368;
        }

        #launcher-button::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: transparent;
            transition: background var(--transition-fast);
        }

        #launcher-button.active::after {
            background: white;
        }

        /* ============================================
           SYSTEM TRAY
           ============================================ */
        #system-tray {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        #system-tray:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .shelf-left #system-tray,
        .shelf-right #system-tray {
            flex-direction: column;
            padding: 12px 6px;
            border-radius: 20px;
        }

        #clock {
            color: white;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .shelf-left #clock,
        .shelf-right #clock {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        .tray-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .shelf-left .tray-icons,
        .shelf-right .tray-icons {
            flex-direction: column;
        }

        .tray-icon {
            width: 18px;
            height: 18px;
            fill: white;
            opacity: 0.9;
        }

        /* ============================================
           APP LAUNCHER OVERLAY
           ============================================ */
        #launcher-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-slow);
            z-index: 2000;
        }

        #launcher-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        /* ============================================
           APP LAUNCHER PANEL
           ============================================ */
        #launcher {
            position: fixed;
            width: 560px;
            max-width: calc(100vw - 40px);
            height: 70vh;
            max-height: 600px;
            background: var(--launcher-bg);
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.95);
            transition: all var(--transition-slow);
            z-index: 2001;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Launcher positioning based on shelf */
        .shelf-bottom #launcher {
            bottom: calc(var(--shelf-height) + 16px);
            left: 20px;
        }

        .shelf-top #launcher {
            top: calc(var(--shelf-height) + 16px);
            left: 20px;
        }

        .shelf-left #launcher {
            left: calc(var(--shelf-height) + 16px);
            bottom: 20px;
        }

        .shelf-right #launcher {
            right: calc(var(--shelf-height) + 16px);
            bottom: 20px;
        }

        #launcher.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        /* ============================================
           LAUNCHER SEARCH
           ============================================ */
        #launcher-search-container {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        #launcher-search-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--launcher-search-bg);
            border-radius: 24px;
            padding: 10px 16px;
            transition: all var(--transition-fast);
        }

        #launcher-search-wrapper:focus-within {
            background: white;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
        }

        .search-icon {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
            flex-shrink: 0;
        }

        #launcher-search {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
        }

        #launcher-search::placeholder {
            color: var(--text-secondary);
        }

        .assistant-button {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4285f4, #34a853, #fbbc05, #ea4335);
            border: none;
            cursor: pointer;
            transition: transform var(--transition-fast);
        }

        .assistant-button:hover {
            transform: scale(1.1);
        }

        /* ============================================
           LAUNCHER APP GRID
           ============================================ */
        #launcher-apps {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            align-content: start;
        }

        #launcher-apps::-webkit-scrollbar {
            width: 8px;
        }

        #launcher-apps::-webkit-scrollbar-track {
            background: transparent;
        }

        #launcher-apps::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        /* ============================================
           APP ICON
           ============================================ */
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .app-item:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .app-item:active {
            transform: scale(0.95);
        }

        .app-item.hidden {
            display: none;
        }

        .app-icon {
            width: var(--app-icon-size);
            height: var(--app-icon-size);
            border-radius: 50%;
            background: var(--app-icon-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-fast);
            overflow: hidden;
        }

        .app-item:hover .app-icon {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-icon.chrome { background: linear-gradient(135deg, #4285f4, #34a853, #fbbc05, #ea4335); }
        .app-icon.files { background: #5f6368; }
        .app-icon.gmail { background: white; color: #ea4335; }
        .app-icon.youtube { background: #ff0000; }
        .app-icon.drive { background: linear-gradient(135deg, #4285f4, #0f9d58, #f4b400); }
        .app-icon.docs { background: #4285f4; }
        .app-icon.sheets { background: #0f9d58; }
        .app-icon.slides { background: #f4b400; }
        .app-icon.photos { background: linear-gradient(135deg, #4285f4, #fbbc05, #34a853, #ea4335); }
        .app-icon.calendar { background: #4285f4; }
        .app-icon.meet { background: #00897b; }
        .app-icon.chat { background: #1a73e8; }
        .app-icon.maps { background: #34a853; }
        .app-icon.play { background: linear-gradient(135deg, #4285f4, #0f9d58, #f4b400, #db4437); }
        .app-icon.settings { background: #5f6368; }
        .app-icon.calculator { background: #4285f4; }
        .app-icon.camera { background: #3c4043; }
        .app-icon.clock { background: #3c4043; }
        .app-icon.contacts { background: #1a73e8; }
        .app-icon.keep { background: #fbbc05; }
        .app-icon.news { background: #4285f4; }
        .app-icon.tasks { background: #1a73e8; }
        .app-icon.weather { background: #4fc3f7; }
        .app-icon.music { background: #ff5722; }
        .app-icon.podcast { background: #8e24aa; }
        .app-icon.books { background: #1a73e8; }
        .app-icon.canvas { background: #ea4335; }
        .app-icon.classroom { background: #0f9d58; }
        .app-icon.web-store { background: linear-gradient(135deg, #4285f4, #ea4335); }
        .app-icon.terminal { background: #263238; }
        .app-icon.linux { background: #f4b400; }
        .app-icon.android { background: #3ddc84; }

        .app-name {
            font-size: 12px;
            color: var(--text-primary);
            text-align: center;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ============================================
           CONTEXT MENU
           ============================================ */
        #context-menu {
            position: fixed;
            background: white;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            min-width: 200px;
            padding: 8px 0;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.95);
            transform-origin: top left;
            transition: all var(--transition-fast);
            z-index: 3000;
        }

        #context-menu.visible {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .context-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background var(--transition-fast);
            font-size: 13px;
            color: var(--text-primary);
        }

        .context-menu-item:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .context-menu-item svg {
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .context-menu-item.has-submenu {
            position: relative;
        }

        .context-menu-item.has-submenu::after {
            content: '';
            position: absolute;
            right: 12px;
            width: 6px;
            height: 6px;
            border-right: 2px solid var(--text-secondary);
            border-bottom: 2px solid var(--text-secondary);
            transform: rotate(-45deg);
        }

        .context-menu-divider {
            height: 1px;
            background: rgba(0, 0, 0, 0.1);
            margin: 8px 0;
        }

        /* Submenu */
        .submenu {
            position: absolute;
            left: 100%;
            top: 0;
            background: white;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            min-width: 160px;
            padding: 8px 0;
            opacity: 0;
            visibility: hidden;
            transform: translateX(-10px);
            transition: all var(--transition-fast);
        }

        .context-menu-item.has-submenu:hover .submenu {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        .submenu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background var(--transition-fast);
            font-size: 13px;
            color: var(--text-primary);
        }

        .submenu-item:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .submenu-item.active::before {
            content: '✓';
            margin-right: 8px;
            color: var(--accent-blue);
        }

        /* ============================================
           WALLPAPER PICKER MODAL
           ============================================ */
        #wallpaper-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-slow);
            z-index: 4000;
        }

        #wallpaper-modal.visible {
            opacity: 1;
            visibility: visible;
        }

        .wallpaper-modal-content {
            background: white;
            border-radius: 16px;
            width: 700px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 80px);
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            transform: scale(0.9);
            transition: transform var(--transition-slow);
        }

        #wallpaper-modal.visible .wallpaper-modal-content {
            transform: scale(1);
        }

        .wallpaper-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .wallpaper-modal-header h2 {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast);
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .modal-close svg {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
        }

        .wallpaper-modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }

        .wallpaper-section {
            margin-bottom: 24px;
        }

        .wallpaper-section h3 {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .wallpaper-item {
            aspect-ratio: 16/10;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: all var(--transition-fast);
            border: 3px solid transparent;
        }

        .wallpaper-item:hover {
            transform: scale(1.02);
        }

        .wallpaper-item.selected {
            border-color: var(--accent-blue);
        }

        .wallpaper-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .wallpaper-item.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: var(--accent-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        /* Custom wallpaper upload */
        .custom-wallpaper-upload {
            aspect-ratio: 16/10;
            border-radius: 12px;
            border: 2px dashed rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all var(--transition-fast);
            background: rgba(0, 0, 0, 0.02);
        }

        .custom-wallpaper-upload:hover {
            border-color: var(--accent-blue);
            background: rgba(26, 115, 232, 0.05);
        }

        .custom-wallpaper-upload svg {
            width: 32px;
            height: 32px;
            fill: var(--text-secondary);
        }

        .custom-wallpaper-upload span {
            font-size: 12px;
            color: var(--text-secondary);
        }

        #wallpaper-input {
            display: none;
        }

        /* ============================================
           WINDOW SYSTEM
           ============================================ */
        .window {
            position: absolute;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-xl);
            min-width: 400px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: box-shadow var(--transition-fast);
        }

        .window.focused {
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.3);
        }

        .window-header {
            height: 40px;
            background: #3c4043;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            cursor: move;
        }

        .window-title {
            color: white;
            font-size: 13px;
            font-weight: 500;
        }

        .window-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-control {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast);
        }

        .window-control:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .window-control svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        .window-content {
            flex: 1;
            overflow: auto;
            background: white;
        }

        /* ============================================
           NOTIFICATION TOAST
           ============================================ */
        #toast {
            position: fixed;
            bottom: calc(var(--shelf-height) + 20px);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #323232;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-slow);
            z-index: 5000;
        }

        #toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }

        /* ============================================
           SYSTEM TRAY PANEL
           ============================================ */
        #system-panel {
            position: fixed;
            width: 360px;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow-xl);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all var(--transition-slow);
            z-index: 2001;
        }

        .shelf-bottom #system-panel {
            bottom: calc(var(--shelf-height) + 12px);
            right: 12px;
        }

        .shelf-top #system-panel {
            top: calc(var(--shelf-height) + 12px);
            right: 12px;
        }

        .shelf-left #system-panel {
            bottom: 12px;
            left: calc(var(--shelf-height) + 12px);
        }

        .shelf-right #system-panel {
            bottom: 12px;
            right: calc(var(--shelf-height) + 12px);
        }

        #system-panel.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .system-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .system-panel-date {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .system-panel-settings {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast);
        }

        .system-panel-settings:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        .system-panel-settings svg {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
        }

        .system-panel-quick-settings {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .quick-setting {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .quick-setting:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .quick-setting.active {
            background: rgba(26, 115, 232, 0.1);
        }

        .quick-setting-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e8eaed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quick-setting.active .quick-setting-icon {
            background: var(--accent-blue);
        }

        .quick-setting-icon svg {
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .quick-setting.active .quick-setting-icon svg {
            fill: white;
        }

        .quick-setting-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .system-panel-sliders {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-row svg {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
            flex-shrink: 0;
        }

        .slider-row input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #e8eaed;
            border-radius: 2px;
            outline: none;
        }

        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-blue);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .system-panel-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .system-panel-footer button {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background: transparent;
            font-size: 13px;
            color: var(--accent-blue);
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .system-panel-footer button:hover {
            background: rgba(26, 115, 232, 0.1);
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ============================================
           RESPONSIVE STYLES
           ============================================ */
        @media (max-width: 768px) {
            #launcher {
                width: calc(100vw - 20px);
                left: 10px !important;
                right: 10px !important;
                height: 60vh;
            }

            #launcher-apps {
                grid-template-columns: repeat(4, 1fr);
            }

            .wallpaper-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            #system-panel {
                width: calc(100vw - 24px);
                left: 12px !important;
                right: 12px !important;
            }
        }

        @media (max-width: 480px) {
            #launcher-apps {
                grid-template-columns: repeat(3, 1fr);
            }

            .app-icon {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }

        /* ============================================
           LOADING SCREEN
           ============================================ */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #202124;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4285f4, #34a853, #fbbc05, #ea4335);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-logo svg {
            width: 48px;
            height: 48px;
            fill: white;
        }

        .loading-text {
            color: #9aa0a6;
            font-size: 14px;
            animation: pulse 1.5s infinite;
        }

        .loading-dots {
            display: flex;
            gap: 8px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #5f6368;
            animation: loadingDot 1.4s infinite ease-in-out;
        }

        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loadingDot {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ============================================
           LOCK SCREEN
           ============================================ */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9000;
        }

        #lock-screen.visible {
            display: flex;
        }

        .lock-time {
            font-size: 64px;
            font-weight: 300;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .lock-date {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 8px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        }

        .lock-unlock-hint {
            position: absolute;
            bottom: 60px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        /* ============================================
           ADDITIONAL UTILITY CLASSES
           ============================================ */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        .hidden {
            display: none !important;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============================================
           PRINT STYLES
           ============================================ */
        @media print {
            body * {
                visibility: hidden;
            }
        }
    </style>
</head>

        /* ============================================
           DOM ELEMENTS
           ============================================ */
        const elements = {
            desktop: document.getElementById('desktop'),
            desktopArea: document.getElementById('desktop-area'),
            shelf: document.getElementById('shelf'),
            launcherButton: document.getElementById('launcher-button'),
            launcher: document.getElementById('launcher'),
            launcherOverlay: document.getElementById('launcher-overlay'),
            launcherSearch: document.getElementById('launcher-search'),
            launcherApps: document.getElementById('launcher-apps'),
            contextMenu: document.getElementById('context-menu'),
            shelfPositionSubmenu: document.getElementById('shelf-position-submenu'),
            setWallpaperMenu: document.getElementById('set-wallpaper-menu'),
            wallpaperModal: document.getElementById('wallpaper-modal'),
            wallpaperModalClose: document.getElementById('wallpaper-modal-close'),
            wallpaperInput: document.getElementById('wallpaper-input'),
            customWallpaperUpload: document.getElementById('custom-wallpaper-upload'),
            wallpaperLandscapes: document.getElementById('wallpaper-landscapes'),
            wallpaperAbstract: document.getElementById('wallpaper-abstract'),
            wallpaperColors: document.getElementById('wallpaper-colors'),
            clock: document.getElementById('clock'),
            systemTray: document.getElementById('system-tray'),
            systemPanel: document.getElementById('system-panel'),
            systemDate: document.getElementById('system-date'),
            toast: document.getElementById('toast'),
            loadingScreen: document.getElementById('loading-screen'),
            brightnessSlider: document.getElementById('brightness-slider'),
            volumeSlider: document.getElementById('volume-slider')
        };

        /* ============================================
           INITIALIZATION
           ============================================ */
        function init() {
            // Apply saved state
            applyShelfPosition(state.shelfPosition);
            applyWallpaper(state.wallpaper);
            
            // Render apps
            renderApps();
            
            // Render wallpapers
            renderWallpapers();
            
            // Start clock
            updateClock();
            setInterval(updateClock, 1000);
            
            // Update date
            updateDate();
            
            // Attach event listeners
            attachEventListeners();
            
            // Hide loading screen after a delay
            setTimeout(() => {
                elements.loadingScreen.classList.add('hidden');
            }, 1500);
        }

        /* ============================================
           CLOCK AND DATE
           ============================================ */
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            hours = hours % 12;
            hours = hours ? hours : 12;
            elements.clock.textContent = `${hours}:${minutes} ${ampm}`;
        }

        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            elements.systemDate.textContent = now.toLocaleDateString('en-US', options);
        }

        /* ============================================
           SHELF POSITION
           ============================================ */
        function applyShelfPosition(position) {
            elements.desktop.className = `shelf-${position}`;
            state.shelfPosition = position;
            localStorage.setItem('shelfPosition', position);
            
            // Update submenu active state
            document.querySelectorAll('.submenu-item').forEach(item => {
                item.classList.toggle('active', item.dataset.position === position);
            });
        }

        /* ============================================
           WALLPAPER
           ============================================ */
        function applyWallpaper(wallpaper) {
            if (wallpaper.startsWith('#')) {
                elements.desktop.style.backgroundImage = 'none';
                elements.desktop.style.backgroundColor = wallpaper;
            } else {
                elements.desktop.style.backgroundColor = '#1a1a2e';
                elements.desktop.style.backgroundImage = `url('${wallpaper}')`;
            }
            state.wallpaper = wallpaper;
            localStorage.setItem('wallpaper', wallpaper);
            
            // Update selected wallpaper in modal
            document.querySelectorAll('.wallpaper-item').forEach(item => {
                item.classList.toggle('selected', item.dataset.wallpaper === wallpaper);
            });
        }

        function renderWallpapers() {
            // Landscapes
            elements.wallpaperLandscapes.innerHTML = state.wallpapers.landscapes.map(url => `
                <div class="wallpaper-item ${state.wallpaper === url ? 'selected' : ''}" data-wallpaper="${url}">
                    <img src="${url}" alt="Landscape wallpaper" loading="lazy">
                </div>
            `).join('');
            
            // Abstract
            elements.wallpaperAbstract.innerHTML = state.wallpapers.abstract.map(url => `
                <div class="wallpaper-item ${state.wallpaper === url ? 'selected' : ''}" data-wallpaper="${url}">
                    <img src="${url}" alt="Abstract wallpaper" loading="lazy">
                </div>
            `).join('');
            
            // Colors
            elements.wallpaperColors.innerHTML = state.wallpapers.colors.map(color => `
                <div class="wallpaper-item ${state.wallpaper === color ? 'selected' : ''}" data-wallpaper="${color}" style="background: ${color};">
                </div>
            `).join('');
        }

        /* ============================================
           APPS
           ============================================ */
        function renderApps() {
            elements.launcherApps.innerHTML = state.apps.map(app => `
                <div class="app-item" data-name="${app.name.toLowerCase()}">
                    <div class="app-icon ${app.icon}">${app.letter}</div>
                    <span class="app-name">${app.name}</span>
                </div>
            `).join('');
        }

        function filterApps(query) {
            const normalizedQuery = query.toLowerCase().trim();
            document.querySelectorAll('.app-item').forEach(item => {
                const name = item.dataset.name;
                item.classList.toggle('hidden', !name.includes(normalizedQuery));
            });
        }

        /* ============================================
           LAUNCHER
           ============================================ */
        function openLauncher() {
            state.launcherOpen = true;
            elements.launcher.classList.add('visible');
            elements.launcherOverlay.classList.add('visible');
            elements.launcherButton.classList.add('active');
            elements.launcherSearch.focus();
            closeContextMenu();
            closeSystemPanel();
        }

        function closeLauncher() {
            state.launcherOpen = false;
            elements.launcher.classList.remove('visible');
            elements.launcherOverlay.classList.remove('visible');
            elements.launcherButton.classList.remove('active');
            elements.launcherSearch.value = '';
            filterApps('');
        }

        function toggleLauncher() {
            if (state.launcherOpen) {
                closeLauncher();
            } else {
                openLauncher();
            }
        }

        /* ============================================
           CONTEXT MENU
           ============================================ */
        function openContextMenu(x, y) {
            state.contextMenuOpen = true;
            elements.contextMenu.classList.add('visible');
            
            // Position the menu
            const menuWidth = elements.contextMenu.offsetWidth;
            const menuHeight = elements.contextMenu.offsetHeight;
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // Adjust position if menu would go off screen
            if (x + menuWidth > windowWidth) {
                x = windowWidth - menuWidth - 10;
            }
            if (y + menuHeight > windowHeight) {
                y = windowHeight - menuHeight - 10;
            }
            
            elements.contextMenu.style.left = `${x}px`;
            elements.contextMenu.style.top = `${y}px`;
            
            closeLauncher();
            closeSystemPanel();
        }

        function closeContextMenu() {
            state.contextMenuOpen = false;
            elements.contextMenu.classList.remove('visible');
        }

        /* ============================================
           SYSTEM PANEL
           ============================================ */
        function openSystemPanel() {
            state.systemPanelOpen = true;
            elements.systemPanel.classList.add('visible');
            closeLauncher();
            closeContextMenu();
        }

        function closeSystemPanel() {
            state.systemPanelOpen = false;
            elements.systemPanel.classList.remove('visible');
        }

        function toggleSystemPanel() {
            if (state.systemPanelOpen) {
                closeSystemPanel();
            } else {
                openSystemPanel();
            }
        }

        /* ============================================
           WALLPAPER MODAL
           ============================================ */
        function openWallpaperModal() {
            state.wallpaperModalOpen = true;
            elements.wallpaperModal.classList.add('visible');
            closeContextMenu();
        }

        function closeWallpaperModal() {
            state.wallpaperModalOpen = false;
            elements.wallpaperModal.classList.remove('visible');
        }

        /* ============================================
           TOAST NOTIFICATIONS
           ============================================ */
        function showToast(message, duration = 3000) {
            elements.toast.textContent = message;
            elements.toast.classList.add('visible');
            
            setTimeout(() => {
                elements.toast.classList.remove('visible');
            }, duration);
        }

        /* ============================================
           EVENT LISTENERS
           ============================================ */
        function attachEventListeners() {
            // Launcher button
            elements.launcherButton.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleLauncher();
            });
            
            // Launcher overlay
            elements.launcherOverlay.addEventListener('click', closeLauncher);
            
            // Launcher search
            elements.launcherSearch.addEventListener('input', (e) => {
                filterApps(e.target.value);
            });
            
            // App click
            elements.launcherApps.addEventListener('click', (e) => {
                const appItem = e.target.closest('.app-item');
                if (appItem) {
                    const appName = appItem.querySelector('.app-name').textContent;
                    showToast(`Opening ${appName}...`);
                    closeLauncher();
                }
            });
            
            // Desktop right-click
            elements.desktop.addEventListener('contextmenu', (e) => {
                // Only show context menu if clicking on desktop area, not on other elements
                if (e.target === elements.desktop || e.target === elements.desktopArea) {
                    e.preventDefault();
                    openContextMenu(e.clientX, e.clientY);
                }
            });
            
            // Close context menu on click outside
            document.addEventListener('click', (e) => {
                if (!elements.contextMenu.contains(e.target)) {
                    closeContextMenu();
                }
            });
            
            // Shelf position submenu
            elements.shelfPositionSubmenu.addEventListener('click', (e) => {
                const item = e.target.closest('.submenu-item');
                if (item) {
                    applyShelfPosition(item.dataset.position);
                    showToast(`Shelf moved to ${item.dataset.position}`);
                    closeContextMenu();
                }
            });
            
            // Set wallpaper menu item
            elements.setWallpaperMenu.addEventListener('click', () => {
                openWallpaperModal();
            });
            
            // Wallpaper modal close
            elements.wallpaperModalClose.addEventListener('click', closeWallpaperModal);
            elements.wallpaperModal.addEventListener('click', (e) => {
                if (e.target === elements.wallpaperModal) {
                    closeWallpaperModal();
                }
            });
            
            // Wallpaper selection
            document.querySelectorAll('#wallpaper-landscapes, #wallpaper-abstract, #wallpaper-colors').forEach(container => {
                container.addEventListener('click', (e) => {
                    const item = e.target.closest('.wallpaper-item');
                    if (item) {
                        applyWallpaper(item.dataset.wallpaper);
                        showToast('Wallpaper changed');
                    }
                });
            });
            
            // Custom wallpaper upload
            elements.customWallpaperUpload.addEventListener('click', () => {
                elements.wallpaperInput.click();
            });
            
            elements.wallpaperInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        applyWallpaper(event.target.result);
                        showToast('Custom wallpaper applied');
                        closeWallpaperModal();
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // System tray click
            elements.systemTray.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleSystemPanel();
            });
            
            // Close system panel on click outside
            document.addEventListener('click', (e) => {
                if (!elements.systemPanel.contains(e.target) && !elements.systemTray.contains(e.target)) {
                    closeSystemPanel();
                }
            });
            
            // Quick settings toggle
            document.querySelectorAll('.quick-setting').forEach(setting => {
                setting.addEventListener('click', () => {
                    setting.classList.toggle('active');
                    const settingName = setting.dataset.setting;
                    const isActive = setting.classList.contains('active');
                    showToast(`${settingName.charAt(0).toUpperCase() + settingName.slice(1)} ${isActive ? 'enabled' : 'disabled'}`);
                });
            });
            
            // System panel buttons
            document.getElementById('sign-out-btn').addEventListener('click', () => {
                showToast('Signing out...');
                closeSystemPanel();
            });
            
            document.getElementById('lock-btn').addEventListener('click', () => {
                showToast('Locking screen...');
                closeSystemPanel();
            });
            
            document.getElementById('power-btn').addEventListener('click', () => {
                showToast('Power options...');
                closeSystemPanel();
            });
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                // Escape to close modals
                if (e.key === 'Escape') {
                    if (state.wallpaperModalOpen) {
                        closeWallpaperModal();
                    } else if (state.launcherOpen) {
                        closeLauncher();
                    } else if (state.systemPanelOpen) {
                        closeSystemPanel();
                    } else if (state.contextMenuOpen) {
                        closeContextMenu();
                    }
                }
                
                // Super/Meta key to toggle launcher
                if (e.key === 'Meta' || e.key === 'Super') {
                    toggleLauncher();
                }
            });
            
            // Prevent context menu on shelf
            elements.shelf.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                openContextMenu(e.clientX, e.clientY);
            });
        }

        /* ============================================
           INITIALIZE APPLICATION
           ============================================ */
        document.addEventListener('DOMContentLoaded', init);

        /* ============================================
           ADDITIONAL UTILITIES
           ============================================ */
        
        // Debounce function for search
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Format time with leading zeros
        function formatTime(num) {
            return num.toString().padStart(2, '0');
        }

        // Check if element is visible in viewport
        function isInViewport(element) {
            const rect = element.getBoundingClientRect();
            return (
                rect.top >= 0 &&
                rect.left >= 0 &&
                rect.bottom <= (window.innerHeight || document.documentElement.clientHeight) &&
                rect.right <= (window.innerWidth || document.documentElement.clientWidth)
            );
        }

        // Animate element with CSS transition
        function animateElement(element, properties, duration = 300) {
            return new Promise(resolve => {
                element.style.transition = `all ${duration}ms ease`;
                Object.assign(element.style, properties);
                setTimeout(resolve, duration);
            });
        }

        // Create ripple effect
        function createRipple(event, element) {
            const circle = document.createElement('span');
            const diameter = Math.max(element.clientWidth, element.clientHeight);
            const radius = diameter / 2;
            
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - element.offsetLeft - radius}px`;
            circle.style.top = `${event.clientY - element.offsetTop - radius}px`;
            circle.classList.add('ripple');
            
            const ripple = element.getElementsByClassName('ripple')[0];
            if (ripple) {
                ripple.remove();
            }
            
            element.appendChild(circle);
        }

        // Deep clone object
        function deepClone(obj) {
            return JSON.parse(JSON.stringify(obj));
        }

        // Generate unique ID
        function generateId() {
            return '_' + Math.random().toString(36).substr(2, 9);
        }

        // Store data in localStorage with expiry
        function setWithExpiry(key, value, ttl) {
            const now = new Date();
            const item = {
                value: value,
                expiry: now.getTime() + ttl
            };
            localStorage.setItem(key, JSON.stringify(item));
        }

        // Get data from localStorage with expiry check
        function getWithExpiry(key) {
            const itemStr = localStorage.getItem(key);
            if (!itemStr) {
                return null;
            }
            const item = JSON.parse(itemStr);
            const now = new Date();
            if (now.getTime() > item.expiry) {
                localStorage.removeItem(key);
                return null;
            }
            return item.value;
        }

        // Throttle function
        function throttle(func, limit) {
            let inThrottle;
            return function(...args) {
                if (!inThrottle) {
                    func.apply(this, args);
                    inThrottle = true;
                    setTimeout(() => inThrottle = false, limit);
                }
            };
        }

        // Clamp number between min and max
        function clamp(num, min, max) {
            return Math.min(Math.max(num, min), max);
        }

        // Linear interpolation
        function lerp(start, end, amount) {
            return start + (end - start) * amount;
        }

        // Map value from one range to another
        function mapRange(value, inMin, inMax, outMin, outMax) {
            return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
        }

        // Random number between min and max
        function randomBetween(min, max) {
            return Math.random() * (max - min) + min;
        }

        // Random integer between min and max
        function randomIntBetween(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Shuffle array
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Check if device is mobile
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // Check if device supports touch
        function isTouchDevice() {
            return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        }

        // Get scroll position
        function getScrollPosition(el = window) {
            return {
                x: el.pageXOffset !== undefined ? el.pageXOffset : el.scrollLeft,
                y: el.pageYOffset !== undefined ? el.pageYOffset : el.scrollTop
            };
        }

        // Smooth scroll to element
        function smoothScrollTo(element, duration = 500) {
            const targetPosition = element.getBoundingClientRect().top + window.pageYOffset;
            const startPosition = window.pageYOffset;
            const distance = targetPosition - startPosition;
            let startTime = null;
            
            function animation(currentTime) {
                if (startTime === null) startTime = currentTime;
                const timeElapsed = currentTime - startTime;
                const run = ease(timeElapsed, startPosition, distance, duration);
                window.scrollTo(0, run);
                if (timeElapsed < duration) requestAnimationFrame(animation);
            }
            
            function ease(t, b, c, d) {
                t /= d / 2;
                if (t < 1) return c / 2 * t * t + b;
                t--;
                return -c / 2 * (t * (t - 2) - 1) + b;
            }
            
            requestAnimationFrame(animation);
        }

        // Copy text to clipboard
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (err) {
                console.error('Failed to copy:', err);
                return false;
            }
        }

        // Format bytes to human readable
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // Parse query string
        function parseQueryString(queryString) {
            const query = {};
            const pairs = (queryString[0] === '?' ? queryString.substr(1) : queryString).split('&');
            for (let i = 0; i < pairs.length; i++) {
                const pair = pairs[i].split('=');
                query[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
            }
            return query;
        }

        // Build query string from object
        function buildQueryString(params) {
            return Object.keys(params)
                .map(key => `${encodeURIComponent(key)}=${encodeURIComponent(params[key])}`)
                .join('&');
        }

        // Capitalize first letter
        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // Truncate string
        function truncate(str, length, ending = '...') {
            if (str.length > length) {
                return str.substring(0, length - ending.length) + ending;
            }
            return str;
        }

        // Slugify string
        function slugify(str) {
            return str
                .toLowerCase()
                .trim()
                .replace(/[^\w\s-]/g, '')
                .replace(/[\s_-]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        // Escape HTML
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // Unescape HTML
        function unescapeHtml(str) {
            const div = document.createElement('div');
            div.innerHTML = str;
            return div.textContent || div.innerText || '';
        }

        // Check if object is empty
        function isEmpty(obj) {
            return Object.keys(obj).length === 0;
        }

        // Get object type
        function getType(obj) {
            return Object.prototype.toString.call(obj).slice(8, -1).toLowerCase();
        }

        // Flatten nested array
        function flattenArray(arr, depth = 1) {
            return arr.flat(depth);
        }

        // Remove duplicates from array
        function uniqueArray(arr) {
            return [...new Set(arr)];
        }

        // Group array by key
        function groupBy(arr, key) {
            return arr.reduce((group, item) => {
                const groupKey = item[key];
                group[groupKey] = group[groupKey] ?? [];
                group[groupKey].push(item);
                return group;
            }, {});
        }

        // Sort array by key
        function sortBy(arr, key, order = 'asc') {
            return [...arr].sort((a, b) => {
                if (order === 'asc') {
                    return a[key] > b[key] ? 1 : -1;
                }
                return a[key] < b[key] ? 1 : -1;
            });
        }

        // Get difference between two arrays
        function arrayDiff(arr1, arr2) {
            return arr1.filter(item => !arr2.includes(item));
        }

        // Get intersection of two arrays
        function arrayIntersection(arr1, arr2) {
            return arr1.filter(item => arr2.includes(item));
        }

        // Chunk array into smaller arrays
        function chunkArray(arr, size) {
            const chunks = [];
            for (let i = 0; i < arr.length; i += size) {
                chunks.push(arr.slice(i, i + size));
            }
            return chunks;
        }

        // Get average of array numbers
        function average(arr) {
            return arr.reduce((a, b) => a + b, 0) / arr.length;
        }

        // Get sum of array numbers
        function sum(arr) {
            return arr.reduce((a, b) => a + b, 0);
        }

        // Get min of array numbers
        function min(arr) {
            return Math.min(...arr);
        }

        // Get max of array numbers
        function max(arr) {
            return Math.max(...arr);
        }

        // Pick random item from array
        function pickRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        // Create range array
        function range(start, end, step = 1) {
            const arr = [];
            for (let i = start; i <= end; i += step) {
                arr.push(i);
            }
            return arr;
        }

        // Wait/sleep function
        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Retry async function
        async function retry(fn, retries = 3, delay = 1000) {
            try {
                return await fn();
            } catch (error) {
                if (retries > 0) {
                    await wait(delay);
                    return retry(fn, retries - 1, delay);
                }
                throw error;
            }
        }

        // Memoize function
        function memoize(fn) {
            const cache = new Map();
            return function(...args) {
                const key = JSON.stringify(args);
                if (cache.has(key)) {
                    return cache.get(key);
                }
                const result = fn.apply(this, args);
                cache.set(key, result);
                return result;
            };
        }

        // Compose functions
        function compose(...fns) {
            return (arg) => fns.reduceRight((acc, fn) => fn(acc), arg);
        }

        // Pipe functions
        function pipe(...fns) {
            return (arg) => fns.reduce((acc, fn) => fn(acc), arg);
        }

        // Curry function
        function curry(fn) {
            return function curried(...args) {
                if (args.length >= fn.length) {
                    return fn.apply(this, args);
                }
                return function(...args2) {
                    return curried.apply(this, args.concat(args2));
                };
            };
        }

        // Partial application
        function partial(fn, ...args) {
            return function(...moreArgs) {
                return fn.apply(this, args.concat(moreArgs));
            };
        }

        // Once - run function only once
        function once(fn) {
            let called = false;
            let result;
            return function(...args) {
                if (!called) {
                    called = true;
                    result = fn.apply(this, args);
                }
                return result;
            };

        // Type checking functions
        const is = {

            number: (x) => typeof x === 'number' && !isNaN(x),
            boolean: (x) => typeof x === 'boolean',
            function: (x) => typeof x === 'function',
            array: (x) => Array.isArray(x),
            object: (x) => x !== null && typeof x === 'object' && !Array.isArray(x),
            null: (x) => x === null,

        // Event emitter
        class EventEmitter {
            constructor() {
                this.events = {};
            }
            
            on(event, listener) {
                if (!this.events[event]) {
                    this.events[event] = [];
                }
                this.events[event].push(listener);
                return () => this.off(event, listener);
            }
            
            off(event, listener) {
                if (!this.events[event]) return;
                this.events[event] = this.events[event].filter(l => l !== listener);
            }
            
            emit(event, ...args) {
                if (!this.events[event]) return;
                this.events[event].forEach(listener => listener(...args));
            }
            
            once(event, listener) {
                const unsubscribe = this.on(event, (...args) => {
                    unsubscribe();
                    listener(...args);
                });
            }
        }

        // Observable
        class Observable {
            constructor(value) {
                this._value = value;

            get value() {

            set value(newValue) {
                if (newValue !== this._value) {
                    const oldValue = this._value;
                    this._value = newValue;
                    this._listeners.forEach(listener => listener(newValue, oldValue));
                }
            }
            
            subscribe(listener) {
                this._listeners.push(listener);
                return () => {
                    this._listeners = this._listeners.filter(l => l !== listener);
                };

        }

        // State machine
        class StateMachine {
            constructor(initialState, transitions) {
                this.state = initialState;
                this.transitions = transitions;
                this.listeners = [];
            }
            
            transition(action) {
                const currentTransitions = this.transitions[this.state];
                if (currentTransitions && currentTransitions[action]) {
                    const oldState = this.state;
                    this.state = currentTransitions[action];
                    this.listeners.forEach(listener => listener(this.state, oldState, action));
                    return true;
                }
                return false;
            }
            
            onTransition(listener) {
                this.listeners.push(listener);
                return () => {
                    this.listeners = this.listeners.filter(l => l !== listener);
                };
            }
        }

        // PriorityQueue
        class PriorityQueue {
            constructor() {
                this.items = [];
            }
            
            enqueue(item, priority) {
                const element = { item, priority };
                let added = false;
                
                for (let i = 0; i < this.items.length; i++) {
                    if (element.priority < this.items[i].priority) {
                        this.items.splice(i, 0, element);
                        added = true;
                        break;
                    }
                }
                
                if (!added) {
                    this.items.push(element);
                }
            }
            
            dequeue() {
                return this.items.shift()?.item;
            }
            
            peek() {
                return this.items[0]?.item;
            }
            
            get size() {
                return this.items.length;
