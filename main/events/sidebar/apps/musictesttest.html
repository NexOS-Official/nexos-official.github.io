<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost | music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surf: #111113;
  --s2: #1a1a1e;
  --s3: #252529;
  --s4: #2e2e34;
  --border: #2a2a30;
  --ink: #f0f0f5;
  --ink2: #9090a0;
  --ink3: #55555f;
  --ink4: #35353d;
  --accent: #e8395a;
  --accent2: #c42d4a;
  --glow: rgba(232,57,90,.12);
  --glow2: rgba(232,57,90,.06);
  --red: #ff453a;
  --orange: #ff9f0a;
  --green: #32d74b;
  --r: 12px;
  --rl: 18px;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font-body);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
.app{display:flex;height:100vh;padding:14px;gap:14px;overflow:hidden}
.left{display:flex;flex-direction:column;gap:12px;width:320px;flex-shrink:0}
.cover-wrap{
  flex:1;min-height:0;
  background:var(--surf);border-radius:var(--rl);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  border:1px solid var(--border);
}
.cover-bg{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  filter:blur(70px) saturate(2) brightness(.35);opacity:0;
  transition:opacity .8s ease;pointer-events:none;
}
.cover-bg.on{opacity:1}
.cover-art{
  width:72%;aspect-ratio:1;border-radius:14px;overflow:hidden;
  position:relative;z-index:1;display:none;
  box-shadow:0 24px 70px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.05);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
.cover-art.playing{transform:scale(1.02)}
.cover-art img{width:100%;height:100%;object-fit:cover;display:block}
.cover-skeleton{
  width:72%;aspect-ratio:1;border-radius:14px;
  background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.6s ease-in-out infinite;
  display:none;z-index:1;position:relative;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.empty-cover{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  color:var(--ink3);font-size:12px;font-family:var(--font-display);
  letter-spacing:.05em;text-transform:uppercase;
}
.idlewave{display:flex;align-items:flex-end;gap:3px;height:26px}
.idlewave span{width:3px;background:var(--s3);border-radius:3px;animation:iw 2s ease-in-out infinite}
.idlewave span:nth-child(1){height:7px;animation-delay:0s}
.idlewave span:nth-child(2){height:14px;animation-delay:.18s}
.idlewave span:nth-child(3){height:22px;animation-delay:.36s}
.idlewave span:nth-child(4){height:11px;animation-delay:.54s}
.idlewave span:nth-child(5){height:18px;animation-delay:.72s}
@keyframes iw{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}

.cover-info{
  position:absolute;bottom:0;left:0;right:0;z-index:2;display:none;
  padding:40px 18px 18px;
  background:linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 100%);
}
.cover-title{font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:-.2px;text-shadow:0 2px 12px rgba(0,0,0,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cover-artist{font-size:12px;color:var(--accent);margin-top:2px;text-shadow:0 2px 10px rgba(0,0,0,.6);cursor:pointer;text-decoration:underline;text-underline-offset:2px;text-decoration-color:rgba(232,57,90,.4)}

.heart-btn{
  position:absolute;top:12px;right:12px;z-index:3;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.45);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);
  display:grid;place-items:center;cursor:pointer;
  transition:background .15s,transform .2s,color .2s;color:rgba(255,255,255,.4);
}
.heart-btn svg{width:14px;height:14px;transition:fill .2s,color .2s}
.heart-btn.liked{color:var(--accent)}
.heart-btn.liked svg{fill:var(--accent)}
.heart-btn:hover{transform:scale(1.12);background:rgba(0,0,0,.6)}

.status-pill{
  position:absolute;top:12px;left:12px;z-index:5;
  display:flex;align-items:center;gap:5px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.06);border-radius:20px;
  padding:4px 9px;font-size:10px;color:var(--ink3);
  font-family:var(--font-display);letter-spacing:.03em;
}
.st-dot{width:5px;height:5px;border-radius:50%;background:var(--s3);transition:background .3s;flex-shrink:0}
.st-dot.ok{background:var(--green)}
.st-dot.err{background:var(--red)}
.st-dot.loading{background:var(--orange);animation:stpulse 1s infinite}
@keyframes stpulse{0%,100%{opacity:1}50%{opacity:.3}}

.controls-wrap{
  background:var(--surf);border-radius:var(--rl);
  border:1px solid var(--border);
  padding:14px 18px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;
}
.np-line{
  display:flex;align-items:center;gap:10px;min-width:0;
  padding-bottom:10px;border-bottom:1px solid var(--border);
}
.np-art-sm{width:36px;height:36px;border-radius:8px;background:var(--s2);flex-shrink:0;overflow:hidden;display:grid;place-items:center;font-size:14px}
.np-art-sm img{width:100%;height:100%;object-fit:cover;display:block}
.np-txt{flex:1;min-width:0}
.np-title{font-family:var(--font-display);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.np-artist{font-size:11px;color:var(--accent);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.np-idle{font-size:12px;color:var(--ink3);font-family:var(--font-display);letter-spacing:.03em}

.ctrl-row{display:flex;align-items:center;justify-content:center;gap:10px}
.icb{width:34px;height:34px;background:none;border:none;cursor:pointer;color:var(--ink3);border-radius:50%;display:grid;place-items:center;transition:color .14s,background .14s;flex-shrink:0}
.icb svg{width:16px;height:16px}
.icb:hover{color:var(--ink);background:var(--s2)}
.icb.on{color:var(--accent)}
.play-btn{
  width:48px;height:48px;flex-shrink:0;
  background:var(--ink);color:var(--bg);
  border:none;border-radius:50%;cursor:pointer;
  display:grid;place-items:center;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.play-btn svg{width:20px;height:20px}
.play-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(0,0,0,.5)}
.play-btn:active{transform:scale(.94)}

.prog-row{display:flex;align-items:center;gap:8px}
.tt{font-size:10px;color:var(--ink3);font-variant-numeric:tabular-nums;min-width:30px;font-family:var(--font-display);font-weight:500}
.tt.r{text-align:right}
.prog{flex:1;height:3px;background:var(--s3);border-radius:3px;cursor:pointer;position:relative;transition:height .15s}
.prog:hover{height:5px}
.prog-f{height:100%;background:var(--ink3);border-radius:3px;position:relative;pointer-events:none;transition:background .2s}
.prog:hover .prog-f{background:var(--accent)}
.prog-dot{position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--ink);border-radius:50%;opacity:0;transition:opacity .14s;pointer-events:none;box-shadow:0 0 8px rgba(232,57,90,.5)}
.prog:hover .prog-dot{opacity:1}

.vol-row{display:flex;align-items:center;gap:8px;justify-content:center}
.vol{flex:1;height:3px;background:var(--s3);border-radius:3px;cursor:pointer;position:relative;transition:height .14s}
.vol:hover{height:5px}
.vol-f{height:100%;background:var(--s4);border-radius:3px;pointer-events:none;transition:background .2s,width .05s}
.vol:hover .vol-f{background:var(--ink3)}
.right{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0;overflow:hidden}

.search-row{position:relative;flex-shrink:0}
.search-box{
  display:flex;align-items:center;gap:9px;
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);padding:11px 15px;
  transition:border-color .18s,box-shadow .18s;
}
.search-box:focus-within{border-color:rgba(232,57,90,.5);box-shadow:0 0 0 3px var(--glow)}
.search-box svg{width:15px;height:15px;color:var(--ink3);flex-shrink:0}
.search-box input{border:none;background:transparent;outline:none;font-family:var(--font-body);font-size:13.5px;color:var(--ink);width:100%}
.search-box input::placeholder{color:var(--ink3)}
.spin{width:13px;height:13px;flex-shrink:0;border:2px solid var(--s3);border-top-color:var(--accent);border-radius:50%;animation:spin .55s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.drop{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow:0 16px 48px rgba(0,0,0,.6);
  z-index:400;max-height:380px;overflow-y:auto;display:none;
}
.di{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--s2);transition:background .1s}
.di:last-child{border-bottom:none}
.di:hover{background:var(--s2)}
.di:hover .di-add{opacity:1}
.di-art{width:40px;height:40px;border-radius:7px;background:var(--s2);overflow:hidden;flex-shrink:0;display:grid;place-items:center;font-size:16px}
.di-art img{width:100%;height:100%;object-fit:cover;display:block}
.di-inf{flex:1;min-width:0}
.di-t{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.di-s{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.di-dur{font-size:10.5px;color:var(--ink3);flex-shrink:0;font-variant-numeric:tabular-nums}
.di-add{width:24px;height:24px;border-radius:50%;background:var(--accent);display:grid;place-items:center;flex-shrink:0;opacity:0;transition:opacity .14s}
.di-add svg{width:12px;height:12px;fill:#fff}
.drop-msg{padding:18px;text-align:center;font-size:13px;color:var(--ink3);line-height:1.6}

.content-area{
  flex:1;min-height:0;position:relative;
  background:var(--surf);border-radius:var(--rl);
  overflow:hidden;border:1px solid var(--border);
}

.results-panel{
  position:absolute;inset:0;padding:14px 12px 56px;
  overflow-y:auto;opacity:1;transition:opacity .25s;
}
.results-panel.hidden{opacity:0;pointer-events:none}

.queue-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding:0 4px;
}
.queue-label{font-family:var(--font-display);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--ink3)}
.queue-clear{background:none;border:none;color:var(--ink3);font-size:10px;cursor:pointer;padding:3px 6px;border-radius:6px;font-family:var(--font-body);transition:color .12s,background .12s}
.queue-clear:hover{color:var(--red);background:rgba(255,69,58,.08)}

.q-empty-msg{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:12px;color:var(--ink3);font-size:12px;text-align:center;
  font-family:var(--font-display);letter-spacing:.04em;text-transform:uppercase;
}

.qi{
  display:flex;align-items:center;gap:9px;
  padding:7px 9px;border-radius:10px;cursor:pointer;
  transition:background .1s,transform .15s,opacity .15s;
  position:relative;user-select:none;
}
.qi:hover{background:var(--s2)}
.qi.now{background:rgba(232,57,90,.08)}
.qi.now .qi-t{color:var(--accent);font-weight:600}
.qi.drag-over{background:var(--s3);transform:scale(1.01)}
.qi.dragging{opacity:.4;transform:scale(.97)}
.qi-drag{
  width:16px;height:16px;display:grid;place-items:center;
  color:var(--ink4);cursor:grab;flex-shrink:0;
  opacity:0;transition:opacity .12s;
}
.qi:hover .qi-drag{opacity:1}
.qi-drag:active{cursor:grabbing}
.qi-drag svg{width:12px;height:12px}
.qi-th{
  width:38px;height:38px;border-radius:7px;background:var(--s2);
  overflow:hidden;flex-shrink:0;display:grid;place-items:center;
  font-size:14px;position:relative;
}
.qi-th img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:7px}
.qi-th.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite}
.now-ind{position:absolute;inset:0;border-radius:7px;background:rgba(232,57,90,.85);display:flex;align-items:center;justify-content:center}
.bars{display:flex;align-items:flex-end;gap:2px;height:13px}
.bars b{width:2px;background:#fff;border-radius:2px;animation:ba .7s ease-in-out infinite}
.bars b:nth-child(2){animation-name:bb}
.bars b:nth-child(3){animation-name:bc}
@keyframes ba{0%,100%{height:3px}50%{height:11px}}
@keyframes bb{0%,100%{height:8px}50%{height:3px}}
@keyframes bc{0%,100%{height:4px}50%{height:12px}}
.qi-inf{flex:1;min-width:0}
.qi-t{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.qi-a{font-size:10.5px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.qi-rm{width:20px;height:20px;border:none;background:none;color:var(--ink3);font-size:15px;line-height:1;border-radius:50%;cursor:pointer;display:none;place-items:center;transition:background .1s,color .1s}
.qi:hover .qi-rm{display:grid}
.qi-rm:hover{background:var(--s3);color:var(--red)}
.qi-drop-line{height:2px;background:var(--accent);border-radius:2px;margin:1px 9px;opacity:0;transition:opacity .1s;pointer-events:none}
.qi-drop-line.show{opacity:1}
.lyrics-panel{
  position:absolute;inset:0;opacity:0;pointer-events:none;
  overflow:hidden;transition:opacity .3s;
}
.lyrics-panel.active{opacity:1;pointer-events:auto}
.lrc-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:blur(50px) saturate(1.7) brightness(.3);
  transform:scale(1.15);pointer-events:none;z-index:0;
  opacity:0;transition:opacity .9s ease;
}
.lrc-bg.on{opacity:1}
.lrc-scroll-outer{
  position:absolute;inset:0;overflow-y:auto;
  padding:36px 22px 90px;z-index:1;
}
#lscroll{position:relative;z-index:1;}
.lrc-empty-state-wrap{position:relative;z-index:1;}
.lrc-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--ink3);text-align:center}
.lrc-empty svg{width:36px;height:36px;opacity:.2}
.lrc-empty p{font-size:12px;font-family:var(--font-display);letter-spacing:.05em;text-transform:uppercase}
#lrc-offset-controls{
  position:absolute;bottom:62px;left:12px;z-index:10;
  display:none;flex-direction:column;gap:4px;align-items:center;
}
#lrc-offset-controls button{
  width:30px;height:30px;border-radius:50%;
  background:var(--s2);border:1px solid var(--border);
  color:var(--ink3);font-size:14px;cursor:pointer;
  display:grid;place-items:center;transition:color .12s,background .12s;
}
#lrc-offset-controls button:hover{background:var(--s3);color:var(--ink)}
#lrc-offset-tooltip{
  font-size:9px;color:var(--ink3);text-align:center;
  font-family:var(--font-display);letter-spacing:.05em;
  text-transform:uppercase;margin-top:2px;
}

.ll{
  font-family:var(--font-display);
  font-size:26px;line-height:1.38;font-weight:800;
  padding:3px 0;border-radius:6px;cursor:pointer;
  color:rgba(240,240,245,0.18);
  filter:blur(3px);opacity:.65;
  transform-origin:left center;
  transition:
    color .55s cubic-bezier(.4,0,.2,1),
    filter .55s cubic-bezier(.4,0,.2,1),
    opacity .55s cubic-bezier(.4,0,.2,1),
    font-size .4s cubic-bezier(.34,1.56,.64,1);
  will-change:color,filter,opacity;
}
.ll.past{color:rgba(240,240,245,0.1);filter:blur(4px);opacity:.4;}
.ll.near{color:rgba(240,240,245,0.45);filter:blur(1.5px);opacity:.8;font-size:24px;}
.ll.near2{color:rgba(240,240,245,0.28);filter:blur(2.5px);opacity:.55;font-size:22px;}
.ll.now{color:#f0f0f5;font-size:30px;filter:blur(0px);opacity:1;}
.ll-paren{display:block;font-size:.56em;font-weight:600;color:rgba(240,240,245,0.4);margin-top:2px}
.ll.now .ll-paren{color:rgba(240,240,245,0.65)}
.ll:hover:not(.now){filter:blur(0px);color:rgba(240,240,245,0.55)}
.ll.now .lw{
  display:inline-block;
  background:linear-gradient(to right,
    #f0f0f5 calc(var(--pct,0%) - 5%),
    rgba(240,240,245,0.5) var(--pct,0%),
    rgba(240,240,245,0.22) calc(var(--pct,0%) + 4%)
  );
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.ll.now .lw.done{--pct:100%;filter:drop-shadow(0 0 4px rgba(240,240,245,.22))}
.ll.now .lw.upcoming{--pct:0%;filter:none}
.ll.now .lw.now-word{filter:drop-shadow(0 0 6px rgba(240,240,245,.28))}

.beat-dots{display:inline-flex;align-items:flex-end;gap:7px;height:1em;vertical-align:middle}
.beat-dots span{width:7px;height:7px;border-radius:50%;background:rgba(240,240,245,0.2);display:inline-block;transition:background .3s}
.ll.now .beat-dots span{background:var(--ink);animation:beatbounce var(--beat-dur,600ms) ease-in-out infinite}
.ll.now .beat-dots span:nth-child(2){animation-delay:calc(var(--beat-dur,600ms) / 3)}
.ll.now .beat-dots span:nth-child(3){animation-delay:calc(var(--beat-dur,600ms) / 3 * 2)}
@keyframes beatbounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}60%{transform:translateY(-8px)}}

.side-panel{
  position:absolute;inset:0;padding:14px 14px 60px;
  overflow-y:auto;opacity:0;pointer-events:none;
  transition:opacity .25s;
}
.side-panel.active{opacity:1;pointer-events:auto}
.panel-hdr{
  font-family:var(--font-display);
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.4px;color:var(--ink3);margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.panel-hdr button{
  background:var(--accent);border:none;color:#fff;
  font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:8px;
  cursor:pointer;font-family:var(--font-body);
}

.lk-empty{height:80%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--ink3);font-size:11px;font-family:var(--font-display);letter-spacing:.04em;text-transform:uppercase}
.lk-empty svg{width:32px;height:32px;opacity:.18}
.lk-row{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:9px;cursor:pointer;transition:background .1s}
.lk-row:hover{background:var(--s2)}
.lk-row:hover .lk-rm{opacity:1}
.lk-thumb{width:36px;height:36px;border-radius:6px;background:var(--s2);flex-shrink:0;overflow:hidden;display:grid;place-items:center;font-size:14px}
.lk-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.lk-inf{flex:1;min-width:0}
.lk-t{font-size:12.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lk-a{font-size:10.5px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.lk-rm{opacity:0;background:none;border:none;color:var(--ink3);font-size:15px;cursor:pointer;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;transition:background .1s,color .1s,opacity .1s;flex-shrink:0}
.lk-rm:hover{background:var(--s3);color:var(--red)}

.pl-grid{display:flex;flex-direction:column;gap:7px}
.pl-card{
  display:flex;align-items:center;gap:9px;
  padding:7px 9px;border-radius:10px;
  background:var(--s2);cursor:pointer;
  transition:background .1s;position:relative;
}
.pl-card:hover{background:var(--s3)}
.pl-card:hover .pl-del{opacity:1}
.pl-cover{width:42px;height:42px;border-radius:7px;background:var(--s3);flex-shrink:0;overflow:hidden;display:grid;place-items:center;font-size:17px;position:relative}
.pl-cover-grid{display:grid;grid-template-columns:1fr 1fr;width:100%;height:100%}
.pl-cover-grid img{width:100%;height:100%;object-fit:cover;display:block}
.pl-inf{flex:1;min-width:0}
.pl-name{font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-display)}
.pl-count{font-size:10.5px;color:var(--ink3);margin-top:1px}
.pl-del{opacity:0;background:none;border:none;color:var(--ink3);cursor:pointer;font-size:15px;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;transition:opacity .1s,background .1s,color .1s}
.pl-del:hover{background:var(--s3);color:var(--red)}

.pl-detail-hdr{display:flex;align-items:center;gap:9px;margin-bottom:12px;flex-shrink:0}
.pl-back{background:none;border:none;color:var(--ink3);cursor:pointer;width:26px;height:26px;display:grid;place-items:center;border-radius:50%;transition:background .1s,color .1s}
.pl-back:hover{background:var(--s2);color:var(--ink)}
.pl-back svg{width:15px;height:15px}
.pl-detail-name{font-family:var(--font-display);font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-play-all{background:var(--accent);border:none;color:#fff;font-size:10.5px;font-weight:600;padding:5px 11px;border-radius:9px;cursor:pointer;white-space:nowrap;font-family:var(--font-body)}

.artist-panel-bg{
  position:absolute;inset:0;background-size:cover;background-position:center top;
  filter:blur(55px) saturate(1.5) brightness(.22);transform:scale(1.2);
  pointer-events:none;z-index:0;opacity:0;transition:opacity .7s;
}
.artist-panel-bg.on{opacity:1}
.artist-panel-inner{position:relative;z-index:1;padding:18px 16px 70px}
.artist-hero{display:flex;align-items:flex-end;gap:14px;margin-bottom:22px}
.artist-avatar{width:84px;height:84px;border-radius:50%;background:var(--s2);flex-shrink:0;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.5);display:grid;place-items:center;font-size:30px}
.artist-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.artist-hero-info{flex:1;min-width:0}
.artist-name-big{font-family:var(--font-display);font-size:24px;font-weight:800;letter-spacing:-.3px;line-height:1.1}
.artist-meta{font-size:11px;color:var(--ink3);margin-top:4px}
.artist-play-all{background:var(--accent);border:none;color:#fff;font-size:11px;font-weight:700;padding:7px 16px;border-radius:18px;cursor:pointer;margin-top:9px;transition:transform .15s;font-family:var(--font-body)}
.artist-play-all:hover{transform:scale(1.05)}
.artist-section-lbl{font-family:var(--font-display);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--ink3);margin-bottom:9px}
.artist-track-row{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:9px;cursor:pointer;transition:background .1s}
.artist-track-row:hover{background:rgba(255,255,255,.06)}
.artist-track-num{width:20px;text-align:right;font-size:11px;color:var(--ink3);flex-shrink:0;font-variant-numeric:tabular-nums}
.artist-track-art{width:36px;height:36px;border-radius:6px;background:var(--s2);flex-shrink:0;overflow:hidden;display:grid;place-items:center;font-size:13px}
.artist-track-art img{width:100%;height:100%;object-fit:cover;display:block}
.artist-track-inf{flex:1;min-width:0}
.artist-track-t{font-size:12.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artist-track-alb{font-size:10.5px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.artist-track-dur{font-size:10.5px;color:var(--ink3);flex-shrink:0;font-variant-numeric:tabular-nums}
.artist-track-add{width:22px;height:22px;border-radius:50%;background:var(--accent);display:grid;place-items:center;flex-shrink:0;opacity:0;transition:opacity .14s}
.artist-track-add svg{width:11px;height:11px;fill:#fff}
.artist-track-row:hover .artist-track-add{opacity:1}
.artist-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:36px;color:var(--ink3);font-size:12px;font-family:var(--font-display)}
.artist-loading .spin{display:block !important}

.panel-nav{
  position:absolute;bottom:12px;right:12px;z-index:10;
  display:flex;flex-direction:column;gap:5px;align-items:center;
}
.pnb{
  width:38px;height:38px;border-radius:50%;
  background:var(--s2);border:1px solid var(--border);
  display:grid;place-items:center;cursor:pointer;
  transition:background .15s,color .15s,transform .15s,border-color .15s;
  color:var(--ink3);
}
.pnb svg{width:16px;height:16px}
.pnb:hover{background:var(--s3);color:var(--ink);transform:scale(1.06)}
.pnb.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:800;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:18px;padding:18px;width:290px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
.modal-title{font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:13px}
.modal-input{width:100%;background:var(--s2);border:1.5px solid transparent;border-radius:9px;padding:10px 12px;color:var(--ink);font-family:var(--font-body);font-size:13px;outline:none;margin-bottom:10px;transition:border-color .15s}
.modal-input:focus{border-color:rgba(232,57,90,.5)}
.modal-btns{display:flex;gap:7px;justify-content:flex-end}
.modal-btns button{padding:7px 15px;border-radius:9px;border:none;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--font-body)}
.modal-cancel{background:var(--s2);color:var(--ink3)}
.modal-ok{background:var(--accent);color:#fff}
.modal-pl-list{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;max-height:190px;overflow-y:auto}
.modal-pl-row{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;cursor:pointer;transition:background .1s}
.modal-pl-row:hover{background:var(--s2)}
.modal-pl-thumb{width:30px;height:30px;border-radius:5px;background:var(--s3);flex-shrink:0;display:grid;place-items:center;font-size:12px;overflow:hidden}
.modal-pl-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.modal-pl-name{font-size:12.5px;font-weight:500;color:var(--ink)}
.ctx-menu{position:fixed;z-index:900;background:var(--surf);border:1px solid var(--border);border-radius:11px;padding:5px;box-shadow:0 10px 36px rgba(0,0,0,.55);min-width:165px;display:none}
.ctx-menu.open{display:block}
.ctx-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--ink);transition:background .08s}
.ctx-item svg{width:14px;height:14px;color:var(--ink3);flex-shrink:0}
.ctx-item:hover{background:var(--s2)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger svg{color:var(--red)}
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(30,30,36,.95);backdrop-filter:blur(20px);
  color:var(--ink);padding:9px 20px;border-radius:26px;
  font-size:12.5px;font-weight:500;font-family:var(--font-display);
  opacity:0;pointer-events:none;z-index:999;white-space:nowrap;
  transition:opacity .2s,transform .2s;
  border:1px solid var(--border);
  box-shadow:0 8px 30px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#yt-host{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none}

@media(max-width:768px){
  .app{flex-direction:column;padding:9px;gap:9px}
  .left{width:100%;flex-direction:row;gap:9px;flex-shrink:0;height:auto}
  .cover-wrap{width:130px;height:130px;flex:none;border-radius:var(--r)}
  .cover-art{width:84%;border-radius:10px}
  .cover-info{display:none !important}
  .controls-wrap{flex:1;border-radius:var(--r);padding:10px;justify-content:center}
  .play-btn{width:42px;height:42px}
  .play-btn svg{width:18px;height:18px}
  .vol-row{display:none}
  .np-line{display:none}
  .right{flex:1;min-height:0}
  .content-area{border-radius:var(--r)}
  .ll.now{font-size:20px}
  .ll{font-size:16px}
}
@media(max-width:480px){
  .cover-wrap{width:100px;height:100px}
  .icb{width:28px;height:28px}
  .icb svg{width:14px;height:14px}
  .ctrl-row{gap:6px}
  .play-btn{width:38px;height:38px}
  .play-btn svg{width:16px;height:16px}
}
</style>
</head>
<body>

<div id="yt-host"><div id="yt-player"></div></div>
<div class="toast" id="toast"></div>

<div class="app">
  <div class="left">
    <div class="cover-wrap" id="cover-wrap">
      <img class="cover-bg" id="cv-bg" src="" alt="">
      <div class="empty-cover" id="empty-cover">
        <div class="idlewave"><span></span><span></span><span></span><span></span><span></span></div>
        <span>Nothing playing</span>
      </div>
      <div class="cover-skeleton" id="cover-skeleton"></div>
      <div class="cover-art" id="cover-art">
        <img id="cv-img" src="" alt="">
      </div>
      <div class="cover-info" id="cover-info">
        <div class="cover-title" id="np-t">—</div>
        <div class="cover-artist" id="np-a">—</div>
      </div>
      <button class="heart-btn" id="btn-heart" title="Like (H)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <div class="status-pill">
        <div class="st-dot loading" id="sc-dot"></div>
        <span id="sc-status-txt">Loading…</span>
      </div>
    </div>
    <div class="controls-wrap">
      <div class="np-line" id="np-line">
        <div class="np-art-sm" id="np-art-sm">N/A</div>
        <div class="np-txt">
          <div class="np-idle" id="np-idle">Nothing playing</div>
          <div class="np-title" id="np-ctrl-t" style="display:none"></div>
          <div class="np-artist" id="np-ctrl-a" style="display:none"></div>
        </div>
      </div>
      <div class="ctrl-row">
        <button class="icb" id="btn-sf" title="Shuffle (S)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button class="icb" id="btn-pv" title="Previous (P)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="play-btn" id="btn-pp">
          <svg id="pp-ico" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="icb" id="btn-nx" title="Next (N)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm10.5-12v12H19V6h-2.5z"/></svg>
        </button>
        <button class="icb" id="btn-rp" title="Repeat (R)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="prog-row">
        <span class="tt" id="t-c">0:00</span>
        <div class="prog" id="prog"><div class="prog-f" id="prog-f" style="width:0%"><div class="prog-dot"></div></div></div>
        <span class="tt r" id="t-d">0:00</span>
      </div>
      <div class="vol-row">
        <button class="icb" id="btn-vol" style="width:26px;height:26px">
          <svg id="vol-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </button>
        <div class="vol" id="vol-tr"><div class="vol-f" id="vol-f" style="width:80%"></div></div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="search-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="q-in" type="text" placeholder="Search songs, artists…" autocomplete="off" spellcheck="false">
        <div class="spin" id="q-spin"></div>
      </div>
      <div class="drop" id="q-drop"></div>
    </div>

    <div class="content-area">
      <div class="results-panel" id="results-panel">
        <div class="queue-header" id="queue-header" style="display:none">
          <span class="queue-label">Up Next</span>
          <button class="queue-clear" onclick="clearQueue()">Clear All</button>
        </div>
        <div id="q-list">
          <div class="q-empty-msg">
            <div class="idlewave"><span></span><span></span><span></span><span></span><span></span></div>
            Search for any song above
          </div>
        </div>
      </div>

      <div class="lyrics-panel" id="lyrics-panel">
        <div class="lrc-bg" id="lrc-bg"></div>
        <div class="lrc-scroll-outer" id="lrc-scroll-outer">
          <div class="lrc-empty-state-wrap">
            <div class="lrc-empty" id="lrc-empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/>
              </svg>
              <p>Play a track to see lyrics</p>
            </div>
          </div>
          <div id="lscroll"></div>
        </div>
      </div>

      <div class="side-panel" id="likes-panel">
        <div class="panel-hdr"><span>Liked Songs</span></div>
        <div id="likes-list"><div class="lk-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><p>No liked songs yet</p></div></div>
      </div>

      <div class="side-panel" id="playlists-panel">
        <div class="panel-hdr"><span>Playlists</span><button onclick="openNewPlaylistModal()">+ New</button></div>
        <div class="pl-grid" id="pl-grid"><div class="lk-empty" style="height:60%;justify-content:center"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:32px;height:32px;opacity:.18"><path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg><p>No playlists yet</p></div></div>
      </div>

      <div class="side-panel" id="pl-detail-panel">
        <div class="pl-detail-hdr">
          <button class="pl-back" onclick="showPanel('playlists')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div class="pl-detail-name" id="pl-detail-name">Playlist</div>
          <button class="pl-play-all" onclick="playPlaylist()">Play All</button>
        </div>
        <div id="pl-detail-list"></div>
      </div>

      <div class="side-panel" id="artist-panel" style="padding:0;overflow:hidden;">
        <div class="artist-panel-bg" id="artist-bg"></div>
        <div style="position:absolute;top:11px;left:11px;z-index:10;">
          <button class="pl-back" id="artist-back" onclick="showPanel('queue')" style="background:rgba(0,0,0,.45);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        </div>
        <div class="lrc-scroll-outer" style="z-index:1;padding-top:14px;">
          <div class="artist-panel-inner" id="artist-panel-inner">
            <div class="artist-loading"><div class="spin"></div><span>Loading artist…</span></div>
          </div>
        </div>
      </div>

      <div id="lrc-offset-controls">
        <button onclick="_lrcOffset+=200" title="Lyrics too late (shift earlier)">−</button>
        <button onclick="_lrcOffset-=200" title="Lyrics too early (shift later)">+</button>
        <div id="lrc-offset-tooltip">Sync</div>
      </div>

      <div class="panel-nav">
        <button class="pnb" id="pnb-lyrics" title="Lyrics (L)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h10M4 18h14"/></svg>
        </button>
        <button class="pnb" id="pnb-likes" title="Liked Songs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <button class="pnb" id="pnb-playlists" title="Playlists">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-atp">
  <div class="modal">
    <div class="modal-title" id="modal-atp-title">Add to Playlist</div>
    <div class="modal-pl-list" id="modal-pl-list"></div>
    <div class="modal-btns"><button class="modal-cancel" onclick="closeModal('modal-atp')">Cancel</button><button class="modal-ok" onclick="createPlaylistFromModal()">New Playlist</button></div>
  </div>
</div>
<div class="modal-bg" id="modal-newpl">
  <div class="modal">
    <div class="modal-title">New Playlist</div>
    <input class="modal-input" id="newpl-input" placeholder="Playlist name…" maxlength="40">
    <div class="modal-btns"><button class="modal-cancel" onclick="closeModal('modal-newpl')">Cancel</button><button class="modal-ok" onclick="confirmNewPlaylist()">Create</button></div>
  </div>
</div>
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" id="ctx-like" onclick="ctxLike()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span id="ctx-like-lbl">Like</span></div>
  <div class="ctx-item" onclick="ctxAddToPlaylist()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add to Playlist</div>
  <div class="ctx-item" onclick="ctxPlayNext()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>Play Next</div>
  <div class="ctx-item danger" onclick="ctxRemove()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>Remove</div>
</div>

<script>
'use strict';

const G = id => document.getElementById(id);

let likes = _store.get('ghost_likes', []);
function saveLikes() { _store.set('ghost_likes', likes); }
function isLiked(track) {
  const key = trackKey(track); return likes.some(l => l._key === key);
}
function trackKey(track) {
  return (track.title||track.trackName||'') + '||' + (track.artist||track.artistName||'');
}
function toggleLike(track) {
  const key = trackKey(track);
  const idx = likes.findIndex(l => l._key === key);
  if (idx >= 0) { likes.splice(idx, 1); toast('Removed from Liked Songs'); }
  else { likes.unshift({ title:track.title||track.trackName, artist:track.artist||track.artistName, artSm:track.artSm||track.artworkUrl100||null, artLg:track.artLg||track._artLgOverride||null, _key:key }); toast('♥ Added to Liked Songs'); }
  saveLikes(); renderLikes(); syncHeartBtn();
}
function syncHeartBtn() {
  const cur = ST.queue[ST.idx];
  G('btn-heart').classList.toggle('liked', !!(cur && isLiked(cur)));
}
function renderLikes() {
  const el = G('likes-list');
  if (!likes.length) { el.innerHTML='<div class="lk-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><p>No liked songs yet</p></div>'; return; }

    <button class="lk-rm" onclick="event.stopPropagation();unlikeAt(${i})" title="Unlike">×</button>
  </div>`).join('');
}
function playLikedSong(i) { const lk=likes[i]; if(!lk)return; addAndPlay({title:lk.title,artist:lk.artist,artSm:lk.artSm,artLg:lk.artLg}); showPanel('queue'); }
function unlikeAt(i) { likes.splice(i,1); saveLikes(); renderLikes(); syncHeartBtn(); }

function proxyImgFallback(img) {

    const orig=img.getAttribute('data-src')||img.src;
    img.src='https://wsrv.nl/?url='+encodeURIComponent(orig)+'&w=300';

}

let YT_player=null, ytReady=false, ticker=null;
let _lastYtPollMs=0, _lastYtPosMs=0, _lrcOffset=0;
function getPrecisePos() {
  const wallElapsed=performance.now()-_lastYtPollMs;
  return _lastYtPosMs+(ST.playing?wallElapsed:0);
}

window.onYouTubeIframeAPIReady = function() {
  YT_player = new YT.Player('yt-player', {
    videoId: 'M7lc1UVf-VE',
    playerVars:{autoplay:0,controls:0,rel:0,modestbranding:1,origin:window.location.origin,host:'https://www.youtube-nocookie.com'},
    events:{
      onReady(e){ ytReady=true; e.target.setVolume(ST.vol*100); setStatus('ok','Ready'); },
      onStateChange(e){
        if(e.data===YT.PlayerState.PLAYING){
          ST.playing=true; syncPP(); G('cover-art').classList.add('playing');
          clearInterval(ticker);
          const pollYT=()=>{
            ST.pos=YT_player.getCurrentTime()*1000;
            ST.dur=YT_player.getDuration()*1000;
            _lastYtPosMs=ST.pos+_lrcOffset;
            _lastYtPollMs=performance.now();
            syncBar();
          };
          pollYT(); ticker=setInterval(pollYT,250);
          const rafLoop=()=>{ if(!ST.playing)return; if(ST.lrcType==='synced')tickLrc(getPrecisePos()); ST._rafId=requestAnimationFrame(rafLoop); };
          requestAnimationFrame(rafLoop);
        } else if(e.data===YT.PlayerState.PAUSED){
          ST.playing=false; syncPP(); G('cover-art').classList.remove('playing');
          clearInterval(ticker); if(ST._rafId){cancelAnimationFrame(ST._rafId);ST._rafId=null;}
        } else if(e.data===YT.PlayerState.ENDED){
          ST.playing=false; G('cover-art').classList.remove('playing');
          clearInterval(ticker); if(ST._rafId){cancelAnimationFrame(ST._rafId);ST._rafId=null;}
          if(ST.repeat){YT_player.seekTo(0);YT_player.playVideo();}else nextTrack();
        }
      },
      onError(e){
        const track=ST.queue[ST.idx];
        if(track?.ytIds?.length>track.ytTry+1){track.ytTry++;YT_player.loadVideoById(track.ytIds[track.ytTry]);}
        else toast('⚠ Blocked — try another');
      }
    }
  });
};

const ytCache={};
async function findVideoIds(artist,title){
  const ck=(artist+'||'+title).toLowerCase();
  if(ytCache[ck]?.length) return ytCache[ck];
  const q=encodeURIComponent(artist+' '+title+' audio');
  const invidious=['https://inv.nadeko.net','https://invidious.privacyredirect.com','https://iv.melmac.space','https://invidious.nerdvpn.de','https://yt.cdaut.de','https://invidious.io.lol','https://invidious.fdn.fr'];
  const tryInv=host=>new Promise(async(res,rej)=>{
    try{const r=await fetch(`${host}/api/v1/search?q=${q}&type=video&fields=videoId`,{signal:AbortSignal.timeout(3500)});if(!r.ok)return rej();const d=await r.json();const ids=(Array.isArray(d)?d:[]).map(v=>v.videoId).filter(Boolean).slice(0,6);if(ids.length)res(ids);else rej();}catch{rej();}
  });
  try{const ids=await Promise.any(invidious.map(tryInv));ytCache[ck]=ids;return ids;}catch{}
  const ytUrl='https://www.youtube.com/results?search_query='+encodeURIComponent(artist+' '+title+' audio');
  const proxies=[u=>'https://corsproxy.io/?url='+encodeURIComponent(u),u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u)];
  const tryProxy=pfn=>new Promise(async(res,rej)=>{
    try{const html=await fetch(pfn(ytUrl),{signal:AbortSignal.timeout(5000)}).then(r=>r.text());const matches=[...html.matchAll(/"videoId":"([a-zA-Z0-9_-]{11})"/g)];const ids=[...new Set(matches.map(m=>m[1]))].slice(0,6);if(ids.length)res(ids);else rej();}catch{rej();}
  });
  try{const ids=await Promise.any(proxies.map(tryProxy));ytCache[ck]=ids;return ids;}catch{}
  throw new Error('search failed');
}

async function itunesFetch(url){
  try{const r=await fetch(url,{signal:AbortSignal.timeout(5000)});if(r.ok)return await r.json();}catch(e){console.warn('iTunes direct:',e.message);}
  try{const r=await fetch('https://corsproxy.io/?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(6000)});if(r.ok)return await r.json();}catch(e){console.warn('iTunes proxy:',e.message);}
  return null;
}

async function doSearch(q){
  qSpn.style.display='block';
  qDrp.innerHTML='<div class="drop-msg">Searching…</div>';
  qDrp.style.display='block';
  const itunesTracks=await searchItunes(q);
  if(itunesTracks.length){qSpn.style.display='none';renderDrop(itunesTracks);}
  try{
    const mbTracks=await searchMusicBrainz(q);
    const newMb=mbTracks.filter(t=>!itunesTracks.some(e=>e.trackName.toLowerCase()===t.trackName.toLowerCase()&&e.artistName.toLowerCase()===t.artistName.toLowerCase()));
    if(newMb.length){const combined=[...itunesTracks,...newMb].slice(0,30);qSpn.style.display='none';renderDrop(combined);}
  }catch{}
  qSpn.style.display='none';
  if(!itunesTracks.length&&!qDrp.querySelector('.di'))qDrp.innerHTML='<div class="drop-msg">No results</div>';
}

function scoreTrack(t,ql,words){
  const tl=(t.trackName||'').toLowerCase(), al=(t.artistName||'').toLowerCase();
  let s=0;
  if(tl===ql)s+=100;else if(tl.startsWith(ql))s+=70;else if(words.every(w=>tl.includes(w)))s+=45;else s+=words.filter(w=>tl.includes(w)).length*10;
  if(al===ql)s+=80;else if(al.startsWith(ql))s+=50;else if(words.every(w=>al.includes(w)))s+=30;
  if(t.artworkUrl100)s+=5; if(t.trackTimeMillis>60000)s+=5; if((t.trackCount||0)>5)s+=3;
  return s;
}
async function searchItunes(q){
  const ql=q.toLowerCase().trim(), words=ql.split(/\s+/).filter(Boolean);
  const data=await itunesFetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&entity=song&limit=25&country=US`);
  if(!data?.results?.length)return[];
  const results=data.results;
  results.sort((a,b)=>scoreTrack(b,ql,words)-scoreTrack(a,ql,words));
  return results.slice(0,25);
}
async function searchMusicBrainz(q){
  try{
    const res=await fetch(`https://musicbrainz.org/ws/2/recording/?query=${encodeURIComponent(q)}&limit=25&fmt=json`,{headers:{'User-Agent':'GhostMusic/2.0'}});
    const data=await res.json();
    if(!data.recordings?.length)return[];
    return data.recordings.map(r=>{
      const artist=r['artist-credit']?.[0]?.artist?.name||r['artist-credit']?.[0]?.name||'Unknown';
      const release=r.releases?.[0];
      return{trackName:r.title,artistName:artist,collectionName:release?.title||'',artworkUrl100:null,trackTimeMillis:r.length||null,_source:'musicbrainz',_releaseMbid:release?.id||null};
    });
  }catch{return[];}
}

const _artCache={};
async function fetchCoverArt(track){
  if(track.artworkUrl100)return;
  const ck=((track.artistName||'')+'||'+(track.trackName||'')).toLowerCase();
  if(_artCache[ck]!==undefined){if(_artCache[ck]){track.artworkUrl100=_artCache[ck];track._artLgOverride=_artCache[ck+'_lg'];}return;}
  try{
    const term=encodeURIComponent((track.artistName||'').trim()+' '+(track.trackName||'').trim());
    const r=await fetch(`https://itunes.apple.com/search?term=${term}&media=music&entity=song&limit=5&country=US`);
    if(r.ok){
      const d=await r.json();
      const tl=(track.trackName||'').toLowerCase(), al=(track.artistName||'').toLowerCase();
      const hit=d.results?.find(h=>h.trackName?.toLowerCase()===tl&&h.artistName?.toLowerCase()===al)||d.results?.find(h=>h.trackName?.toLowerCase().includes(tl)||h.artistName?.toLowerCase().includes(al))||d.results?.[0];
      if(hit?.artworkUrl100){const sm=hit.artworkUrl100,lg=sm.replace('100x100bb','600x600bb');_artCache[ck]=sm;_artCache[ck+'_lg']=lg;track.artworkUrl100=sm;track._artLgOverride=lg;return;}
    }
  }catch{}
  if(track._releaseMbid){
    const mbid=track._releaseMbid;
    try{
      const r=await fetch(`https://coverartarchive.org/release/${mbid}`);
      if(r.ok){const d=await r.json();const img=d.images?.find(i=>i.front)||d.images?.[0];if(img){const sm=img.thumbnails?.['250']||img.thumbnails?.small||img.image,lg=img.thumbnails?.['500']||img.thumbnails?.large||img.image;if(sm){_artCache[mbid]=sm;_artCache[mbid+'_lg']=lg;_artCache[ck]=sm;_artCache[ck+'_lg']=lg;track.artworkUrl100=sm;track._artLgOverride=lg;return;}}}
    }catch{}
  }
  _artCache[ck]=null;
}

  qDrp.innerHTML=tracks.map(t=>{

    const artLg=t._artLgOverride||artSm.replace('100x100bb','600x600bb');
    const data={title:t.trackName,artist:t.artistName,album:t.collectionName||'',artSm:artSm||null,artLg:artLg||null,durMs:t.trackTimeMillis||null,_ref:t};
    const id='tr_'+Math.random().toString(36).slice(2);
    (window._td=window._td||{})[id]=data;
    const aName=(t.artistName||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const aArt=(t.artworkUrl100||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const srcBadge=(t._source&&t._source!=='itunes')?` <span style="font-size:9px;opacity:.4;text-transform:uppercase;letter-spacing:.5px">[${t._source}]</span>`:'';
    return `<div class="di" onclick="pickTrack('${id}')">

async function hydrateArt(tdEntries){

async function fetchLyrics(title,artist){
  ST.lrc=[]; ST.lrcType='none'; ST.lrcActive=-1;
  _lrcOffset=0;
  const scroll=G('lscroll');
  G('lrc-empty-state').style.display='none';
  scroll.innerHTML='<div class="lrc-empty"><p>Finding lyrics…</p></div>';
  const clean=s=>s.replace(/\(.*?\)/g,'').replace(/\[.*?\]/g,'').replace(/\bfeat\.?.*$/i,'').replace(/\bft\.?.*$/i,'').trim();
  const ct=clean(title), ca=clean(artist);
  const [r1,r2]=await Promise.all([lrclibGET(ct,ca), ct!==title||ca!==artist?lrclibGET(title,artist):Promise.resolve(null)]);
  for(const d of[r1,r2]){if(d?.syncedLyrics){const lines=buildWordTimings(parseLRC(d.syncedLyrics));if(lines.length){ST.lrc=lines;ST.lrcType='synced';renderSynced();return;}}}
  const [s1,s2]=await Promise.all([lrclibSEARCH(ct,ca), ct!==title||ca!==artist?lrclibSEARCH(title,artist):Promise.resolve(null)]);
  for(const d of[s1,s2]){if(d?.syncedLyrics){const lines=buildWordTimings(parseLRC(d.syncedLyrics));if(lines.length){ST.lrc=lines;ST.lrcType='synced';renderSynced();return;}}}
  scroll.innerHTML='<div class="lrc-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg><p>No synced lyrics found</p></div>';
}
async function lrclibGET(track,artist){try{const r=await fetch(`https://lrclib.net/api/get?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`,{headers:{'Lrclib-Client':'Wavelength/5.0'}});if(r.status===200)return await r.json();}catch{}return null;}
async function lrclibSEARCH(track,artist){try{const r=await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`,{headers:{'Lrclib-Client':'Wavelength/5.0'}});if(r.ok){const a=await r.json();if(a?.length)return a.find(x=>x.syncedLyrics)||a.find(x=>x.plainLyrics)||null;}}catch{}return null;}

function parseLRC(rawStr){
  return rawStr.split('\n').map(line=>{
    const m=line.match(/^\[(\d{1,3}):(\d{2}(?:\.\d+)?)\](.*)/);
    if(!m)return null;
    const ms=parseInt(m[1])*60000+parseFloat(m[2])*1000;
    const raw=m[3];
    const wTagRe=/<(\d{1,3}):(\d{2}\.\d+)>([^<]*)/g;
    let wm; const wTimed=[];
    while((wm=wTagRe.exec(raw))!==null){const wMs=parseInt(wm[1])*60000+parseFloat(wm[2])*1000;const word=wm[3].trim();if(word)wTimed.push({ms:wMs,word});}
    const text=raw.replace(/<[^>]+>/g,'').trim();
    return{ms,text,_wordTimed:wTimed.length>0?wTimed:null};
  }).filter(Boolean);
}
function syllableCount(word){word=word.toLowerCase().replace(/[^a-z]/g,'');if(!word)return 1;const vowels=word.match(/[aeiouy]+/g);let count=vowels?vowels.length:1;if(word.endsWith('e')&&word.length>2)count=Math.max(1,count-1);return Math.max(1,count);}
function buildWordTimings(lrc){
  return lrc.map((line,i)=>{
    const lineMs=line.ms, nextMs=lrc[i+1]?.ms??(lineMs+3500);
    const duration=Math.max(400,nextMs-lineMs-80);
    const rawWords=line.text.split(/\s+/).filter(Boolean);
    if(!rawWords.length){const gapMs=Math.max(400,nextMs-lineMs);const beatDur=Math.round(Math.min(900,Math.max(300,gapMs/4)));return{...line,words:[],beatDur};}
    if(line._wordTimed?.length)return{...line,words:line._wordTimed};
    const syls=rawWords.map(syllableCount);
    const totalSyls=syls.reduce((a,b)=>a+b,0);
    const usable=duration*0.90; let cursor=lineMs;
    const words=rawWords.map((word,wi)=>{
      const wordMs=cursor;
      const weight=syls[wi]*(word.replace(/[^a-z]/gi,'').length<=3?0.7:1);
      cursor+=(weight/syls.reduce((a,b,j)=>a+(b*(rawWords[j].replace(/[^a-z]/gi,'').length<=3?0.7:1)),0))*usable;
      return{ms:wordMs,word};
    });
    return{...line,words};
  });
}
function splitParen(text){const pm=text.match(/^(.*?)\s*\(([^)]+)\)\s*(.*)$/);if(pm){const main=(pm[1]+(pm[3]?' '+pm[3]:'')).trim();return{main:main||text,paren:pm[2]};}return{main:text,paren:null};}
function renderLineHTML(line,i){
  const{main,paren}=splitParen(line.text||'♪');
  const parenHTML=paren?`<span class="ll-paren">(${xe(paren)})</span>`:'';
  const isNote=!line.words?.length&&(!line.text||line.text.trim()==='♪'||line.text.trim()==='');
  let mainHTML;
  if(isNote){const beatDur=line.beatDur??600;mainHTML=`<span class="beat-dots" style="--beat-dur:${beatDur}ms"><span></span><span></span><span></span></span>`;}
  else{mainHTML=line.words?.length?line.words.map((w,wi)=>`<span class="lw upcoming" id="lw${i}_${wi}" style="--pct:0%">${xe(w.word)}</span>`).join(' '):xe(main);}
  return`<div class="ll" id="ll${i}" onclick="seekLrc(${i})">${mainHTML}${parenHTML}</div>`;
}
const _lwState={};
function renderSynced(){Object.keys(_lwState).forEach(k=>delete _lwState[k]);G('lscroll').innerHTML=ST.lrc.map((l,i)=>renderLineHTML(l,i)).join('');}
function seekLrc(i){if(ST.lrcType==='synced'&&ST.lrc[i])YT_player.seekTo(ST.lrc[i].ms/1000);}
function _setLwState(id,cls,pct){
  const prev=_lwState[id];
  if(prev&&prev.cls===cls&&(cls!=='now-word'||prev.pct===pct))return;
  _lwState[id]={cls,pct};
  const el=document.getElementById(id);
  if(!el)return;
  el.className='lw '+cls;
  el.style.setProperty('--pct',pct);
}
function tickLrc(posMs){
  if(!ST.lrc.length)return;
  const AHEAD=80; const t=posMs+AHEAD;
  let lo=0,hi=ST.lrc.length-1,active=0;
  while(lo<=hi){const mid=(lo+hi)>>1;if(ST.lrc[mid].ms<=t){active=mid;lo=mid+1;}else hi=mid-1;}
  if(active!==ST.lrcActive){
    const prev=ST.lrcActive; ST.lrcActive=active;
    const lines=document.querySelectorAll('#lscroll .ll');
    lines.forEach((el,i)=>{
      el.classList.remove('now','past','near','near2');
      const dist=i-active, absDist=Math.abs(dist);
      if(dist<0)el.classList.add('past');
      else if(absDist===1)el.classList.add('near');
      else if(absDist===2)el.classList.add('near2');
      if(i===active)el.classList.add('now');
      el.style.filter=absDist>=3?`blur(${Math.min(5,(absDist-2)*1.5).toFixed(1)}px)`:'';
    });
    document.getElementById('ll'+active)?.scrollIntoView({block:'center',behavior:'smooth'});
    if(prev>=0)(ST.lrc[prev]?.words||[]).forEach((w,wi)=>_setLwState('lw'+prev+'_'+wi,'done','100%'));
    (ST.lrc[active]?.words||[]).forEach((w,wi)=>{const id='lw'+active+'_'+wi;delete _lwState[id];_setLwState(id,'upcoming','0%');});
  }
  const words=ST.lrc[active]?.words;
  if(!words?.length)return;
  const nextLineMs=ST.lrc[active+1]?.ms??(t+4000);
  const lastWordEnd=Math.min(nextLineMs-50,words[words.length-1].ms+2200);
  for(let wi=0;wi<words.length;wi++){
    const wStart=words[wi].ms, wEnd=wi<words.length-1?words[wi+1].ms:lastWordEnd;
    const id='lw'+active+'_'+wi;
    if(t<wStart)_setLwState(id,'upcoming','0%');
    else if(t>=wEnd)_setLwState(id,'done','100%');
    else{const raw=(t-wStart)/(wEnd-wStart);const eased=raw<0.5?2*raw*raw:-1+(4-2*raw)*raw;_setLwState(id,'now-word',(eased*100).toFixed(1)+'%');}
  }
}

async function fetchArtistData(artistName){
  let artistImg=null, artistId=null;
  const al=artistName.toLowerCase();
  const artistData=await itunesFetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artistName)}&entity=musicArtist&limit=10&country=US`);
  if(artistData?.results){
    const match=artistData.results.find(r=>r.wrapperType==='artist'&&r.artistName?.toLowerCase()===al)||artistData.results.find(r=>r.wrapperType==='artist'&&r.artistName?.toLowerCase().includes(al))||artistData.results.find(r=>r.wrapperType==='artist');
    if(match)artistId=match.artistId;
  }
  let tracks=[];
  if(artistId){const ld=await itunesFetch(`https://itunes.apple.com/lookup?id=${artistId}&entity=song&limit=200&country=US`);tracks=(ld?.results||[]).filter(r=>r.wrapperType==='track'&&r.kind==='song');}
  if(!tracks.length){const ld=await itunesFetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artistName)}&media=music&entity=song&limit=50&country=US`);tracks=(ld?.results||[]).filter(t=>t.wrapperType==='track'&&t.kind==='song'&&t.artistName?.toLowerCase()===al);}
  if(tracks.length){const firstArt=tracks.find(t=>t.artworkUrl100)?.artworkUrl100;if(firstArt)artistImg=firstArt.replace('100x100bb','600x600bb');}
  const mbPhotoPromise=(async()=>{
    try{
      const mbRes=await fetch(`https://musicbrainz.org/ws/2/artist/?query=artist:%22${encodeURIComponent(artistName)}%22&limit=3&fmt=json`,{headers:{'User-Agent':'GhostMusic/2.0'}});
      if(!mbRes.ok)return null;
      const mbData=await mbRes.json();
      const mbArtist=mbData.artists?.find(a=>a.name?.toLowerCase()===al)||mbData.artists?.[0];
      if(!mbArtist?.id)return null;
      const ftRes=await fetch(`https://webservice.fanart.tv/v3/music/${mbArtist.id}?api_key=93ede23094c445c6b09ba012e1a04f09`);
      if(!ftRes.ok)return null;
      const ftData=await ftRes.json();
      return ftData.artistthumb?.[0]?.url||ftData.artistbackground?.[0]?.url||null;
    }catch{return null;}
  })();
  const photo=await Promise.race([mbPhotoPromise,new Promise(res=>setTimeout(()=>res(null),3000))]);
  if(photo)artistImg=photo;
  return{tracks:tracks.slice(0,50),artistImg};
}
function renderArtistProfile(artistName,tracks,heroImg,container){
  const avatarHTML=heroImg?`<img src="${heroImg}" alt="" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=\\"font-size:30px\\">🎤</span>'">`:`<span style="font-size:30px">🎤</span>`;
  const playAllId='apl_'+Math.random().toString(36).slice(2);
  window['_apl_'+playAllId]=tracks.map(t=>({title:t.trackName,artist:t.artistName||artistName,artSm:t.artworkUrl100||null,artLg:(t.artworkUrl100||'').replace('100x100bb','600x600bb')||null}));
  const rowsHTML=tracks.length?tracks.map((t,i)=>{
    const sm=t.artworkUrl100||'', lg=sm.replace('100x100bb','600x600bb');
    const artCell=sm?`<img src="${sm}" data-src="${sm}" onerror="proxyImgFallback(this)" alt="">`:'🎵';
    const id='apt_'+Math.random().toString(36).slice(2);
    (window._td=window._td||{})[id]={title:t.trackName,artist:t.artistName||artistName,artSm:sm||null,artLg:lg||null,durMs:t.trackTimeMillis||null};
    return`<div class="artist-track-row" onclick="pickTrack('${id}')">
      <div class="artist-track-num">${i+1}</div>
      <div class="artist-track-art">${artCell}</div>
      <div class="artist-track-inf"><div class="artist-track-t">${xe(t.trackName)}</div><div class="artist-track-alb">${xe(t.collectionName||'')}</div></div>
      <div class="artist-track-dur">${ms2t(t.trackTimeMillis||0)}</div>
      <div class="artist-track-add" onclick="event.stopPropagation();pickTrack('${id}')"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
    </div>`;
  }).join(''):'<div class="artist-loading" style="padding:28px 0"><span>No tracks found</span></div>';
  container.innerHTML=`
    <div class="artist-hero">
      <div class="artist-avatar">${avatarHTML}</div>
      <div class="artist-hero-info">
        <div class="artist-name-big">${xe(artistName)}</div>
        <div class="artist-meta">${tracks.length} song${tracks.length!==1?'s':''}</div>
        <button class="artist-play-all" onclick="playAllArtist('_apl_${playAllId}')">▶ Play All</button>
      </div>
    </div>
    <div class="artist-section-lbl">Songs</div>
    ${rowsHTML}
  `;
}
function playAllArtist(key){
  const tracks=window[key]; if(!tracks?.length)return;
  ST.queue=[]; ST.idx=-1; G('q-list').innerHTML='';
  tracks.forEach(t=>{const i=ST.queue.length;ST.queue.push({...t});appendQI(t,i);});
  loadTrack(0); showPanel('queue'); toast('Playing artist');
}
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;
  const ok=ytReady&&ST.idx>=0;
  switch(e.code){
    case 'Space':e.preventDefault();togglePlay();break;
    case 'ArrowRight':e.preventDefault();if(ok)YT_player.seekTo(YT_player.getCurrentTime()+10);break;
    case 'ArrowLeft':e.preventDefault();if(ok)YT_player.seekTo(Math.max(0,YT_player.getCurrentTime()-10));break;
    case 'ArrowUp':e.preventDefault();ST.vol=Math.min(1,ST.vol+.1);G('vol-f').style.width=(ST.vol*100)+'%';if(ytReady)YT_player.setVolume(ST.vol*100);break;
    case 'ArrowDown':e.preventDefault();ST.vol=Math.max(0,ST.vol-.1);G('vol-f').style.width=(ST.vol*100)+'%';if(ytReady)YT_player.setVolume(ST.vol*100);break;
    case 'KeyN':nextTrack();break;
    case 'KeyP':prevTrack();break;
    case 'KeyS':G('btn-sf').click();break;
    case 'KeyR':G('btn-rp').click();break;
    case 'KeyM':G('btn-vol').click();break;
    case 'KeyL':G('pnb-lyrics').click();break;
    case 'KeyH':G('btn-heart').click();break;
  }
});
</script>
