








<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost | music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --surf: #1c1c1e;
  --s2: #2c2c2e;
  --s3: #3a3a3c;
  --border: #38383a;
  --ink: #ffffff;
  --ink2: #b0b0b0;
  --ink3: #6e6e73;
  --pink: #fc3c6c;
  --pink2: #e8355f;
  --glow: rgba(252,60,108,.15);
  --red: #ff453a;
  --orange: #ff9f0a;
  --r: 14px;
  --rl: 20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}

.app{display:flex;height:100vh;padding:16px;gap:16px;overflow:hidden}

.left{
  display:flex;flex-direction:column;gap:16px;
  width:340px;flex-shrink:0;
}
.cover-wrap{
  flex:1;min-height:0;
  background:var(--surf);border-radius:var(--rl);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.cover-wrap .empty-cover{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  color:var(--ink3);font-size:13px;
}
.idlewave{display:flex;align-items:flex-end;gap:3px;height:30px}
.idlewave span{width:3.5px;background:var(--s3);border-radius:3px;animation:iw 2s ease-in-out infinite}
.idlewave span:nth-child(1){height:8px;animation-delay:0s}
.idlewave span:nth-child(2){height:16px;animation-delay:.18s}
.idlewave span:nth-child(3){height:24px;animation-delay:.36s}
.idlewave span:nth-child(4){height:12px;animation-delay:.54s}
.idlewave span:nth-child(5){height:20px;animation-delay:.72s}
@keyframes iw{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
.cover-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  display:none;
}
.cover-bg{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  filter:blur(60px) saturate(1.8) brightness(.4);opacity:0;
  transition:opacity .6s;pointer-events:none;
}
.cover-bg.on{opacity:1}
.cover-art{
  width:75%;aspect-ratio:1;border-radius:var(--rl);overflow:hidden;
  position:relative;z-index:1;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  display:none;
}
.cover-art img{width:100%;height:100%;object-fit:cover;display:block}
.cover-art.playing{}
.cover-info{
  position:absolute;bottom:20px;left:20px;right:20px;z-index:2;
  display:none;
}
.cover-title{font-size:18px;font-weight:700;letter-spacing:-.3px;text-shadow:0 2px 10px rgba(0,0,0,.6)}
.cover-artist{font-size:13px;color:var(--pink);margin-top:2px;text-shadow:0 2px 10px rgba(0,0,0,.5)}

.controls-wrap{
  background:var(--surf);border-radius:var(--rl);
  padding:16px 20px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;
}
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:12px}
.icb{width:36px;height:36px;background:none;border:none;cursor:pointer;color:var(--ink3);border-radius:50%;display:grid;place-items:center;transition:color .14s,background .14s;flex-shrink:0}
.icb svg{width:18px;height:18px}
.icb:hover{color:var(--ink);background:var(--s2)}
.icb.on{color:var(--pink)}
.play-btn{width:50px;height:50px;flex-shrink:0;background:var(--ink);color:var(--bg);border:none;border-radius:50%;cursor:pointer;display:grid;place-items:center;transition:transform .15s}
.play-btn svg{width:22px;height:22px}
.play-btn:hover{transform:scale(1.08)}
.play-btn:active{transform:scale(.95)}
.prog-row{display:flex;align-items:center;gap:8px}
.tt{font-size:10px;color:var(--ink3);font-variant-numeric:tabular-nums;min-width:32px;font-weight:500}
.tt.r{text-align:right}
.prog{flex:1;height:4px;background:var(--s3);border-radius:4px;cursor:pointer;position:relative;transition:height .14s}
.prog:hover{height:6px}
.prog-f{height:100%;background:var(--ink3);border-radius:4px;position:relative;pointer-events:none;transition:background .2s}
.prog:hover .prog-f{background:var(--pink)}
.prog-dot{position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;background:var(--ink);border-radius:50%;opacity:0;transition:opacity .14s;pointer-events:none}
.prog:hover .prog-dot{opacity:1}
.vol-row{display:flex;align-items:center;gap:8px;justify-content:center}
.vol{width:100px;height:4px;background:var(--s3);border-radius:4px;cursor:pointer;position:relative;transition:height .14s}
.vol:hover{height:6px}
.vol-f{height:100%;background:var(--ink3);border-radius:4px;pointer-events:none;transition:background .2s}
.vol:hover .vol-f{background:var(--pink)}

.right{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;overflow:hidden}
.search-row{position:relative;flex-shrink:0}
.search-box{
  display:flex;align-items:center;gap:9px;
  background:var(--surf);border:1.5px solid transparent;
  border-radius:var(--r);padding:12px 16px;
  transition:border-color .18s,box-shadow .18s
}
.search-box:focus-within{border-color:var(--pink);box-shadow:0 0 0 3px var(--glow)}
.search-box svg{width:16px;height:16px;color:var(--ink3);flex-shrink:0}
.search-box input{border:none;background:transparent;outline:none;font-family:inherit;font-size:14px;color:var(--ink);width:100%}
.search-box input::placeholder{color:var(--ink3)}
.spin{width:14px;height:14px;flex-shrink:0;border:2px solid var(--s3);border-top-color:var(--pink);border-radius:50%;animation:spin .55s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.drop{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  z-index:400;max-height:370px;overflow-y:auto;display:none
}
.di{display:flex;align-items:center;gap:11px;padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--s2);transition:background .12s}
.di:last-child{border-bottom:none}
.di:hover{background:var(--s2)}
.di:hover .di-add{opacity:1}
.di-art{width:42px;height:42px;border-radius:8px;background:var(--s2);overflow:hidden;flex-shrink:0;display:grid;place-items:center;font-size:17px}
.di-art img{width:100%;height:100%;object-fit:cover;display:block}
.di-inf{flex:1;min-width:0}
.di-t{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.di-s{font-size:11.5px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.di-dur{font-size:11px;color:var(--ink3);flex-shrink:0}
.di-add{width:26px;height:26px;border-radius:50%;background:var(--pink);display:grid;place-items:center;flex-shrink:0;opacity:0;transition:opacity .14s}
.di-add svg{width:13px;height:13px;fill:#fff}
.drop-msg{padding:18px;text-align:center;font-size:13px;color:var(--ink3);line-height:1.6}

.content-area{
  flex:1;min-height:0;position:relative;
  background:var(--surf);border-radius:var(--rl);
  overflow:hidden;
}
.results-panel,.lyrics-panel{
  position:absolute;inset:0;
  transition:opacity .3s ease;
}
.results-panel{padding:16px;opacity:1;overflow-y:auto;}
.results-panel.hidden{opacity:0;pointer-events:none}
.lyrics-panel{
  opacity:0;pointer-events:none;overflow:hidden;
}
.lyrics-panel.active{opacity:1;pointer-events:auto}
.lrc-scroll-outer{
  position:absolute;inset:0;overflow-y:auto;
  padding:30px 24px 80px;
  z-index:1;
}
.lrc-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:blur(40px) saturate(1.6) brightness(.35);
  transform:scale(1.15);
  opacity:0;transition:opacity .8s ease;
  pointer-events:none;z-index:0;
}
.lrc-bg.on{opacity:1}
#lscroll{position:relative;z-index:1;}
.lrc-empty-state-wrap{position:relative;z-index:1;}

.lyric-toggle{
  position:absolute;bottom:14px;right:14px;z-index:10;
  width:40px;height:40px;border-radius:50%;
  background:var(--s2);border:1px solid var(--border);
  display:grid;place-items:center;cursor:pointer;
  transition:background .15s,color .15s,transform .15s;
  color:var(--ink3);
}
.lyric-toggle:hover{background:var(--s3);color:var(--ink);transform:scale(1.05)}
.lyric-toggle.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.lyric-toggle svg{width:18px;height:18px}

.q-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink3);margin-bottom:10px}
.qi{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;cursor:pointer;transition:background .12s;position:relative}
.qi:hover{background:var(--s2)}
.qi.now{background:rgba(252,60,108,.1)}
.qi.now .qi-t{color:var(--pink);font-weight:600}
.qi-th{width:40px;height:40px;border-radius:8px;background:var(--s2);overflow:hidden;flex-shrink:0;display:grid;place-items:center;font-size:15px;position:relative}
.qi-th img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px}
.now-ind{position:absolute;inset:0;border-radius:8px;background:rgba(252,60,108,.85);display:flex;align-items:center;justify-content:center}
.bars{display:flex;align-items:flex-end;gap:2px;height:14px}
.bars b{width:2.5px;background:#fff;border-radius:2px;animation:ba .7s ease-in-out infinite}
.bars b:nth-child(2){animation-name:bb}
.bars b:nth-child(3){animation-name:bc}
@keyframes ba{0%,100%{height:4px}50%{height:12px}}
@keyframes bb{0%,100%{height:9px}50%{height:4px}}
@keyframes bc{0%,100%{height:5px}50%{height:13px}}
.qi-inf{flex:1;min-width:0}
.qi-t{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.qi-a{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.qi-rm{width:22px;height:22px;border:none;background:none;color:var(--ink3);font-size:16px;line-height:1;border-radius:50%;cursor:pointer;display:none;place-items:center;transition:background .12s,color .12s}
.qi:hover .qi-rm{display:grid}
.qi-rm:hover{background:var(--s3);color:var(--red)}

.ll{
  font-size:28px;line-height:1.35;font-weight:800;
  padding:4px 0;border-radius:8px;cursor:pointer;
  color:rgba(255,255,255,0.22);
  filter:blur(3px);
  opacity:.7;
  transform-origin:left center;
  transition:
    color .55s cubic-bezier(.4,0,.2,1),
    filter .55s cubic-bezier(.4,0,.2,1),
    opacity .55s cubic-bezier(.4,0,.2,1),
    font-size .4s cubic-bezier(.34,1.56,.64,1);
  will-change:color,filter,opacity;
}
.ll.past{
  color:rgba(255,255,255,0.12);
  filter:blur(4px);
  opacity:.45;
}
.ll.near{
  color:rgba(255,255,255,0.5);
  filter:blur(1.5px);
  opacity:.85;
  font-size:26px;
}
.ll.near2{
  color:rgba(255,255,255,0.32);
  filter:blur(2.5px);
  opacity:.6;
  font-size:24px;
}
.ll.now{
  color:#ffffff;
  font-size:32px;
  filter:blur(0px);
  opacity:1;
}
.ll-paren{
  display:block;font-size:.58em;font-weight:600;
  color:rgba(255,255,255,0.45);margin-top:3px;
}
.ll.now .ll-paren{color:rgba(255,255,255,0.7)}

.ll.now .lw{
  display:inline-block;
  background:linear-gradient(to right,
    #ffffff calc(var(--pct, 0%) - 6%),
    rgba(255,255,255,0.55) var(--pct, 0%),
    rgba(255,255,255,0.28) calc(var(--pct, 0%) + 4%)
  );
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}
.ll.now .lw.done{
  --pct:100%;
  filter:drop-shadow(0 0 5px rgba(255,255,255,0.26));
}
.ll.now .lw.upcoming{
  --pct:0%;
  filter:none;
}
.ll.now .lw.now-word{
  filter:drop-shadow(0 0 6px rgba(255,255,255,0.32));
}

.ll:hover:not(.now){filter:blur(0px);color:rgba(255,255,255,0.6)}

/* ♪ beat dots */
.beat-dots{
  display:inline-flex;align-items:flex-end;gap:7px;
  height:1em;vertical-align:middle;
}
.beat-dots span{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.28);
  display:inline-block;
  transform:translateY(0);
  transition:background .3s;
}
.ll.now .beat-dots span{
  background:#ffffff;
  animation:beatbounce var(--beat-dur,600ms) ease-in-out infinite;
}
.ll.now .beat-dots span:nth-child(2){animation-delay:calc(var(--beat-dur,600ms) / 3)}
.ll.now .beat-dots span:nth-child(3){animation-delay:calc(var(--beat-dur,600ms) / 3 * 2)}
@keyframes beatbounce{
  0%,100%{transform:translateY(0)}
  40%{transform:translateY(-10px)}
  60%{transform:translateY(-8px)}
}
.lrc-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--ink3);text-align:center}
.lrc-empty svg{width:38px;height:38px;opacity:.22}
.lrc-empty p{font-size:13px}


.q-empty-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--ink3);font-size:13px;text-align:center;line-height:1.6}

.panel-nav{
  position:absolute;bottom:14px;right:14px;z-index:10;
  display:flex;flex-direction:column;gap:6px;align-items:center;
}
.pnb{
  width:40px;height:40px;border-radius:50%;
  background:var(--s2);border:1px solid var(--border);
  display:grid;place-items:center;cursor:pointer;
  transition:background .15s,color .15s,transform .15s,border-color .15s;
  color:var(--ink3);
}
.pnb svg{width:18px;height:18px}
.pnb:hover{background:var(--s3);color:var(--ink);transform:scale(1.05)}
.pnb.active{background:var(--pink);color:#fff;border-color:var(--pink)}

.side-panel{
  position:absolute;inset:0;padding:16px 16px 60px;
  overflow-y:auto;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
.side-panel.active{opacity:1;pointer-events:auto}
.panel-hdr{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--ink3);margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.panel-hdr button{
  background:var(--pink);border:none;color:#fff;
  font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;
  cursor:pointer;letter-spacing:.3px;
}

.lk-empty{height:80%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--ink3);font-size:13px}
.lk-empty svg{width:34px;height:34px;opacity:.2}
.lk-row{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:10px;cursor:pointer;transition:background .12s}
.lk-row:hover{background:var(--s2)}
.lk-row:hover .lk-rm{opacity:1}
.lk-thumb{width:38px;height:38px;border-radius:7px;background:var(--s2);flex-shrink:0;overflow:hidden;display:grid;place-items:center;font-size:14px}
.lk-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.lk-inf{flex:1;min-width:0}
.lk-t{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lk-a{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.lk-rm{opacity:0;background:none;border:none;color:var(--ink3);font-size:16px;cursor:pointer;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;transition:background .12s,color .12s,opacity .12s;flex-shrink:0}
.lk-rm:hover{background:var(--s3);color:var(--red)}

.heart-btn{
  position:absolute;top:14px;right:14px;z-index:3;
  width:34px;height:34px;border-radius:50%;
  background:rgba(0,0,0,.4);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);
  display:grid;place-items:center;cursor:pointer;
  transition:background .15s,transform .15s;color:rgba(255,255,255,.5);
}
.heart-btn svg{width:16px;height:16px;transition:color .2s,fill .2s}
.heart-btn.liked{color:var(--pink)}
.heart-btn.liked svg{fill:var(--pink)}
.heart-btn:hover{transform:scale(1.1)}

.pl-grid{display:flex;flex-direction:column;gap:8px}
.pl-card{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:12px;
  background:var(--s2);cursor:pointer;
  transition:background .12s;position:relative;
}
.pl-card:hover{background:var(--s3)}
.pl-card:hover .pl-del{opacity:1}
.pl-cover{
  width:44px;height:44px;border-radius:8px;
  background:var(--s3);flex-shrink:0;overflow:hidden;
  display:grid;place-items:center;font-size:18px;
  position:relative;
}
.pl-cover-grid{display:grid;grid-template-columns:1fr 1fr;width:100%;height:100%}
.pl-cover-grid img{width:100%;height:100%;object-fit:cover;display:block}
.pl-inf{flex:1;min-width:0}
.pl-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-count{font-size:11px;color:var(--ink3);margin-top:1px}
.pl-del{opacity:0;background:none;border:none;color:var(--ink3);cursor:pointer;font-size:16px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;transition:opacity .12s,background .12s,color .12s}
.pl-del:hover{background:var(--s3);color:var(--red)}

.pl-detail-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-shrink:0}
.pl-back{background:none;border:none;color:var(--ink3);cursor:pointer;width:28px;height:28px;display:grid;place-items:center;border-radius:50%;transition:background .12s,color .12s}
.pl-back:hover{background:var(--s2);color:var(--ink)}
.pl-back svg{width:16px;height:16px}
.pl-detail-name{font-size:15px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-play-all{background:var(--pink);border:none;color:#fff;font-size:11px;font-weight:600;padding:5px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}

.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  z-index:800;display:none;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surf);border:1px solid var(--border);
  border-radius:20px;padding:20px;width:300px;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-input{
  width:100%;background:var(--s2);border:1.5px solid transparent;
  border-radius:10px;padding:10px 12px;color:var(--ink);
  font-family:inherit;font-size:13px;outline:none;margin-bottom:10px;
  transition:border-color .15s;
}
.modal-input:focus{border-color:var(--pink)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:7px 16px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.modal-cancel{background:var(--s2);color:var(--ink3)}
.modal-ok{background:var(--pink);color:#fff}
.modal-pl-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:200px;overflow-y:auto}
.modal-pl-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .12s}
.modal-pl-row:hover{background:var(--s2)}
.modal-pl-thumb{width:32px;height:32px;border-radius:6px;background:var(--s3);flex-shrink:0;display:grid;place-items:center;font-size:13px;overflow:hidden}
.modal-pl-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.modal-pl-name{font-size:13px;font-weight:500;color:var(--ink)}

.ctx-menu{
  position:fixed;z-index:900;
  background:var(--surf);border:1px solid var(--border);
  border-radius:12px;padding:6px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  min-width:170px;display:none;
}
.ctx-menu.open{display:block}
.ctx-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:8px;cursor:pointer;
  font-size:13px;color:var(--ink);transition:background .1s;
}
.ctx-item svg{width:15px;height:15px;color:var(--ink3);flex-shrink:0}
.ctx-item:hover{background:var(--s2)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger svg{color:var(--red)}

#yt-host{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);color:var(--ink);padding:10px 22px;border-radius:28px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;z-index:999;white-space:nowrap;transition:opacity .22s,transform .22s;backdrop-filter:blur(20px);border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.status-pill{
  position:absolute;top:12px;left:12px;z-index:5;
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:20px;
  padding:4px 10px;font-size:10px;color:var(--ink3);
}
.st-dot{width:6px;height:6px;border-radius:50%;background:var(--s3);transition:background .3s}
.st-dot.ok{background:#30d158}
.st-dot.err{background:var(--red)}
.st-dot.loading{background:var(--orange);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.artist-panel-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center top;
  filter:blur(50px) saturate(1.4) brightness(.25);
  transform:scale(1.2);
  pointer-events:none;z-index:0;
  opacity:0;transition:opacity .7s;
}
.artist-panel-bg.on{opacity:1}
.artist-panel-inner{position:relative;z-index:1;padding:20px 18px 70px;}
.artist-hero{display:flex;align-items:flex-end;gap:16px;margin-bottom:24px;}
.artist-avatar{
  width:90px;height:90px;border-radius:50%;
  background:var(--s2);flex-shrink:0;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:grid;place-items:center;font-size:32px;
}
.artist-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.artist-hero-info{flex:1;min-width:0}
.artist-name-big{font-size:26px;font-weight:900;letter-spacing:-.5px;line-height:1.1}
.artist-meta{font-size:12px;color:var(--ink3);margin-top:4px}
.artist-play-all{
  background:var(--pink);border:none;color:#fff;
  font-size:12px;font-weight:700;padding:8px 18px;
  border-radius:20px;cursor:pointer;margin-top:10px;
  transition:transform .15s;
}
.artist-play-all:hover{transform:scale(1.05)}
.artist-section-lbl{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--ink3);margin-bottom:10px;
}
.artist-track-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:10px;cursor:pointer;
  transition:background .12s;
}
.artist-track-row:hover{background:rgba(255,255,255,.07)}
.artist-track-num{width:22px;text-align:right;font-size:12px;color:var(--ink3);flex-shrink:0}
.artist-track-art{width:38px;height:38px;border-radius:6px;background:var(--s2);flex-shrink:0;overflow:hidden;display:grid;place-items:center;font-size:14px}
.artist-track-art img{width:100%;height:100%;object-fit:cover;display:block}
.artist-track-inf{flex:1;min-width:0}
.artist-track-t{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artist-track-alb{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.artist-track-dur{font-size:11px;color:var(--ink3);flex-shrink:0}
.artist-track-add{width:24px;height:24px;border-radius:50%;background:var(--pink);display:grid;place-items:center;flex-shrink:0;opacity:0;transition:opacity .14s;flex-shrink:0}
.artist-track-add svg{width:12px;height:12px;fill:#fff}
.artist-track-row:hover .artist-track-add{opacity:1}
.artist-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--ink3);font-size:13px}
.artist-loading .spin{display:block !important}

@media(max-width:768px){
  .app{flex-direction:column;padding:10px;gap:10px}
  .left{width:100%;flex-direction:row;gap:10px;flex-shrink:0;height:auto}
  .cover-wrap{
    width:140px;height:140px;flex:none;border-radius:var(--r);
  }
  .cover-art{width:85%;border-radius:12px}
  .cover-info{display:none !important}
  .controls-wrap{flex:1;border-radius:var(--r);padding:12px;justify-content:center}
  .play-btn{width:44px;height:44px}
  .play-btn svg{width:20px;height:20px}
  .vol-row{display:none}
  .right{flex:1;min-height:0}
  .content-area{border-radius:var(--r)}
  .ll.now{font-size:22px}
  .ll{font-size:18px}
}
@media(max-width:480px){
  .cover-wrap{width:110px;height:110px}
  .icb{width:30px;height:30px}
  .icb svg{width:15px;height:15px}
  .ctrl-row{gap:8px}
  .play-btn{width:40px;height:40px}
  .play-btn svg{width:18px;height:18px}
}
</style>
</head>
<body>

<div id="yt-host"><div id="yt-player"></div></div>
<div class="toast" id="toast"></div>

<div class="app">
  <div class="left">
    <div class="cover-wrap" id="cover-wrap">
      <img class="cover-bg" id="cv-bg" src="" alt="">
      <div class="empty-cover" id="empty-cover">
        <div class="idlewave"><span></span><span></span><span></span><span></span><span></span></div>
        <span>Nothing playing</span>
      </div>
      <div class="cover-art" id="cover-art">
        <img id="cv-img" src="" alt="">
      </div>

      <button class="heart-btn" id="btn-heart" title="Like (H)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <div class="status-pill">
        <div class="st-dot loading" id="sc-dot"></div>
        <span id="sc-status-txt">Loading…</span>
      </div>
    </div>

    <div class="controls-wrap">
      <div class="ctrl-row">
        <button class="icb" id="btn-sf" title="Shuffle (S)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button class="icb" id="btn-pv" title="Previous (P)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="play-btn" id="btn-pp">

        </button>
        <button class="icb" id="btn-rp" title="Repeat (R)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="prog-row">
        <span class="tt" id="t-c">0:00</span>
        <div class="prog" id="prog"><div class="prog-f" id="prog-f" style="width:0%"><div class="prog-dot"></div></div></div>
        <span class="tt r" id="t-d">0:00</span>

      <div class="vol-row">
        <button class="icb" id="btn-vol" style="width:28px;height:28px">
          <svg id="vol-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </button>
        <div class="vol" id="vol-tr"><div class="vol-f" id="vol-f" style="width:80%"></div></div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="search-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="q-in" type="text" placeholder="Search songs, artists…" autocomplete="off" spellcheck="false">
        <div class="spin" id="q-spin"></div>
      </div>
      <div class="drop" id="q-drop"></div>
    </div>

    <div class="content-area">
      <div class="results-panel" id="results-panel">
        <div id="q-list">
          <div class="q-empty-msg">
            <div class="idlewave"><span></span><span></span><span></span><span></span><span></span></div>
            Search for any song above
          </div>
        </div>
      </div>

      <div class="lyrics-panel" id="lyrics-panel">
        <div class="lrc-bg" id="lrc-bg"></div>
        <div class="lrc-scroll-outer" id="lrc-scroll-outer">
          <div class="lrc-empty-state-wrap">
            <div class="lrc-empty" id="lrc-empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/>
              </svg>
              <p>Play a track to see lyrics</p>
            </div>
          </div>
          <div id="lscroll"></div>
        </div>
      </div>

      <div class="side-panel" id="likes-panel">
        <div class="panel-hdr"><span>Liked Songs</span></div>
        <div id="likes-list"><div class="lk-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><p>No liked songs yet</p></div></div>
      </div>

      <div class="side-panel" id="playlists-panel">
        <div class="panel-hdr"><span>Playlists</span><button onclick="openNewPlaylistModal()">+ New</button></div>
        <div class="pl-grid" id="pl-grid"><div class="lk-empty" style="height:60%;justify-content:center"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:34px;height:34px;opacity:.2"><path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg><p>No playlists yet</p></div></div>
      </div>

      <div class="side-panel" id="pl-detail-panel">
        <div class="pl-detail-hdr">
          <button class="pl-back" onclick="showPanel('playlists')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div class="pl-detail-name" id="pl-detail-name">Playlist</div>
          <button class="pl-play-all" onclick="playPlaylist()">Play All</button>

        <div id="pl-detail-list"></div>
      </div>



      <div class="side-panel" id="artist-panel" style="padding:0;overflow:hidden;">
        <div class="artist-panel-bg" id="artist-bg"></div>
        <div style="position:absolute;top:12px;left:12px;z-index:10;">
          <button class="pl-back" id="artist-back" onclick="showPanel('queue')" style="background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        </div>
        <div class="lrc-scroll-outer" style="z-index:1;padding-top:16px;">
          <div class="artist-panel-inner" id="artist-panel-inner">
            <div class="artist-loading"><div class="spin"></div><span>Loading artist…</span></div>
          </div>
        </div>
      </div>

      <div class="panel-nav">
        <button class="pnb" id="pnb-lyrics" title="Lyrics (L)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h10M4 18h14"/></svg>
        </button>
        <button class="pnb" id="pnb-likes" title="Liked Songs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <button class="pnb" id="pnb-playlists" title="Playlists">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>

</div>

<div class="modal-bg" id="modal-atp">
  <div class="modal">
    <div class="modal-title" id="modal-atp-title">Add to Playlist</div>
    <div class="modal-pl-list" id="modal-pl-list"></div>
    <div class="modal-btns"><button class="modal-cancel" onclick="closeModal('modal-atp')">Cancel</button><button class="modal-ok" onclick="createPlaylistFromModal()">New Playlist</button></div>
  </div>
</div>
<div class="modal-bg" id="modal-newpl">
  <div class="modal">
    <div class="modal-title">New Playlist</div>
    <input class="modal-input" id="newpl-input" placeholder="Playlist name…" maxlength="40">
    <div class="modal-btns"><button class="modal-cancel" onclick="closeModal('modal-newpl')">Cancel</button><button class="modal-ok" onclick="confirmNewPlaylist()">Create</button></div>
  </div>
</div>
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" id="ctx-like" onclick="ctxLike()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span id="ctx-like-lbl">Like</span></div>
  <div class="ctx-item" onclick="ctxAddToPlaylist()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add to Playlist</div>
  <div class="ctx-item" onclick="ctxPlayNext()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>Play Next</div>
  <div class="ctx-item danger" onclick="ctxRemove()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>Remove</div>
</div>

<script>
'use strict';
let activePanel = 'queue';

function showPanel(name) {
  activePanel = name;

  G('results-panel').classList.toggle('hidden', name !== 'queue');
  G('lyrics-panel').classList.toggle('active', name === 'lyrics');
  G('likes-panel').classList.toggle('active', name === 'likes');
  G('playlists-panel').classList.toggle('active', name === 'playlists');
  G('pl-detail-panel').classList.toggle('active', name === 'pl-detail');
  G('artist-panel').classList.toggle('active', name === 'artist');

  if (name === 'lyrics' && ST.lrcType === 'synced') {
    renderSynced();
    // Snap immediately to current playback position so lyrics aren't "off"
    requestAnimationFrame(() => tickLrc(getPrecisePos()));
  }


  G('pnb-lyrics').classList.toggle('active', name === 'lyrics');
  G('pnb-likes').classList.toggle('active', name === 'likes');
  G('pnb-playlists').classList.toggle('active', name === 'playlists' || name === 'pl-detail');
}

G('pnb-lyrics').addEventListener('click', () => showPanel(activePanel === 'lyrics' ? 'queue' : 'lyrics'));
G('pnb-likes').addEventListener('click', () => showPanel(activePanel === 'likes' ? 'queue' : 'likes'));
G('pnb-playlists').addEventListener('click', () => showPanel(activePanel === 'playlists' || activePanel === 'pl-detail' ? 'queue' : 'playlists'));

let likes = JSON.parse(localStorage.getItem('ghost_likes') || '[]');
function saveLikes() { try { localStorage.setItem('ghost_likes', JSON.stringify(likes)); } catch {} }

function isLiked(track) {
  const key = (track.title || track.trackName || '') + '||' + (track.artist || track.artistName || '');
  return likes.some(l => l._key === key);
}
function trackKey(track) {
  return (track.title || track.trackName || '') + '||' + (track.artist || track.artistName || '');
}
function toggleLike(track) {
  const key = trackKey(track);
  const idx = likes.findIndex(l => l._key === key);
  if (idx >= 0) {
    likes.splice(idx, 1);
    toast('Removed from Liked Songs');
  } else {
    likes.unshift({ title: track.title||track.trackName, artist: track.artist||track.artistName, artSm: track.artSm||track.artworkUrl100||null, artLg: track.artLg||track._artLgOverride||null, _key: key });
    toast('♥ Added to Liked Songs');
  }
  saveLikes();
  renderLikes();
  syncHeartBtn();
}
function syncHeartBtn() {
  const cur = ST.queue[ST.idx];
  const liked = cur && isLiked(cur);
  G('btn-heart').classList.toggle('liked', !!liked);
}
function renderLikes() {
  const el = G('likes-list');
  if (!likes.length) { el.innerHTML = '<div class="lk-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><p>No liked songs yet</p></div>'; return; }
  el.innerHTML = likes.map((lk, i) => `<div class="lk-row" onclick="playLikedSong(${i})">
    <div class="lk-thumb">${lk.artSm ? `<img src="${x(lk.artSm)}" alt="">` : '🎵'}</div>
    <div class="lk-inf"><div class="lk-t">${x(lk.title)}</div><div class="lk-a">${x(lk.artist)}</div></div>
    <button class="lk-rm" onclick="event.stopPropagation();unlikeAt(${i})" title="Unlike">×</button>
  </div>`).join('');
}
function playLikedSong(i) {
  const lk = likes[i]; if (!lk) return;
  addAndPlay({ title: lk.title, artist: lk.artist, artSm: lk.artSm, artLg: lk.artLg });
  showPanel('queue');
}
function unlikeAt(i) { likes.splice(i, 1); saveLikes(); renderLikes(); syncHeartBtn(); }
renderLikes();

G('btn-heart').addEventListener('click', () => {
  const cur = ST.queue[ST.idx]; if (!cur) { toast('Nothing playing'); return; }
  toggleLike(cur);
});

let playlists = JSON.parse(localStorage.getItem('ghost_playlists') || '[]');
let activePlId = null;
function savePlaylists() { try { localStorage.setItem('ghost_playlists', JSON.stringify(playlists)); } catch {} }

function renderPlaylists() {
  const el = G('pl-grid');
  if (!playlists.length) { el.innerHTML = '<div class="lk-empty" style="height:60%;justify-content:center"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:34px;height:34px;opacity:.2"><path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg><p>No playlists yet</p></div>'; return; }
  el.innerHTML = playlists.map((pl, i) => {
    const arts = pl.tracks.slice(0,4).map(t => t.artSm).filter(Boolean);
    const thumbHTML = arts.length >= 4
      ? `<div class="pl-cover-grid">${arts.map(a=>`<img src="${x(a)}" alt="">`).join('')}</div>`
      : arts.length ? `<img src="${x(arts[0])}" alt="" style="width:100%;height:100%;object-fit:cover">` : '🎵';
    return `<div class="pl-card" onclick="openPlaylist(${i})">
      <div class="pl-cover">${thumbHTML}</div>
      <div class="pl-inf"><div class="pl-name">${x(pl.name)}</div><div class="pl-count">${pl.tracks.length} song${pl.tracks.length!==1?'s':''}</div></div>
      <button class="pl-del" onclick="event.stopPropagation();deletePlaylist(${i})" title="Delete">×</button>
    </div>`;
  }).join('');
}
function openPlaylist(i) {
  activePlId = i;

// Universal proxy-aware fetch — tries direct first, then multiple CORS proxies
// Works even when school blocks the target domain directly
const PROXIES = [
  u => u, // direct
  u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
  u => 'https://thingproxy.freeboard.io/fetch/' + u,
];

async function proxyFetch(url, opts = {}, timeoutMs = 5000) {
  const tryOne = proxy => new Promise(async (res, rej) => {
    try {
      const r = await fetch(proxy(url), { ...opts, signal: AbortSignal.timeout(timeoutMs) });
      if (r.ok) res(r); else rej(r.status);
    } catch(e) { rej(e); }
  });
  // Fire all in parallel, return first success
  return Promise.any(PROXIES.map(tryOne));
}

let YT_player = null, ytReady = false, ticker = null;
let _lastYtPollMs = 0, _lastYtPosMs = 0;

function getPrecisePos() {
  const elapsed = performance.now() - _lastYtPollMs;
  return _lastYtPosMs + (ST.playing ? Math.min(elapsed, 300) : 0);
}

window.onYouTubeIframeAPIReady = function() {
  YT_player = new YT.Player('yt-player', {
    videoId: '',
    playerVars: { autoplay:0, controls:0, rel:0, modestbranding:1, origin:window.location.origin },
    events: {
      onReady(e) {
        ytReady = true;
        e.target.setVolume(ST.vol * 100);
        setStatus('ok', 'Ready');
      },
      onStateChange(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          ST.playing = true; syncPP();
          G('cover-art').classList.add('playing');
          clearInterval(ticker);
          ticker = setInterval(() => {
            ST.pos = YT_player.getCurrentTime() * 1000;
            ST.dur = YT_player.getDuration() * 1000;
            _lastYtPosMs = ST.pos;
            _lastYtPollMs = performance.now();
            syncBar();
          }, 250);
          if (!ST._rafRunning) {
            ST._rafRunning = true;
            const rafLoop = () => {
              if (!ST._rafRunning) return;
              if (ST.lrcType === 'synced') tickLrc(getPrecisePos());
              requestAnimationFrame(rafLoop);
            };
            requestAnimationFrame(rafLoop);
          }
        } else if (e.data === YT.PlayerState.PAUSED) {
          ST.playing = false; syncPP();
          G('cover-art').classList.remove('playing');
          clearInterval(ticker); ST._rafRunning = false;
        } else if (e.data === YT.PlayerState.ENDED) {
          ST.playing = false; syncPP();
          G('cover-art').classList.remove('playing');
          clearInterval(ticker); ST._rafRunning = false;
          if (ST.repeat) { YT_player.seekTo(0); YT_player.playVideo(); }
          else nextTrack();
        }
      },
      onError(e) {
        const track = ST.queue[ST.idx];
        if (track?.ytIds?.length > (track.ytTry||0) + 1) {
          track.ytTry = (track.ytTry||0) + 1;
          YT_player.loadVideoById(track.ytIds[track.ytTry]);
        } else {
          setStatus('err', 'Video unavailable');
          toast('⚠ Video unavailable — try another');
        }
      }
    }
  });
};

// Load IFrame API — try youtube.com then youtube-nocookie.com
(function loadYTAPI() {
  setStatus('loading', 'Connecting…');
  function tryScript(src, cb) {
    const s = document.createElement('script');
    s.src = src; s.onload = cb;
    s.onerror = () => cb(true);
    document.head.appendChild(s);
  }
  tryScript('https://www.youtube.com/iframe_api', function(err) {
    if (!err) return; // success — onYouTubeIframeAPIReady will fire
    // youtube.com blocked, try nocookie
    tryScript('https://www.youtube-nocookie.com/iframe_api', function(err2) {
      if (err2) {
        setStatus('err', 'YouTube blocked');
        toast('⚠ YouTube is blocked on this network');
      }
    });
  });
  setTimeout(() => { if (!ytReady) setStatus('err', 'YouTube blocked'); }, 12000);
})();

const ytCache = {};

async function findVideoIds(artist, title) {
  const ck = (artist + '||' + title).toLowerCase();
  if (ytCache[ck]?.length) return ytCache[ck];

  const searchQ = artist + ' ' + title + ' audio';

  function extractIds(html) {
    const matches = [...html.matchAll(/"videoId":"([a-zA-Z0-9_-]{11})"/g)];
    return [...new Set(matches.map(m => m[1]))].slice(0, 6);
  }

  // Method 1: scrape YouTube search via proxyFetch (races all proxies)
  try {
    const ytUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(searchQ);
    const r = await proxyFetch(ytUrl, {}, 6000);
    const html = await r.text();
    const ids = extractIds(html);
    if (ids.length) { ytCache[ck] = ids; return ids; }
  } catch {}

  // Method 2: Invidious JSON API (different servers, different block lists)
  const invidious = [
    'https://inv.nadeko.net',
    'https://invidious.privacyredirect.com',
    'https://yt.cdaut.de',
    'https://iv.melmac.space',
  ];
  const q = encodeURIComponent(searchQ);
  const tryInv = host => new Promise(async (res, rej) => {
    try {
      const r = await fetch(`${host}/api/v1/search?q=${q}&type=video&fields=videoId`, {
        signal: AbortSignal.timeout(4000)
      });
      if (!r.ok) return rej();
      const d = await r.json();
      const ids = (Array.isArray(d) ? d : []).map(v => v.videoId).filter(Boolean).slice(0, 6);
      if (ids.length) res(ids); else rej();
    } catch { rej(); }
  });
  try {
    const ids = await Promise.any(invidious.map(tryInv));
    ytCache[ck] = ids; return ids;
  } catch {}

  throw new Error('search failed');
}

// iTunes fetch — direct first, then CORS proxies in parallel as fallback
async function itunesFetch(url) {
  // Try direct fetch first (works on personal devices)
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (r.ok) return await r.json();
  } catch {}
  // Fallback: race all proxies simultaneously
  const enc = encodeURIComponent(url);
  const proxied = [
    'https://corsproxy.io/?url=' + enc,
    'https://api.allorigins.win/raw?url=' + enc,
    'https://api.codetabs.com/v1/proxy?quest=' + enc,
  ];
  const tryOne = u => new Promise(async (res, rej) => {
    try {
      const r = await fetch(u, { signal: AbortSignal.timeout(6000) });
      if (!r.ok) return rej();
      const j = await r.json();
      if (j?.results !== undefined || j?.artistId !== undefined) res(j); else rej();
    } catch { rej(); }
  });
  try { return await Promise.any(proxied.map(tryOne)); } catch { return null; }
}

async function doSearch(q) {
  qSpn.style.display='block';
  qDrp.innerHTML='<div class="drop-msg">Searching…</div>';
  qDrp.style.display='block';

  // iTunes ALWAYS first and always on top — never show MB until iTunes resolves
  const itunesTracks = await searchItunes(q);
  qSpn.style.display='none';

  if (itunesTracks.length) {
    // iTunes found results — show them immediately
    renderDrop(itunesTracks, []);

    // Then append MB-only results below as supplemental
    searchMusicBrainz(q).then(mbTracks => {
      const newMb = mbTracks.filter(mb =>
        !itunesTracks.some(it =>
          it.trackName.toLowerCase() === mb.trackName.toLowerCase() &&
          it.artistName.toLowerCase() === mb.artistName.toLowerCase()
        )
      );
      if (newMb.length) renderDrop(itunesTracks, newMb);
    }).catch(() => {});

  } else {
    // iTunes completely failed — show a clear error, no MB fallback
    // (MB showing as primary results is confusing and low quality)
    qDrp.innerHTML = '<div class="drop-msg">⚠ Search unavailable — check your connection and try again</div>';
  }
}

function scoreTrack(t, ql, words) {
  const tl = (t.trackName || '').toLowerCase();
  const al = (t.artistName || '').toLowerCase();
  let s = 0;
  // Title scoring
  if (tl === ql) s += 100;
  else if (tl.startsWith(ql)) s += 70;
  else if (words.every(w => tl.includes(w))) s += 45;
  else s += words.filter(w => tl.includes(w)).length * 10;
  // Artist name exact match — huge boost (handles "NF" the rapper vs song titled "NF")
  if (al === ql) s += 80;
  else if (al.startsWith(ql)) s += 50;
  else if (words.every(w => al.includes(w))) s += 30;
  // Quality signals
  if (t.artworkUrl100) s += 5;
  if (t.trackTimeMillis > 60000) s += 5;
  if ((t.trackCount || 0) > 5) s += 3; // album with multiple tracks = real release
  if (t.trackExplicitness === 'explicit') s += 8; // prefer explicit over clean versions
  return s;
}

async function searchItunes(q) {
  const ql = q.toLowerCase().trim();
  const words = ql.split(/\s+/).filter(Boolean);
  const data = await itunesFetch(
    `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&entity=song&limit=25&country=US&explicit=Yes`
  );
  if (!data?.results?.length) return [];
  const results = data.results;
  results.sort((a, b) => scoreTrack(b, ql, words) - scoreTrack(a, ql, words));
  return results.slice(0, 25);
}

async function searchMusicBrainz(q) {
  try {
    const res = await proxyFetch(`https://musicbrainz.org/ws/2/recording/?query=${encodeURIComponent(q)}&limit=25&fmt=json`, {}, 8000);
    const data = await res.json();
    if (!data.recordings?.length) return [];
    return data.recordings.map(r => {
      const artist = r['artist-credit']?.[0]?.artist?.name || r['artist-credit']?.[0]?.name || 'Unknown';
      const release = r.releases?.[0];
      const album = release?.title || '';
      const releaseMbid = release?.id || null;
      return {
        trackName: r.title,
        artistName: artist,
        collectionName: album,
        artworkUrl100: null,
        trackTimeMillis: r.length || null,
        _source: 'musicbrainz',
        _releaseMbid: releaseMbid,
      };
    });
  } catch { return []; }
}

async function searchLastFm(q) {
  try {
    const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.search&track=${encodeURIComponent(q)}&limit=25&format=json&api_key=8548f98a6f6e4d9b9b4d4f6a7f3e1b2d`);
    const data = await res.json();
    const tracks = data?.results?.trackmatches?.track;
    if (!tracks?.length) return [];
    const list = Array.isArray(tracks) ? tracks : [tracks];
    return list.map(t => {
      const imgs = Array.isArray(t.image) ? t.image : [];
      const art = imgs.find(i=>i.size==='medium')?.['#text'] || imgs[0]?.['#text'] || null;
      const artLg = imgs.find(i=>i.size==='extralarge')?.['#text'] || art;
      const BLANK = '2a96cbd8b46e442fc41c2b86b821562f';
      return {
        trackName: t.name,
        artistName: t.artist,
        collectionName: '',
        artworkUrl100: (art && !art.includes(BLANK)) ? art : null,
        _artLgOverride: (artLg && !artLg.includes(BLANK)) ? artLg : null,
        trackTimeMillis: null,
        _source: 'lastfm',
        _needsArt: !(art && !art.includes(BLANK)),
      };
    });
  } catch { return []; }
}

const _artCache = {};
async function fetchCoverArt(track) {
  if (track.artworkUrl100) return;

  const ck = ((track.artistName||'') + '||' + (track.trackName||'')).toLowerCase();
  if (_artCache[ck] !== undefined) {
    if (_artCache[ck]) { track.artworkUrl100 = _artCache[ck]; track._artLgOverride = _artCache[ck+'_lg']; }
    return;
  }

  // Always try iTunes first — works everywhere including school Chromebooks
  try {
    const term = encodeURIComponent((track.artistName||'').trim() + ' ' + (track.trackName||'').trim());
    const r = await fetch(`https://itunes.apple.com/search?term=${term}&media=music&entity=song&limit=5&country=US&explicit=Yes`);
    if (r.ok) {
      const d = await r.json();
      const tl = (track.trackName||'').toLowerCase();
      const al = (track.artistName||'').toLowerCase();
      const hit = d.results?.find(h =>
        h.trackName?.toLowerCase() === tl && h.artistName?.toLowerCase() === al
      ) || d.results?.find(h =>
        h.trackName?.toLowerCase().includes(tl) || h.artistName?.toLowerCase().includes(al)
      ) || d.results?.[0];
      if (hit?.artworkUrl100) {
        const sm = hit.artworkUrl100;
        const lg = sm.replace('100x100bb','600x600bb');
        _artCache[ck] = sm; _artCache[ck+'_lg'] = lg;
        track.artworkUrl100 = sm; track._artLgOverride = lg;
        return;
      }
    }
  } catch {}

  // Secondary: Cover Art Archive (may be blocked on school networks)
  if (track._releaseMbid) {
    const mbid = track._releaseMbid;
    if (_artCache[mbid] !== undefined) {
      if (_artCache[mbid]) { track.artworkUrl100 = _artCache[mbid]; track._artLgOverride = _artCache[mbid+'_lg']; }
      _artCache[ck] = _artCache[mbid]; _artCache[ck+'_lg'] = _artCache[mbid+'_lg'];
      return;
    }
    try {
      const r = await fetch(`https://coverartarchive.org/release/${mbid}`);
      if (r.ok) {
        const d = await r.json();
        const img = d.images?.find(i => i.front) || d.images?.[0];
        if (img) {
          const sm = img.thumbnails?.['250'] || img.thumbnails?.small || img.image;
          const lg = img.thumbnails?.['500'] || img.thumbnails?.large || img.image;
          if (sm) {
            _artCache[mbid] = sm; _artCache[mbid+'_lg'] = lg;
            _artCache[ck] = sm; _artCache[ck+'_lg'] = lg;
            track.artworkUrl100 = sm; track._artLgOverride = lg;
            return;
          }
        }
      }
    } catch {}
    _artCache[mbid] = null;
  }

  _artCache[ck] = null;
}

function renderDrop(itunesTracks, mbTracks) {
  const tracks = [...itunesTracks, ...mbTracks];
  const mbStart = itunesTracks.length;
  const mbIds = [];
  window._td = window._td || {};

  qDrp.innerHTML = tracks.map((t, idx) => {
    const artSm = t.artworkUrl100 || '';
    const artLg = t._artLgOverride || (artSm ? artSm.replace('100x100bb','600x600bb') : '');
    const id = 'tr_' + Math.random().toString(36).slice(2);
    window._td[id] = {
      title: t.trackName, artist: t.artistName,
      album: t.collectionName||'', artSm: artSm||null, artLg: artLg||null,
      durMs: t.trackTimeMillis||null, _source: t._source||null,
      _releaseMbid: t._releaseMbid||null, _ref: t
    };
    if (idx >= mbStart) mbIds.push(id);

    const aName = (t.artistName||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const aArt  = artSm.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const srcBadge = (t._source && t._source !== 'itunes')

const wordSyncOn = true;

async function fetchLyrics(title, artist) {
  ST.lrc=[]; ST.lrcType='none'; ST.lrcActive=-1;
  const scroll = G('lscroll');
  G('lrc-empty-state').style.display = 'none';
  scroll.innerHTML = '<div class="lrc-empty"><p>Finding lyrics…</p></div>';

  const clean = s => s.replace(/\(.*?\)/g,'').replace(/\[.*?\]/g,'').replace(/\bfeat\.?.*$/i,'').replace(/\bft\.?.*$/i,'').trim();
  const ct = clean(title), ca = clean(artist);
  const alts = ct !== title || ca !== artist;

  // Fire all sources simultaneously — fastest reliable one wins
  const fetches = [
    lrclibGET(ct, ca),
    lrclibSEARCH(ct, ca),
    megalobizSearch(ct, ca),
    alts ? lrclibGET(title, artist) : null,
    alts ? lrclibSEARCH(title, artist) : null,
    alts ? megalobizSearch(title, artist) : null,
  ].filter(Boolean);

  const results = await Promise.allSettled(fetches);
  const candidates = results
    .filter(r => r.status === 'fulfilled' && r.value?.syncedLyrics)
    .map(r => r.value);

  // Prefer enhanced LRC (has embedded <mm:ss.xx> word tags) over plain line-synced
  candidates.sort((a, b) => {
    const score = d => (d.syncedLyrics?.includes('<') ? 1 : 0);
    return score(b) - score(a);
  });

  for (const d of candidates) {
    const lines = buildWordTimings(parseLRC(d.syncedLyrics));
    if (lines.length) { ST.lrc = lines; ST.lrcType = 'synced'; renderSynced(); return; }
  }

  scroll.innerHTML = '<div class="lrc-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg><p>No synced lyrics found</p></div>';
}

// ── lrclib.net ─────────────────────────────────────────────────────────────────
// Best free synced-lyrics DB (~3M songs). CORS-friendly, no auth needed.
async function lrclibGET(track, artist) {
  try {
    const url = `https://lrclib.net/api/get?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`;
    const r = await proxyFetch(url, {}, 6000);
    if (r.ok) { const d = await r.json(); if (d?.syncedLyrics) return d; }
  } catch {}
  return null;
}

async function lrclibSEARCH(track, artist) {
  try {
    const url = `https://lrclib.net/api/search?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`;
    const r = await proxyFetch(url, {}, 6000);
    if (r.ok) {
      const arr = await r.json();
      if (arr?.length) return arr.find(x => x.syncedLyrics) || null;
    }
  } catch {}
  return null;
}

// ── Megalobiz ──────────────────────────────────────────────────────────────────
// Human-curated LRC database — huge for Western pop/rap/rock.
// No official API, so we: 1) search via their public search endpoint,
// 2) scrape the LRC page content. Routed through CORS proxy since it's
// a regular website. Returns standard syncedLyrics string on success.
async function megalobizSearch(track, artist) {
  try {
    const q = encodeURIComponent(track + ' ' + artist);
    const searchUrl = `https://www.megalobiz.com/search/all?qry=${q}&entity_type=lrc_maker`;
    const r = await proxyFetch(searchUrl, {}, 7000);
    if (!r.ok) return null;
    const html = await r.text();

    // Parse search results — each result is an anchor like /lrc/maker/Title.XXXXXXX
    const linkRe = /href="(\/lrc\/maker\/[^"]+\.\d+)"/g;
    const links = [];
    let m;
    while ((m = linkRe.exec(html)) !== null && links.length < 3) {
      links.push('https://www.megalobiz.com' + m[1]);
    }
    if (!links.length) return null;

    // Fetch the first matching LRC page and extract the raw LRC text
    for (const link of links) {
      try {
        const pr = await proxyFetch(link, {}, 6000);
        if (!pr.ok) continue;
        const phtml = await pr.text();
        // The LRC content lives inside a <span id="lrc_content"> or similar pre block
        const lrcMatch = phtml.match(/id="lrc_content"[^>]*>([\s\S]*?)<\/span>/i)
                      || phtml.match(/<pre[^>]*>([\s\S]*?)<\/pre>/i);
        if (!lrcMatch) continue;
        // Decode HTML entities and clean up
        const raw = lrcMatch[1]
          .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
          .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/<[^>]+>/g,'').trim();
        // Validate it looks like an LRC file
        if (raw.includes('[') && raw.match(/\[\d{1,3}:\d{2}/)) {
          return { syncedLyrics: raw };
        }
      } catch {}
    }
  } catch {}
  return null;
}

function parseLRC(rawStr) {
  return rawStr.split('\n').map(line => {
    const m = line.match(/^\[(\d{1,3}):(\d{2}(?:\.\d+)?)\](.*)/);
    if (!m) return null;
    const ms = parseInt(m[1])*60000 + parseFloat(m[2])*1000;
    const raw = m[3];

    // Try to extract enhanced word-level timestamps: <mm:ss.xx>word
    const wTagRe = /<(\d{1,3}):(\d{2}\.\d+)>([^<]*)/g;
    let wm; const wTimed = [];
    while ((wm = wTagRe.exec(raw)) !== null) {
      const wMs = parseInt(wm[1])*60000 + parseFloat(wm[2])*1000;
      const word = wm[3].trim();
      if (word) wTimed.push({ ms: wMs, word });
    }

    const text = raw.replace(/<[^>]+>/g,'').trim();
    return { ms, text, _wordTimed: wTimed.length > 0 ? wTimed : null };
  }).filter(Boolean);
}

// ── Phonetic timing model ────────────────────────────────────────────────────
// Estimates per-word durations when no word-level timestamps exist.
// Better than naive syllable count — accounts for stress, function words,
// consonant clusters, and natural speech rhythm.

const FUNCTION_WORDS = new Set([
  'a','an','the','and','but','or','nor','for','so','yet',
  'in','on','at','to','of','by','up','as','is','am','are',
  'was','were','be','been','do','did','i','you','he','she',
  'it','we','they','me','him','her','us','them','my','your',
  'his','its','our','their','that','this','with','from','not',
  "i'm","i've","i'll","i'd","you're","we're","they're",
  "don't","can't","won't","didn't","it's","that's",
]);

function phonemeWeight(word) {
  const w = word.toLowerCase().replace(/[^a-z']/g, '');
  if (!w) return 0.5;
  // Function words get reduced weight — they're spoken quickly
  if (FUNCTION_WORDS.has(w)) return 0.55;
  // Count syllables with improved heuristic
  let syls = 0;
  const v = w.replace(/[^aeiouy]/g, '');
  // Count vowel groups
  const vGroups = (w.match(/[aeiouy]+/g) || []).length;
  syls = vGroups;
  // Silent 'e' at end
  if (w.endsWith('e') && w.length > 3 && !/[aeiouy]e$/.test(w.slice(-3, -1))) syls = Math.max(1, syls - 1);
  // -ed, -es suffixes often silent
  if (/[^aeiouy](ed|es)$/.test(w)) syls = Math.max(1, syls - 1);
  // -tion, -cian, -sion = 1 syllable
  if (/(tion|cian|sion)$/.test(w)) syls = Math.max(1, syls - 1);
  // -ful, -less, -ness, -ment, -ness add full syllable
  syls = Math.max(1, syls);

  // Longer words naturally take more time even at same syllable count
  const lenBonus = Math.min(0.3, (w.length - 4) * 0.04);
  // Consonant clusters at start slow word onset slightly
  const onsetCluster = (w.match(/^[^aeiouy]{2,}/) || [''])[0].length * 0.05;

  return Math.max(0.4, syls * 0.8 + lenBonus + onsetCluster);
}

function buildWordTimings(lrc) {
  return lrc.map((line, i) => {
    const lineMs = line.ms;
    const nextMs = lrc[i+1]?.ms ?? (lineMs + 3500);
    const gapMs = Math.max(400, nextMs - lineMs);
    const rawWords = line.text.split(/\s+/).filter(Boolean);

    if (!rawWords.length) {
      const beatDur = Math.round(Math.min(900, Math.max(300, gapMs / 4)));
      return { ...line, words: [], beatDur };
    }

    // If the LRC had per-word timestamps embedded, use those — they are exact
    if (line._wordTimed?.length) {
      return { ...line, words: line._wordTimed };
    }

    // ── Phoneme-weighted distribution ────────────────────────────────────────
    const weights = rawWords.map(phonemeWeight);
    const totalWeight = weights.reduce((a, b) => a + b, 0);

    // Use 88% of line duration — leave a natural breath gap before next line
    // But also cap per-word max to avoid single long words eating everything
    const usable = gapMs * 0.88;

    let cursor = lineMs;
    const words = rawWords.map((word, wi) => {
      const wordMs = cursor;
      const share = (weights[wi] / totalWeight) * usable;
      cursor += share;
      return { ms: wordMs, word };
    });
    return { ...line, words };
  });
}

function splitParen(text) {
  const pm = text.match(/^(.*?)\s*\(([^)]+)\)\s*(.*)$/);
  if (pm) {
    const main = (pm[1] + (pm[3] ? ' ' + pm[3] : '')).trim();
    return { main: main || text, paren: pm[2] };
  }
  return { main: text, paren: null };
}

function renderLineHTML(line, i) {
  const { main, paren } = splitParen(line.text || '♪');
  const parenHTML = paren ? `<span class="ll-paren">(${x(paren)})</span>` : '';
  const isNote = !line.words?.length && (!line.text || line.text.trim() === '♪' || line.text.trim() === '');
  let mainHTML;
  if (isNote) {
    const beatDur = line.beatDur ?? 600;
    mainHTML = `<span class="beat-dots" style="--beat-dur:${beatDur}ms"><span></span><span></span><span></span></span>`;
  } else {
    mainHTML = line.words?.length
      ? line.words.map((w, wi) =>
          `<span class="lw upcoming" id="lw${i}_${wi}" style="--pct:0%">${x(w.word)}</span>`
        ).join(' ')
      : x(main);
  }
  return `<div class="ll" id="ll${i}" onclick="seekLrc(${i})">${mainHTML}${parenHTML}</div>`;
}

function renderSynced() {
  // Clear word state cache so new song starts fresh
  Object.keys(_lwState).forEach(k => delete _lwState[k]);
  G('lscroll').innerHTML = ST.lrc.map((l, i) => renderLineHTML(l, i)).join('');
}



function seekLrc(i) { if(ST.lrcType==='synced'&&ST.lrc[i]) YT_player.seekTo(ST.lrc[i].ms/1000); }

// Per-word state cache to skip redundant DOM writes
const _lwState = {};

function _setLwState(id, cls, pct) {
  const prev = _lwState[id];
  if (prev && prev.cls === cls && (cls !== 'now-word' || prev.pct === pct)) return;
  _lwState[id] = { cls, pct };
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'lw ' + cls;
  el.style.setProperty('--pct', pct);
}

function tickLrc(posMs) {
  if (!ST.lrc.length) return;

  // Lookahead: compensate for rendering lag — words light up exactly as sung
  const AHEAD = 80;
  const t = posMs + AHEAD;

  // Binary search for active line
  let lo = 0, hi = ST.lrc.length - 1, active = 0;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (ST.lrc[mid].ms <= t) { active = mid; lo = mid + 1; }
    else hi = mid - 1;
  }

  if (active !== ST.lrcActive) {
    const prev = ST.lrcActive;
    ST.lrcActive = active;

    // Batch DOM updates — collect all lines once, update in one pass
    const lines = document.querySelectorAll('#lscroll .ll');
    lines.forEach((el, i) => {
      el.classList.remove('now','past','near','near2');
      const dist = i - active;
      const absDist = Math.abs(dist);
      if (dist < 0) el.classList.add('past');
      else if (absDist === 1) el.classList.add('near');
      else if (absDist === 2) el.classList.add('near2');
      if (i === active) el.classList.add('now');
      // Progressive blur: lines farther away blur more
      el.style.filter = absDist >= 3 ? `blur(${Math.min(5, (absDist - 2) * 1.5).toFixed(1)}px)` : '';
    });

    document.getElementById('ll'+active)
      ?.scrollIntoView({ block:'center', behavior:'smooth' });

    // Snap previous line's words to fully done
    if (prev >= 0) {
      (ST.lrc[prev]?.words || []).forEach((w, wi) => {
        _setLwState('lw'+prev+'_'+wi, 'done', '100%');
      });
    }
    // Reset new active line's words to upcoming
    (ST.lrc[active]?.words || []).forEach((w, wi) => {
      const id = 'lw'+active+'_'+wi;
      delete _lwState[id]; // force re-render
      _setLwState(id, 'upcoming', '0%');
    });
  }

  const words = ST.lrc[active]?.words;
  if (!words?.length) return;

  const nextLineMs = ST.lrc[active+1]?.ms ?? (t + 4000);
  // Last word ends when next line starts, capped to avoid runaway stretch
  const lastWordEnd = Math.min(nextLineMs - 50, words[words.length-1].ms + 2200);

  for (let wi = 0; wi < words.length; wi++) {
    const wStart = words[wi].ms;
    const wEnd = wi < words.length - 1 ? words[wi+1].ms : lastWordEnd;
    const id = 'lw'+active+'_'+wi;

    if (t < wStart) {
      _setLwState(id, 'upcoming', '0%');
    } else if (t >= wEnd) {
      _setLwState(id, 'done', '100%');
    } else {
      // Ease-in-out the fill so it feels natural, not robotic
      const raw = (t - wStart) / (wEnd - wStart);
      const eased = raw < 0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
      _setLwState(id, 'now-word', (eased * 100).toFixed(1)+'%');
    }
  }
}


// ── ARTIST PROFILE ─────────────────────────────────────────────────────────
const _artistCache = {};

async function openArtistProfile(artistName, hintArt) {
  showPanel('artist');
  const inner = G('artist-panel-inner');
  const bg = G('artist-bg');
  const spinHTML = '<div class="artist-loading"><div style="width:18px;height:18px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--pink);border-radius:50%;animation:spin .55s linear infinite;flex-shrink:0;"></div><span>Loading artist…</span></div>';
  inner.innerHTML = spinHTML;
  if (hintArt) { bg.style.backgroundImage = `url('${hintArt}')`; bg.classList.add('on'); }

  const ck = artistName.toLowerCase().trim();
  let cached = _artistCache[ck];
  if (!cached) {
    cached = await fetchArtistData(artistName);
    _artistCache[ck] = cached;
  }

  const { tracks, artistImg } = cached;
  const heroImg = artistImg || hintArt || tracks.find(t=>t.artworkUrl100)?.artworkUrl100 || '';
  if (heroImg) { bg.style.backgroundImage = `url('${heroImg}')`; bg.classList.add('on'); }

  renderArtistProfile(artistName, tracks, heroImg, inner);
}

async function fetchArtistData(artistName) {
  let artistImg = null;
  let artistId = null;
  const al = artistName.toLowerCase();

  // Step 1: Find iTunes artistId via entity search
  const artistData = await itunesFetch(
    `https://itunes.apple.com/search?term=${encodeURIComponent(artistName)}&entity=musicArtist&limit=15&country=US&explicit=Yes`
  );
  if (artistData?.results) {
    const match =
      artistData.results.find(r => r.wrapperType === 'artist' && r.artistName?.toLowerCase() === al) ||
      artistData.results.find(r => r.wrapperType === 'artist' && r.artistName?.toLowerCase().startsWith(al.split(' ')[0])) ||
      artistData.results.find(r => r.wrapperType === 'artist');
    if (match) artistId = match.artistId;
  }

  let tracks = [];

  // Step 2: Lookup by artistId — gets full discography reliably
  if (artistId) {
    const ld = await itunesFetch(
      `https://itunes.apple.com/lookup?id=${artistId}&entity=song&limit=200&country=US&explicit=Yes`
    );
    tracks = (ld?.results || []).filter(r => r.wrapperType === 'track' && r.kind === 'song');
  }

  // Step 3: Fallback — direct search filtered to artist name
  if (tracks.length < 3) {
    const ld = await itunesFetch(
      `https://itunes.apple.com/search?term=${encodeURIComponent(artistName)}&media=music&entity=song&limit=50&country=US&explicit=Yes`
    );
    const extra = (ld?.results || []).filter(t =>
      t.wrapperType === 'track' && t.kind === 'song' &&
      t.artistName?.toLowerCase().includes(al.split(' ')[0])
    );
    // Merge, dedupe by trackId
    const seen = new Set(tracks.map(t => t.trackId));
    for (const t of extra) if (!seen.has(t.trackId)) { tracks.push(t); seen.add(t.trackId); }
  }

  // Sort by popularity (playCount not available, use trackNumber + collectionName as proxy)
  // iTunes returns them roughly in popularity order already, keep that order.

  // Artist hero image: use highest-res album art available — skip fanart.tv (unreliable)
  const artTrack = tracks.find(t => t.artworkUrl100);
  if (artTrack) artistImg = artTrack.artworkUrl100.replace('100x100bb', '600x600bb');

  return { tracks: tracks.slice(0, 60), artistImg };
}

function renderArtistProfile(artistName, tracks, heroImg, container) {
  const avatarHTML = heroImg
    ? `<img src="${heroImg}" alt="" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=\"font-size:36px\">🎤</span>'">`
    : `<span style="font-size:36px">🎤</span>`;

  const playAllId = 'apl_'+Math.random().toString(36).slice(2);
  window['_apl_'+playAllId] = tracks.map(t=>({
    title: t.trackName, artist: t.artistName||artistName,
    artSm: t.artworkUrl100||null,
    artLg: (t.artworkUrl100||'').replace('100x100bb','600x600bb')||null,
  }));

  const rowsHTML = tracks.length ? tracks.map((t, i) => {
    const sm = t.artworkUrl100 || '';
    const lg = sm.replace('100x100bb','600x600bb');
    const artCell = sm ? `<img src="${sm}" data-src="${sm}" onerror="proxyImgFallback(this)" alt="">` : '🎵';
    const id = 'apt_'+Math.random().toString(36).slice(2);
    (window._td=window._td||{})[id] = {
      title: t.trackName, artist: t.artistName||artistName,
      artSm: sm||null, artLg: lg||null, durMs: t.trackTimeMillis||null,
    };
    return `<div class="artist-track-row" onclick="pickTrack('${id}')">
      <div class="artist-track-num">${i+1}</div>
      <div class="artist-track-art">${artCell}</div>
      <div class="artist-track-inf">
        <div class="artist-track-t">${x(t.trackName)}</div>
        <div class="artist-track-alb">${x(t.collectionName||'')}</div>
      </div>
      <div class="artist-track-dur">${ms2t(t.trackTimeMillis||0)}</div>
      <div class="artist-track-add" onclick="event.stopPropagation();pickTrack('${id}')"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
    </div>`;
  }).join('') : '<div class="artist-loading" style="padding:30px 0"><span>No tracks found</span></div>';

  container.innerHTML = `
    <div class="artist-hero">
      <div class="artist-avatar">${avatarHTML}</div>
      <div class="artist-hero-info">
        <div class="artist-name-big">${x(artistName)}</div>
        <div class="artist-meta">${tracks.length} song${tracks.length!==1?'s':''}</div>
        <button class="artist-play-all" onclick="playAllArtist('_apl_${playAllId}')">▶ Play All</button>
      </div>
    </div>
    <div class="artist-section-lbl">Songs</div>
    ${rowsHTML}
  `;
}

function playAllArtist(key) {
  const tracks = window[key]; if (!tracks?.length) return;
  ST.queue = []; ST.idx = -1;
  G('q-list').innerHTML = '';
  tracks.forEach(t => { const i = ST.queue.length; ST.queue.push({...t}); appendQI(t, i); });
  loadTrack(0);
  showPanel('queue');
  toast('Playing artist');
}

document.addEventListener('keydown', e => {
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;
  const ok=ytReady&&ST.idx>=0;
  switch(e.code){
    case 'Space': e.preventDefault(); togglePlay(); break;
    case 'ArrowRight': e.preventDefault(); if(ok)YT_player.seekTo(YT_player.getCurrentTime()+10); break;
    case 'ArrowLeft':  e.preventDefault(); if(ok)YT_player.seekTo(Math.max(0,YT_player.getCurrentTime()-10)); break;
    case 'ArrowUp':   e.preventDefault(); ST.vol=Math.min(1,ST.vol+.1);G('vol-f').style.width=(ST.vol*100)+'%';if(ytReady)YT_player.setVolume(ST.vol*100);break;
    case 'ArrowDown': e.preventDefault(); ST.vol=Math.max(0,ST.vol-.1);G('vol-f').style.width=(ST.vol*100)+'%';if(ytReady)YT_player.setVolume(ST.vol*100);break;
    case 'KeyN': nextTrack(); break;
    case 'KeyP': prevTrack(); break;
    case 'KeyS': G('btn-sf').click(); break;
    case 'KeyR': G('btn-rp').click(); break;
    case 'KeyM': G('btn-vol').click(); break;
    case 'KeyL': G('pnb-lyrics').click(); break;
    case 'KeyH': G('btn-heart').click(); break;
  }
});
