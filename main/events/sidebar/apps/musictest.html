<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Wavelength</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — Apple Music Dark
═══════════════════════════════════════════ */
:root {
  --bg:       #0a0a0a;
  --bg2:      #111111;
  --surface:  #1a1a1a;
  --surface2: #222222;
  --surface3: #2a2a2a;
  --border:   #2a2a2a;
  --text:     #f5f5f7;
  --text2:    #a1a1a6;
  --text3:    #6e6e73;
  --text4:    #3a3a3c;
  --red:      #fc3c44;
  --red2:     #d92d35;
  --pink:     #fa2d48;
  --green:    #34c759;
  --ph:       88px;
  --sw:       300px;
  --r:        10px;
  --rl:       16px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* ── LAYOUT ── */
.shell{display:flex;flex:1;height:calc(100vh - var(--ph));overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sw);background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden
}
.brand{padding:20px 20px 0;display:flex;align-items:center;gap:10px}
.brand-icon{
  width:36px;height:36px;background:var(--red);
  border-radius:10px;display:grid;place-items:center;flex-shrink:0
}
.brand-icon svg{width:18px;height:18px}
.brand-name{font-size:19px;font-weight:700;letter-spacing:-.4px;color:var(--text)}

/* search */
.search-area{padding:16px 16px 0;position:relative}
.search-box{
  display:flex;align-items:center;gap:9px;
  background:var(--surface);border:1.5px solid transparent;
  border-radius:var(--r);padding:10px 14px;
  transition:border-color .2s,background .2s
}
.search-box:focus-within{
  border-color:var(--red);background:var(--surface2);
}
.search-box svg{width:15px;height:15px;color:var(--text3);flex-shrink:0}
.search-box input{
  border:none;background:transparent;outline:none;
  font-family:inherit;font-size:14px;color:var(--text);width:100%
}
.search-box input::placeholder{color:var(--text3)}
.spin{
  width:14px;height:14px;flex-shrink:0;
  border:2px solid var(--surface3);border-top-color:var(--red);
  border-radius:50%;animation:spin .55s linear infinite;display:none
}
@keyframes spin{to{transform:rotate(360deg)}}

/* dropdown */
.drop{
  position:absolute;top:calc(100% + 6px);left:16px;right:16px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rl);
  box-shadow:0 16px 48px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.3);
  z-index:400;max-height:380px;overflow-y:auto;display:none
}
.di{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;cursor:pointer;
  border-bottom:1px solid var(--border);
  transition:background .15s
}
.di:last-child{border-bottom:none}
.di:hover{background:var(--surface2)}
.di:hover .di-add{opacity:1}
.di-art{
  width:44px;height:44px;border-radius:8px;
  background:var(--surface2);overflow:hidden;flex-shrink:0;
  display:grid;place-items:center;font-size:17px
}
.di-art img{width:100%;height:100%;object-fit:cover;display:block}
.di-inf{flex:1;min-width:0}
.di-t{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.di-s{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.di-dur{font-size:11px;color:var(--text3);flex-shrink:0}
.di-add{
  width:26px;height:26px;border-radius:50%;
  background:var(--red);display:grid;place-items:center;
  flex-shrink:0;opacity:0;transition:opacity .15s
}
.di-add svg{width:13px;height:13px;fill:#fff}
.drop-msg{padding:24px;text-align:center;font-size:13px;color:var(--text3);line-height:1.6}

/* status */
.sc-status{
  display:flex;align-items:center;gap:7px;
  padding:8px 18px 0;font-size:11px;color:var(--text3)
}
.sc-dot{
  width:6px;height:6px;border-radius:50%;background:var(--text4);
  flex-shrink:0;transition:background .3s
}
.sc-dot.ok{background:var(--green)}
.sc-dot.err{background:var(--red)}
.sc-dot.loading{background:#ff9500;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* URL row */
.url-row{display:flex;gap:8px;padding:12px 16px 0}
.url-in{
  flex:1;min-width:0;padding:9px 12px;
  border:1.5px solid var(--border);border-radius:var(--r);
  font-family:inherit;font-size:12.5px;
  background:var(--surface);color:var(--text);outline:none;
  transition:border-color .15s
}
.url-in:focus{border-color:var(--red);background:var(--surface2)}
.url-in::placeholder{color:var(--text3)}
.url-btn{
  padding:9px 14px;flex-shrink:0;
  background:var(--text);color:var(--bg);border:none;border-radius:var(--r);
  font-family:inherit;font-size:12.5px;font-weight:600;
  cursor:pointer;transition:opacity .15s,transform .1s
}
.url-btn:hover{opacity:.85}
.url-btn:active{transform:scale(.97)}

/* queue */
.q-lbl{padding:16px 18px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);flex-shrink:0}
.q-scroll{flex:1;overflow-y:auto;padding:0 10px 14px}
.q-empty{padding:30px 14px;text-align:center;font-size:12.5px;color:var(--text3);line-height:1.7}
.qi{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:var(--r);cursor:pointer;
  transition:background .15s;position:relative
}
.qi:hover{background:var(--surface)}
.qi.now{background:rgba(252,60,68,.08)}
.qi.now .qi-t{color:var(--red);font-weight:600}
.qi-th{
  width:40px;height:40px;border-radius:8px;
  background:var(--surface);overflow:hidden;flex-shrink:0;
  display:grid;place-items:center;font-size:15px;position:relative
}
.qi-th img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px}
.now-ind{
  position:absolute;inset:0;border-radius:8px;
  background:rgba(252,60,68,.85);
  display:flex;align-items:center;justify-content:center
}
.bars{display:flex;align-items:flex-end;gap:2px;height:14px}
.bars b{width:2.5px;background:#fff;border-radius:2px;animation:ba .7s ease-in-out infinite}
.bars b:nth-child(2){animation-name:bb}
.bars b:nth-child(3){animation-name:bc}
@keyframes ba{0%,100%{height:4px}50%{height:12px}}
@keyframes bb{0%,100%{height:9px}50%{height:4px}}
@keyframes bc{0%,100%{height:5px}50%{height:13px}}
.qi-inf{flex:1;min-width:0}
.qi-t{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.qi-a{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.qi-rm{width:24px;height:24px;border:none;background:none;color:var(--text3);font-size:16px;line-height:1;border-radius:50%;cursor:pointer;display:none;place-items:center;transition:background .12s,color .12s}
.qi:hover .qi-rm{display:grid}
.qi-rm:hover{background:var(--surface2);color:var(--red)}

/* ── CENTER (Now Playing) ── */
.center{
  flex:1;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  padding:40px;position:relative;background:var(--bg)
}
.np-wrap{
  display:flex;align-items:center;gap:60px;
  max-width:1100px;width:100%;height:100%;
}
.np-left{
  display:flex;flex-direction:column;align-items:center;
  flex:0 0 auto;width:clamp(280px, 35vw, 420px);
}
.np-right{
  flex:1;min-width:0;height:100%;
  display:flex;flex-direction:column;justify-content:center;
  overflow:hidden;
}

.empty{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;animation:up .5s ease both}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.idlewave{display:flex;align-items:flex-end;gap:3px;height:36px;margin-bottom:4px}
.idlewave span{width:4px;background:var(--surface3);border-radius:3px;animation:iw 2s ease-in-out infinite}
.idlewave span:nth-child(1){height:10px;animation-delay:0s}
.idlewave span:nth-child(2){height:20px;animation-delay:.18s}
.idlewave span:nth-child(3){height:30px;animation-delay:.36s}
.idlewave span:nth-child(4){height:14px;animation-delay:.54s}
.idlewave span:nth-child(5){height:24px;animation-delay:.72s}
.idlewave span:nth-child(6){height:16px;animation-delay:.90s}
.idlewave span:nth-child(7){height:28px;animation-delay:.50s}
@keyframes iw{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
.empty h2{font-size:22px;font-weight:600;color:var(--text2)}
.empty p{font-size:13.5px;color:var(--text3);line-height:1.7;max-width:260px}

/* now playing */
.np{display:none;width:100%;height:100%}
.np.on{display:flex}
.cover{
  width:100%;aspect-ratio:1;border-radius:var(--rl);
  background:var(--surface);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  overflow:hidden;display:grid;place-items:center;font-size:60px;
  flex-shrink:0;position:relative;transition:box-shadow .5s
}
.cover.playing{
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 50px rgba(252,60,68,.08);
}
.cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cover-load{
  position:absolute;inset:0;border-radius:var(--rl);
  background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center
}
.cover-load.on{display:flex}
.cover-load div{width:30px;height:30px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.np-info{margin-top:24px;text-align:center;width:100%}
.np-title{font-size:20px;font-weight:700;letter-spacing:-.3px;line-height:1.2;margin-bottom:4px;color:var(--text)}
.np-artist{font-size:14px;color:var(--text2)}
.np-tags{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:10px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;letter-spacing:.3px;padding:3px 10px;border-radius:20px}
.tag-sc{background:var(--red);color:#fff}
.tag-album{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* ── LYRICS (inside center right) ── */
.lyric-area{
  height:100%;overflow-y:auto;
  padding:20px 10px 60px 0;
  scroll-behavior:smooth;
  mask-image:linear-gradient(to bottom, transparent 0%, black 8%, black 85%, transparent 100%);
  -webkit-mask-image:linear-gradient(to bottom, transparent 0%, black 8%, black 85%, transparent 100%);
}
.ll{
  font-size:1.6rem;line-height:1.4;font-weight:700;
  color:var(--text4);
  padding:8px 0;
  transition:color .3s ease, transform .3s ease, filter .3s ease;
  cursor:pointer;
}
.ll:hover{color:var(--text3)}
.ll.past{color:var(--text4)}
.ll.now{
  color:var(--text);
  font-size:1.8rem;
  transform:none;
  filter:none;
}
.ll:not(.now):not(.past){
  filter:blur(0.3px);
}
.ll.plain{cursor:default}
.ll.plain:hover{color:var(--text4)}
.lrc-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);text-align:center}
.lrc-empty svg{width:38px;height:38px;opacity:.15;color:var(--text3)}
.lrc-empty p{font-size:13px}
.lrc-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;color:var(--text3);
  margin-bottom:20px;
}
.lrc-badge.sync{color:var(--red)}

/* ── PLAYER BAR ── */
.player{
  height:var(--ph);flex-shrink:0;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:18px;
  z-index:10
}
.pb-l{display:flex;align-items:center;gap:12px;width:240px;flex-shrink:0}
.pb-cov{width:52px;height:52px;border-radius:8px;background:var(--surface);overflow:hidden;flex-shrink:0;display:grid;place-items:center;font-size:22px;position:relative}
.pb-cov img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pb-meta{min-width:0}
.pb-t{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.pb-a{font-size:11.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.pb-c{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.ctrl{display:flex;align-items:center;gap:14px}
.icb{
  width:32px;height:32px;background:none;border:none;
  cursor:pointer;color:var(--text2);border-radius:50%;
  display:grid;place-items:center;transition:color .15s,background .15s;flex-shrink:0
}
.icb svg{width:17px;height:17px}
.icb:hover{color:var(--text)}
.icb.on{color:var(--red)}
.play-btn{
  width:44px;height:44px;flex-shrink:0;
  background:var(--text);color:var(--bg);border:none;border-radius:50%;
  cursor:pointer;display:grid;place-items:center;
  transition:transform .15s,opacity .2s
}
.play-btn svg{width:20px;height:20px}
.play-btn:hover{transform:scale(1.06);opacity:.9}
.play-btn:active{transform:scale(.96)}
.prog-row{width:100%;max-width:520px;display:flex;align-items:center;gap:9px}
.tt{font-size:10.5px;color:var(--text3);font-variant-numeric:tabular-nums;min-width:34px;font-weight:500}
.tt.r{text-align:right}
.prog{flex:1;height:4px;background:var(--surface2);border-radius:4px;cursor:pointer;position:relative;transition:height .14s}
.prog:hover{height:6px}
.prog-f{height:100%;background:var(--text2);border-radius:4px;position:relative;pointer-events:none;transition:background .2s}
.prog:hover .prog-f{background:var(--red)}
.prog-dot{position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;background:var(--text);border-radius:50%;opacity:0;transition:opacity .14s;pointer-events:none}
.prog:hover .prog-dot{opacity:1}
.pb-r{display:flex;align-items:center;gap:8px;width:170px;flex-shrink:0;justify-content:flex-end}
.vol{width:80px;height:4px;background:var(--surface2);border-radius:4px;cursor:pointer;position:relative;transition:height .14s}
.vol:hover{height:6px}
.vol-f{height:100%;background:var(--text3);border-radius:4px;pointer-events:none;transition:background .2s}
.vol:hover .vol-f{background:var(--red)}

/* hidden YT */
#yt-host{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none}

/* toast */
.toast{
  position:fixed;bottom:calc(var(--ph) + 16px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--surface);color:var(--text);border:1px solid var(--border);
  padding:10px 22px;border-radius:28px;font-size:13px;font-weight:500;
  opacity:0;pointer-events:none;z-index:999;white-space:nowrap;
  transition:opacity .22s,transform .22s;
  backdrop-filter:blur(20px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══════════════════════════════════════════
   MOBILE — full-screen player
═══════════════════════════════════════════ */
.mobile-tabs{display:none}
.mobile-np-header{display:none}

@media (max-width: 768px) {
  :root{--ph:0px;--sw:100%}

  .shell{flex-direction:column;height:100vh}

  .sidebar{
    width:100%;flex:1;border-right:none;
    display:none;
  }
  .sidebar.active{display:flex}

  .center{
    display:none;flex:1;padding:0;
    flex-direction:column;
  }
  .center.active{display:flex}

  .np-wrap{
    flex-direction:column;gap:20px;padding:0 24px 24px;
    overflow-y:auto;align-items:stretch;
  }
  .np-left{width:100%;max-width:320px;align-self:center}
  .np-right{height:auto;flex:none}
  .lyric-area{
    max-height:300px;overflow-y:auto;
    padding:0 0 40px;
    mask-image:linear-gradient(to bottom, black 70%, transparent 100%);
    -webkit-mask-image:linear-gradient(to bottom, black 70%, transparent 100%);
  }
  .ll{font-size:1.2rem}
  .ll.now{font-size:1.35rem}

  .player{display:none}

  /* Mobile tabs */
  .mobile-tabs{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--bg2);border-top:1px solid var(--border);
    z-index:100;
    padding:0 0 env(safe-area-inset-bottom,0);
  }
  .mob-tab{
    flex:1;display:flex;flex-direction:column;align-items:center;
    gap:3px;padding:10px 0 8px;
    background:none;border:none;color:var(--text3);
    font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;
    transition:color .15s;
  }
  .mob-tab svg{width:22px;height:22px}
  .mob-tab.active{color:var(--red)}

  /* Mobile now playing header */
  .mobile-np-header{
    display:none;padding:14px 20px;
    align-items:center;justify-content:space-between;
    flex-shrink:0;
  }
  .center.active .mobile-np-header{display:flex}
  .mob-close{
    width:32px;height:32px;border-radius:50%;
    background:var(--surface);border:none;color:var(--text2);
    display:grid;place-items:center;cursor:pointer;
  }
  .mob-close svg{width:16px;height:16px}

  /* Mobile mini player */
  .mobile-mini{
    display:none;position:fixed;bottom:50px;left:8px;right:8px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:14px;padding:8px 12px;z-index:90;
    align-items:center;gap:10px;cursor:pointer;
    backdrop-filter:blur(20px);
  }
  .mobile-mini.on{display:flex}
  .mini-art{width:42px;height:42px;border-radius:8px;background:var(--surface2);overflow:hidden;flex-shrink:0;position:relative;display:grid;place-items:center;font-size:16px}
  .mini-art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .mini-info{flex:1;min-width:0}
  .mini-t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .mini-a{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .mini-pp{
    width:36px;height:36px;border-radius:50%;
    background:var(--text);color:var(--bg);border:none;
    display:grid;place-items:center;cursor:pointer;flex-shrink:0;
  }
  .mini-pp svg{width:16px;height:16px}

  /* Mobile full player controls */
  .mob-controls{
    display:none;flex-direction:column;align-items:center;
    padding:0 24px 20px;gap:12px;width:100%;max-width:360px;align-self:center;
  }
  .center.active .mob-controls{display:flex}
  .mob-prog-row{width:100%;display:flex;align-items:center;gap:8px}
  .mob-prog{flex:1;height:4px;background:var(--surface2);border-radius:4px;cursor:pointer;position:relative}
  .mob-prog-f{height:100%;background:var(--text2);border-radius:4px;pointer-events:none}
  .mob-ctrl{display:flex;align-items:center;gap:20px;justify-content:center;width:100%}
  .mob-ctrl .icb{width:36px;height:36px}
  .mob-ctrl .icb svg{width:20px;height:20px}
  .mob-ctrl .play-btn{width:56px;height:56px}
  .mob-ctrl .play-btn svg{width:24px;height:24px}
  .mob-vol{display:flex;align-items:center;gap:8px;width:100%}
  .mob-vol .vol{flex:1;width:auto}

  .empty{padding:40px 20px}
}

@media (max-width: 480px) {
  .np-left{max-width:260px}
  .ll{font-size:1rem}
  .ll.now{font-size:1.15rem}
}
</style>
</head>
<body>

<div id="yt-host"><div id="yt-player"></div></div>
<div class="toast" id="toast"></div>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar active" id="sidebar-panel">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/>

<script>
'use strict';

const ST = {
  queue:[], idx:-1,
  playing:false, shuffle:false, repeat:false, muted:false,
  vol:0.8, pos:0, dur:0,
  lrc:[], lrcType:'none', lrcActive:-1,
};

function G(id){ return document.getElementById(id); }
function ms2t(ms){ if(!ms||ms<0)return'0:00'; const s=Math.floor(ms/1000); return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
function x(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let toastTmr=null;
function toast(msg){ const el=G('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTmr); toastTmr=setTimeout(()=>el.classList.remove('show'),2800); }
function setStatus(state, msg) { G('sc-dot').className='sc-dot '+state; G('sc-status-txt').textContent=msg; }

// ── Mobile tab switching ──
function switchMobileTab(tab) {
  const sidebar=G('sidebar-panel'), center=G('center-panel');
  const tabSearch=G('tab-search'), tabPlayer=G('tab-player');
  if (tab==='search') {
    sidebar.classList.add('active'); center.classList.remove('active');
    tabSearch.classList.add('active'); tabPlayer.classList.remove('active');
  } else {
    sidebar.classList.remove('active'); center.classList.add('active');
    tabSearch.classList.remove('active'); tabPlayer.classList.add('active');
  }
}

// ── YouTube Player ──
let YT_player=null, ytReady=false, ticker=null;

window.onYouTubeIframeAPIReady = function() {
  YT_player = new YT.Player('yt-player', {
    videoId:'M7lc1UVf-VE',
    playerVars:{autoplay:0,controls:0,rel:0,modestbranding:1},
    events:{
      onReady(e){
        ytReady=true;
        e.target.setVolume(ST.vol*100);
        setStatus('ok','Ready — search anything!');
      },
      onStateChange(e){
        if(e.data===YT.PlayerState.PLAYING){
          ST.playing=true; syncPP();
          G('cover').classList.add('playing');
          G('cv-load').classList.remove('on');
          G('mobile-mini').classList.add('on');
          clearInterval(ticker);
          ticker=setInterval(()=>{
            ST.pos=YT_player.getCurrentTime()*1000;
            ST.dur=YT_player.getDuration()*1000;
            syncBar();
            if(ST.lrcType==='synced') tickLrc(ST.pos);
          },250);
        } else if(e.data===YT.PlayerState.PAUSED){
          ST.playing=false; syncPP();
          G('cover').classList.remove('playing');
          clearInterval(ticker);
        } else if(e.data===YT.PlayerState.ENDED){
          G('cover').classList.remove('playing');
          clearInterval(ticker);
          if(ST.repeat){YT_player.seekTo(0);YT_player.playVideo();}
          else nextTrack();
        }
      },
      onError(e){
        const track=ST.queue[ST.idx];
        if(track?.ytIds?.length>track.ytTry+1){
          track.ytTry++;
          YT_player.loadVideoById(track.ytIds[track.ytTry]);
        } else {
          G('cv-load').classList.remove('on');
          toast('⚠ Blocked — try another');
        }
      }
    }
  });
};

const tag=document.createElement('script');
tag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

// ── YouTube Search ──
async function findVideoIds(artist, title) {
  const q=encodeURIComponent(`${artist} ${title} audio`);
  const proxies=[
    `https://corsproxy.io/?https%3A%2F%2Fwww.youtube.com%2Fresults%3Fsearch_query%3D${q}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://www.youtube.com/results?search_query=${q}`)}`,
  ];
  for(const url of proxies){
    try{
      const html=await fetch(url).then(r=>r.text());
      const ids=[...html.matchAll(/"videoId":"([a-zA-Z0-9_-]{11})"/g)]
        .map(m=>m[1]).filter((v,i,a)=>a.indexOf(v)===i).slice(0,5);
      if(ids.length) return ids;
    } catch{}
  }
  throw new Error('search failed');
}

// ── iTunes Search ──
let srchTmr=null;
const qIn=G('q-in'), qDrp=G('q-drop'), qSpn=G('q-spin');
qIn.addEventListener('input', e=>{
  clearTimeout(srchTmr);
  const q=e.target.value.trim();
  if(!q){hideDrop();return;}
  srchTmr=setTimeout(()=>doSearch(q),380);
});
qIn.addEventListener('focus',()=>{if(qDrp.innerHTML)qDrp.style.display='block';});
document.addEventListener('click',e=>{if(!e.target.closest('.search-area'))hideDrop();});

async function doSearch(q){
  qSpn.style.display='block';
  qDrp.innerHTML='<div class="drop-msg">Searching…</div>';
  qDrp.style.display='block';
  try{
    const res=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&entity=song&limit=12`);
    const data=await res.json();
    qSpn.style.display='none';
    if(!data.results?.length){qDrp.innerHTML='<div class="drop-msg">No results</div>';return;}
    renderDrop(data.results);
  }catch{qSpn.style.display='none';qDrp.innerHTML='<div class="drop-msg">Search failed</div>';}
}

function renderDrop(tracks){
  qDrp.innerHTML=tracks.map(t=>{
    const artSm=t.artworkUrl100||'';
    const artLg=artSm.replace('100x100bb','600x600bb');
    const data={title:t.trackName,artist:t.artistName,album:t.collectionName||'',artSm:artSm||null,artLg:artLg||null,durMs:t.trackTimeMillis||null};
    const id='tr_'+Math.random().toString(36).slice(2);
    (window._td=window._td||{})[id]=data;
    return `<div class="di" onclick="pickTrack('${id}')">
      <div class="di-art">${artSm?`<img src="${artSm}" alt="">`:'🎵'}</div>
      <div class="di-inf"><div class="di-t">${x(t.trackName)}</div><div class="di-s">${x(t.artistName)} · ${x(t.collectionName||'')}</div></div>
      <span class="di-dur">${ms2t(t.trackTimeMillis)}</span>
      <div class="di-add"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
    </div>`;
  }).join('');
}
async function pickTrack(id){hideDrop();qIn.value='';const t=window._td?.[id];if(t)addAndPlay(t);}
function hideDrop(){qDrp.style.display='none';}

// ── URL Add ──
G('url-btn').addEventListener('click',addFromUrl);
G('url-in').addEventListener('keydown',e=>{if(e.key==='Enter')addFromUrl();});
async function addFromUrl(){
  const el=G('url-in'),url=el.value.trim();
  if(!url)return;
  const m=url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(!m){toast('Paste a YouTube URL');return;}
  el.value='';
  addAndPlay({title:'YouTube track',artist:'YouTube',album:'',artSm:null,artLg:null,durMs:null,ytIds:[m[1]],ytTry:0});
}

// ── Queue ──
function addAndPlay(track){const i=ST.queue.length;ST.queue.push(track);appendQI(track,i);loadTrack(i);}

function appendQI(track,i){
  const list=G('q-list');list.querySelector('.q-empty')?.remove();
  const el=document.createElement('div');
  el.className='qi';el.id=`qi${i}`;el.dataset.idx=i;
  el.innerHTML=`<div class="qi-th" id="qt${i}">${track.artSm?`<img src="${track.artSm}" alt="">`:'🎵'}</div>
    <div class="qi-inf"><div class="qi-t">${x(track.title)}</div><div class="qi-a">${x(track.artist)}</div></div>
    <button class="qi-rm" onclick="rmQI(event,${i})">×</button>`;
  el.addEventListener('click',e=>{if(!e.target.classList.contains('qi-rm'))loadTrack(i);});
  list.appendChild(el);
}
function rmQI(e,i){e.stopPropagation();ST.queue.splice(i,1);rebuildQ();if(ST.idx===i){ST.idx=-1;resetNP();}else if(ST.idx>i)ST.idx--;}
function rebuildQ(){const l=G('q-list');l.innerHTML='';if(!ST.queue.length){l.innerHTML='<div class="q-empty">Queue is empty</div>';return;}ST.queue.forEach((t,i)=>appendQI(t,i));if(ST.idx>=0)markQI(ST.idx);}
function markQI(idx){
  document.querySelectorAll('.qi').forEach(el=>{
    const i=+el.dataset.idx;el.classList.toggle('now',i===idx);
    const th=el.querySelector('.qi-th');th.querySelector('.now-ind')?.remove();
    if(i===idx){const b=document.createElement('div');b.className='now-ind';b.innerHTML='<div class="bars"><b></b><b></b><b></b></div>';th.appendChild(b);el.scrollIntoView({block:'nearest',behavior:'smooth'});}
  });
}

// ── Load Track ──
async function loadTrack(idx){
  if(!ytReady||idx<0||idx>=ST.queue.length)return;
  ST.idx=idx;
  const track=ST.queue[idx];
  markQI(idx);updateNP(track);
  G('cv-load').classList.add('on');
  ST.playing=false;ST.pos=0;ST.dur=0;syncPP();

  if(!track.ytIds){
    setStatus('loading','Finding on YouTube…');
    try{
      track.ytIds=await findVideoIds(track.artist,track.title);
      track.ytTry=0;
      setStatus('ok','Ready — search anything!');
    }catch{
      G('cv-load').classList.remove('on');
      setStatus('err','Search failed');
      toast('Could not find track');
      return;
    }
  }

  YT_player.loadVideoById(track.ytIds[track.ytTry]);
  fetchLyrics(track.title,track.artist);
  // On mobile, switch to player view
  if(window.innerWidth<=768) switchMobileTab('player');
}

function updateNP(track){
  G('empty-st').style.display='none';
  const np=G('np');np.classList.add('on');
  G('np-t').textContent=track.title;G('np-a').textContent=track.artist;
  G('pb-t').textContent=track.title;G('pb-a').textContent=track.artist;
  // Mini player
  G('mini-t').textContent=track.title;G('mini-a').textContent=track.artist;
  const hasArt=!!track.artLg;
  G('cv-ph').style.display=hasArt?'none':'';G('cv-img').style.display=hasArt?'block':'none';
  if(hasArt)G('cv-img').src=track.artLg;
  G('pb-ph').style.display=hasArt?'none':'';G('pb-img').style.display=hasArt?'block':'none';
  if(hasArt)G('pb-img').src=track.artSm||track.artLg;
  G('mini-ph').style.display=hasArt?'none':'';G('mini-img').style.display=hasArt?'block':'none';
  if(hasArt)G('mini-img').src=track.artSm||track.artLg;
  const at=G('album-tag');
  if(track.album){at.style.display='inline-flex';at.textContent=track.album;}else at.style.display='none';
}
function resetNP(){
  G('empty-st').style.display='';G('np').classList.remove('on');
  G('cover').classList.remove('playing');
  G('pb-t').textContent='No track selected';G('pb-a').textContent='—';
  G('prog-f').style.width='0%';G('t-c').textContent='0:00';G('t-d').textContent='0:00';
  G('mobile-mini').classList.remove('on');
  ST.playing=false;syncPP();
}

// ── Transport ──
function togglePlay(){if(!ytReady||ST.idx<0)return;ST.playing?YT_player.pauseVideo():YT_player.playVideo();}
function prevTrack(){if(!ST.queue.length)return;if(ST.pos>3000){YT_player.seekTo(0);return;}loadTrack(ST.shuffle?rnd():(ST.idx-1+ST.queue.length)%ST.queue.length);}
function nextTrack(){if(!ST.queue.length)return;loadTrack(ST.shuffle?rnd():(ST.idx+1)%ST.queue.length);}
function rnd(){return Math.floor(Math.random()*ST.queue.length);}
function syncPP(){
  const play='<path d="M8 5v14l11-7z"/>';
  const pause='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  const ico=ST.playing?pause:play;
  G('pp-ico').innerHTML=ico;
  G('m-pp-ico').innerHTML=ico;
  G('mini-pp-ico').innerHTML=ico;
}
function syncBar(){
  if(!ST.dur)return;
  const pct=Math.min(100,ST.pos/ST.dur*100).toFixed(2)+'%';
  G('prog-f').style.width=pct;G('t-c').textContent=ms2t(ST.pos);G('t-d').textContent=ms2t(ST.dur);
  // Mobile
  G('m-prog-f').style.width=pct;G('m-t-c').textContent=ms2t(ST.pos);G('m-t-d').textContent=ms2t(ST.dur);
}

// Progress click (desktop)
G('prog').addEventListener('click',e=>{
  if(!ST.dur||ST.idx<0)return;
  const r=e.currentTarget.getBoundingClientRect();
  YT_player.seekTo(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*(ST.dur/1000));
});
// Progress click (mobile)
G('m-prog').addEventListener('click',e=>{
  if(!ST.dur||ST.idx<0)return;
  const r=e.currentTarget.getBoundingClientRect();
  YT_player.seekTo(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*(ST.dur/1000));
});
// Volume
G('vol-tr').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect();
  ST.vol=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  G('vol-f').style.width=(ST.vol*100)+'%';
  if(ytReady&&!ST.muted)YT_player.setVolume(ST.vol*100);
});
G('btn-vol').addEventListener('click',()=>{
  ST.muted=!ST.muted;G('btn-vol').classList.toggle('on',ST.muted);
  if(ytReady)YT_player.setVolume(ST.muted?0:ST.vol*100);
  G('vol-ico').innerHTML=ST.muted
    ?'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2"/><line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2"/>'
    :'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>';
});

G('btn-sf').addEventListener('click',()=>{ST.shuffle=!ST.shuffle;G('btn-sf').classList.toggle('on',ST.shuffle);G('m-btn-sf').classList.toggle('on',ST.shuffle);});
G('btn-rp').addEventListener('click',()=>{ST.repeat=!ST.repeat;G('btn-rp').classList.toggle('on',ST.repeat);G('m-btn-rp').classList.toggle('on',ST.repeat);});

// ── Lyrics ──
async function fetchLyrics(title,artist){
  ST.lrc=[];ST.lrcType='none';ST.lrcActive=-1;
  const scroll=G('lscroll'), badge=G('lbadge-top');
  badge.style.display='none';
  scroll.innerHTML='<div class="lrc-empty"><p>Finding lyrics…</p></div>';
  const clean=s=>s.replace(/\(.*?\)/g,'').replace(/\[.*?\]/g,'').replace(/\bfeat\.?.*$/i,'').replace(/\bft\.?.*$/i,'').trim();
  const ct=clean(title),ca=clean(artist);
  for(const [t,a] of [[ct,ca],[title,artist]]){
    const d=await lrclibGET(t,a);
    if(d?.syncedLyrics){const lines=parseLRC(d.syncedLyrics);if(lines.length){ST.lrc=lines;ST.lrcType='synced';badge.textContent='✦ SYNCED';badge.className='lrc-badge sync';badge.style.display='inline-flex';renderSynced();return;}}
    if(d?.plainLyrics){ST.lrcType='plain';badge.textContent='PLAIN';badge.className='lrc-badge';badge.style.display='inline-flex';renderPlain(d.plainLyrics);return;}
  }
  for(const [t,a] of [[ct,ca],[title,artist]]){
    const d=await lrclibSEARCH(t,a);
    if(d?.syncedLyrics){const lines=parseLRC(d.syncedLyrics);if(lines.length){ST.lrc=lines;ST.lrcType='synced';badge.textContent='✦ SYNCED';badge.className='lrc-badge sync';badge.style.display='inline-flex';renderSynced();return;}}
    if(d?.plainLyrics){ST.lrcType='plain';badge.textContent='PLAIN';badge.className='lrc-badge';badge.style.display='inline-flex';renderPlain(d.plainLyrics);return;}
  }
  for(const [a,t] of [[ca,ct],[artist,title]]){
    try{const r=await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(a)}/${encodeURIComponent(t)}`);if(r.ok){const d=await r.json();if(d.lyrics?.length>20){ST.lrcType='plain';badge.textContent='LYRICS.OVH';badge.className='lrc-badge';badge.style.display='inline-flex';renderPlain(d.lyrics);return;}}}catch{}
  }
  scroll.innerHTML='<div class="lrc-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg><p>No lyrics found</p></div>';
}

async function lrclibGET(track,artist){try{const r=await fetch(`https://lrclib.net/api/get?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`,{headers:{'Lrclib-Client':'Wavelength/4.0'}});if(r.status===200)return await r.json();}catch{}return null;}
async function lrclibSEARCH(track,artist){try{const r=await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`,{headers:{'Lrclib-Client':'Wavelength/4.0'}});if(r.ok){const a=await r.json();if(a?.length)return a.find(x=>x.syncedLyrics)||a.find(x=>x.plainLyrics)||null;}}catch{}return null;}
function parseLRC(raw){return raw.split('\n').map(line=>{const m=line.match(/^\[(\d{1,3}):(\d{2}(?:\.\d+)?)\](.*)/);if(!m)return null;return{ms:parseInt(m[1])*60000+parseFloat(m[2])*1000,text:m[3].trim()};}).filter(Boolean);}
function renderSynced(){G('lscroll').innerHTML=ST.lrc.map((l,i)=>`<div class="ll" id="ll${i}" onclick="seekLrc(${i})">${x(l.text)||'♪'}</div>`).join('');}
function renderPlain(text){G('lscroll').innerHTML=text.replace(/\r\n/g,'\n').split('\n').map((l,i)=>`<div class="ll plain" id="ll${i}">${x(l)||' '}</div>`).join('');}
function seekLrc(i){if(ST.lrcType==='synced'&&ST.lrc[i])YT_player.seekTo(ST.lrc[i].ms/1000);}
function tickLrc(posMs){
  if(!ST.lrc.length)return;
  let active=0;
  for(let i=0;i<ST.lrc.length;i++){if(posMs>=ST.lrc[i].ms)active=i;else break;}
  if(active===ST.lrcActive)return;
  ST.lrcActive=active;
  document.querySelectorAll('.ll').forEach((el,i)=>{
    el.classList.remove('now','past');
    if(i<active)el.classList.add('past');
    if(i===active)el.classList.add('now');
  });
  document.getElementById(`ll${active}`)?.scrollIntoView({block:'center',behavior:'smooth'});
}

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;
  const ok=ytReady&&ST.idx>=0;
  switch(e.code){
    case'Space':e.preventDefault();togglePlay();break;
    case'ArrowRight':e.preventDefault();if(ok)YT_player.seekTo(YT_player.getCurrentTime()+10);break;
    case'ArrowLeft':e.preventDefault();if(ok)YT_player.seekTo(Math.max(0,YT_player.getCurrentTime()-10));break;
    case'ArrowUp':e.preventDefault();ST.vol=Math.min(1,ST.vol+.1);G('vol-f').style.width=(ST.vol*100)+'%';if(ytReady)YT_player.setVolume(ST.vol*100);break;
    case'ArrowDown':e.preventDefault();ST.vol=Math.max(0,ST.vol-.1);G('vol-f').style.width=(ST.vol*100)+'%';if(ytReady)YT_player.setVolume(ST.vol*100);break;
    case'KeyN':nextTrack();break;
    case'KeyP':prevTrack();break;
    case'KeyS':G('btn-sf').click();break;
    case'KeyR':G('btn-rp').click();break;
    case'KeyM':G('btn-vol').click();break;
  }
});
</script>
