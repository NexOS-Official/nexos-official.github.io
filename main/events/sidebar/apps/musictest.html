async function lrclibGET(track, artist) {
  try {
    const url = `https://lrclib.net/api/get?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`;
    const r = await proxyFetch(url, { headers: { 'Lrclib-Client': 'Wavelength/4.0' } }, 6000);
    if (r.status === 200 || r.ok) return await r.json();
  } catch {}
  return null;
}
async function lrclibSEARCH(track, artist) {
  try {
    const url = `https://lrclib.net/api/search?track_name=${encodeURIComponent(track)}&artist_name=${encodeURIComponent(artist)}`;
    const r = await proxyFetch(url, { headers: { 'Lrclib-Client': 'Wavelength/4.0' } }, 6000);
    if (r.ok) {
      const a = await r.json();
      if (a?.length) return a.find(x => x.syncedLyrics) || a.find(x => x.plainLyrics) || null;
    }
  } catch {}
  return null;
}

function parseLRC(rawStr) {
  return rawStr.split('\n').map(line => {
    const m = line.match(/^\[(\d{1,3}):(\d{2}(?:\.\d+)?)\](.*)/);
    if (!m) return null;
    const ms = parseInt(m[1])*60000 + parseFloat(m[2])*1000;
    const raw = m[3];

    
    const wTagRe = /<(\d{1,3}):(\d{2}\.\d+)>([^<]*)/g;
    let wm; const wTimed = [];
    while ((wm = wTagRe.exec(raw)) !== null) {
      const wMs = parseInt(wm[1])*60000 + parseFloat(wm[2])*1000;
      const word = wm[3].trim();
      if (word) wTimed.push({ ms: wMs, word });
    }

    let text = raw.replace(/<[^>]+>/g,'').trim();
    if (/^[♪♫\s\-_]+$/.test(text)) text = '';
    return { ms, text, _wordTimed: wTimed.length > 0 ? wTimed : null };
  }).filter(Boolean);
}

// Common words whose syllable count is irregular or context-dependent when sung
const SYLLABLE_EXCEPTIONS = {
  // 1 syllable
  'fire':1,'hour':1,'our':1,'are':1,'were':1,'there':1,'where':1,'here':1,
  'sure':1,'your':1,'you\'re':1,'they\'re':1,'we\'re':1,'i\'m':1,'i\'ll':1,
  'i\'ve':1,'i\'d':1,'you\'re':1,'it\'s':1,'that\'s':1,'he\'s':1,'she\'s':1,
  'who\'s':1,'what\'s':1,'there\'s':1,'here\'s':1,'let\'s':1,'don\'t':1,
  'can\'t':1,'won\'t':1,'isn\'t':1,'aren\'t':1,'wasn\'t':1,'weren\'t':1,
  'hadn\'t':1,'hasn\'t':1,'haven\'t':1,'didn\'t':1,'doesn\'t':1,'wouldn\'t':1,
  'couldn\'t':1,'shouldn\'t':1,'ain\'t':1,'through':1,'though':1,'you':1,
  'do':1,'to':1,'two':1,'too':1,'who':1,'knew':1,'new':1,'true':1,'blue':1,
  'give':1,'live':1,'love':1,'come':1,'some':1,'done':1,'none':1,'one':1,
  'gone':1,'have':1,'give':1,'been':1,'said':1,'does':1,'says':1,
  // 2 syllables  
  'every':2,'even':2,'over':2,'under':2,'never':2,'other':2,'after':2,
  'only':2,'also':2,'away':2,'again':2,'around':2,'before':2,'between':2,
  'because':2,'people':2,'little':2,'different':2,'water':2,'power':2,
  'always':2,'something':2,'nothing':2,'anything':2,'everything':2,
  'heaven':2,'river':2,'better':2,'pretty':2,'feeling':2,'saying':2,
  'making':2,'taking':2,'coming':2,'going':2,'knowing':2,'showing':2,
  'trying':2,'crying':2,'lying':2,'dying':2,'flying':2,'buying':2,
  'runnin':2,'tryna':2,'wanna':2,'gonna':2,'gotta':2,'kinda':2,'sorta':2,
  'ya':1,'uh':1,'oh':1,'ah':1,'ooh':1,'mm':1,'hmm':1,'yeah':1,'yea':1,
  'hey':1,'ok':2,'okay':2,
  // 3 syllables
  'beautiful':3,'family':3,'natural':3,'personal':3,'national':3,
  'magical':3,'physical':3,'musical':3,'spiritual':3,'criminal':3,
  'memory':3,'history':3,'mystery':3,'company':3,'enemy':3,'energy':3,
  'separate':3,'desperate':3,'different':2,'comfortable':4,
  'everything':3,'anyone':3,'everyone':3,'somebody':3,'nobody':3,
  'another':3,'together':3,'forever':3,'whatever':3,'whenever':3,
  'wherever':3,'however':3,'remember':3,'surrender':3,'discover':3,
  'consider':3,'deliver':3,'recover':3,'together':3,'belong':2,
  // 4 syllables
  'everybody':4,'everything':3,'ordinary':4,'imaginary':5,'unnecessary':5,
  'American':4,'individual':5,'communication':5,'information':4,
  'relationship':4,'opportunity':5,'responsibility':6,
};

function syllableCount(word) {
  // Strip punctuation for lookup but keep apostrophes for contractions
  const stripped = word.toLowerCase().replace(/[^a-z']/g, '');
  if (!stripped) return 1;
  if (SYLLABLE_EXCEPTIONS[stripped] !== undefined) return SYLLABLE_EXCEPTIONS[stripped];

  // Work on version without apostrophes for phonetic rules
  let w = stripped.replace(/'/g, '');
  if (!w) return 1;

  // Common suffix normalizations
  w = w
    .replace(/tion$/, 'shun').replace(/sion$/, 'shun')
    .replace(/cious$/, 'shus').replace(/tious$/, 'shus')
    .replace(/cial$/, 'shul').replace(/tial$/, 'shul')
    .replace(/eous$/, 'us').replace(/ious$/, 'us')
    .replace(/geous$/, 'jus')
    .replace(/ture$/, 'cher')
    .replace(/ised$/, 'ized').replace(/ises$/, 'izes')
    .replace(/ue$/, '') // argue→argu, blue→blu handled by vowel count
    .replace(/le$/, 'ul'); // handle→handul, simple→simpul

  // Silent e (not after vowel+e pattern like "ee", "ae")
  if (w.length > 2 && w.endsWith('e') && !/[aeiou]e$/.test(w)) w = w.slice(0, -1);
  // Silent ed
  if (w.endsWith('ed') && !/[dt]ed$/.test(w)) w = w.slice(0, -1);

  const vowelGroups = w.match(/[aeiouy]+/g);
  let count = vowelGroups ? vowelGroups.length : 1;

  // Leading y is consonant
  if (w[0] === 'y') count = Math.max(1, count - 1);

  return Math.max(1, count);
}

const FAST_WORDS = new Set([
  'a','an','the','and','or','but','in','on','at','to','for','of','by','up',
  'so','my','me','we','he','she','it','i','is','as','be','do','go','no','if',
  'oh','ah','mm','mmm','its','im','ive','ill','id','our','are','was','were',
  'had','has','have','that','this','with','from','not','can','will','just','your',
]);

const VOWELS = new Set(['a','e','i','o','u']);

function _lerp(x, lo, hi) { return lo + x * (hi - lo); }

function _paceFactor(msPerSyl) {
  return Math.max(0, Math.min(1, (msPerSyl - 80) / 620));
}


// Words that carry emotional weight — singers hold these longer
const HELD_WORDS = new Set([
  'love','loved','loving','lover','hate','hated','pain','cry','cried','tears',
  'heart','soul','mind','life','die','died','dead','death','live','lived',
  'lost','gone','away','alone','cold','dark','light','hope','dream','dreamed',
  'dreaming','stay','stayed','leave','leaving','left','need','needed','want',
  'wanted','wait','waiting','hold','holding','held','fall','fell','falling',
  'break','broke','broken','burn','burned','burning','fade','fading','faded',
  'never','always','forever','ever','still','free','true','real','deep',
  'far','near','long','strong','wrong','right','night','fight','time',
  'mine','yours','ours','home','safe','brave','name','face','eyes','hands',
  'all','end','begin','rise','run','fly','stand','fall','rise','shine',
  'scream','whisper','silence','breathe','bleed','heal','save','lost',
]);

function wordDurMul(word, syls, isLast, msPerSyl) {
  const clean = word.replace(/[^a-z']/gi, '').replace(/'/g, '').toLowerCase();
  const len   = clean.length;
  const pace  = _paceFactor(msPerSyl);

  // Base multiplier by word category
  let mul;
  if (FAST_WORDS.has(clean)) {
    mul = _lerp(pace, 0.40, 0.58); // function words are quick
  } else if (len <= 2) {
    mul = _lerp(pace, 0.55, 0.70);
  } else if (len <= 3) {
    mul = _lerp(pace, 0.72, 0.86);
  } else {
    mul = _lerp(pace, 0.88, 1.06);
  }

  // Emotional/held words — singers linger on these
  if (HELD_WORDS.has(clean)) mul *= _lerp(pace, 1.15, 1.45);

  // Open vowel endings — singer holds the note out (oo, oh, ay, ah, ee)
  if (/[aeiou]{2,}$/.test(clean)) mul *= _lerp(pace, 1.20, 1.60); // "free", "away", "blue"
  else if (/[aeo]$/.test(clean) && len > 2) mul *= _lerp(pace, 1.08, 1.22); // "come", "love"

  // Repeated vowel sounds (oooh, ahhh etc) — held sustain
  if (/([aeiou])\1{1,}/.test(clean)) mul *= _lerp(pace, 1.30, 1.70);

  // Multi-syllable words need proportionally more time
  if (syls >= 3) mul *= 1.05;
  if (syls >= 4) mul *= 1.08;

  // Last word always gets a natural hold
  if (isLast) {
    const holdBoost = HELD_WORDS.has(clean) || /[aeiou]$/.test(clean)
      ? _lerp(pace, 1.50, 2.40) // held last word (e.g. "forever", "free")
      : _lerp(pace, 1.25, 1.85); // normal last word
    mul *= holdBoost;
  }

  return mul;
}

function wordPauseAfter(word, msPerSyl) {
  const pace = _paceFactor(msPerSyl);
  // Strip trailing symbols to get actual last char
  const w = word.replace(/\s+$/, '');
  if (/[,;]$/.test(w))  return msPerSyl * _lerp(pace, 0.18, 0.65);
  if (/:$/.test(w))     return msPerSyl * _lerp(pace, 0.25, 0.75);
  if (/[—–…]$/.test(w)) return msPerSyl * _lerp(pace, 0.40, 1.10);
  if (/!$/.test(w))     return msPerSyl * _lerp(pace, 0.22, 0.72);
  if (/\?$/.test(w))    return msPerSyl * _lerp(pace, 0.28, 0.82);
  if (/\.$/.test(w))    return msPerSyl * _lerp(pace, 0.15, 0.55);
  if (/[-~*]$/.test(w)) return msPerSyl * _lerp(pace, 0.10, 0.30); // continuation marks
  return 0;
}

function wordSpeedWeight(word, syls, isLast) {
  return wordDurMul(word, syls, isLast, 200) * syls;
}

function timingForWords(rawWords, lineMs, nextMs) {
  const n    = rawWords.length;
  if (n === 0) return [];

  const syls = rawWords.map(syllableCount);
  const totalSyls = syls.reduce((a,b) => a+b, 0) || 1;

  // Cap the singing window — above 500ms/syl is an instrumental gap, not slow singing
  const rawGapMs = Math.max(200, nextMs - lineMs - 60);
  const maxSingMs = Math.round(totalSyls * 500 * 1.5);
  const gapMs = Math.min(rawGapMs, maxSingMs);

  // Estimate ms-per-syllable from this line
  const neutralMsPerSyl = Math.max(80, gapMs / totalSyls);
  const pauseEst = rawWords.reduce((acc, w) => acc + wordPauseAfter(w, neutralMsPerSyl), 0);
  const singMs   = Math.max(150, gapMs - pauseEst);
  const msPerSyl = Math.max(80, singMs / totalSyls);

  // Compute weighted duration for each word using its syllable count + phonetic mul
  // This gives "I love you forever" roughly: 5%, 12%, 8%, 75% of time
  const weights = rawWords.map((w, wi) =>
    syls[wi] * wordDurMul(w, syls[wi], wi === n - 1, msPerSyl)
  );
  const pauseDurs = rawWords.map(w => wordPauseAfter(w, msPerSyl));
  const totalWeight = weights.reduce((a,b) => a+b, 0) || 1;
  const totalPause  = pauseDurs.reduce((a,b) => a+b, 0);

  // Distribute singMs proportionally by weight
  const singBudget = Math.max(150, singMs - totalPause);
  let fillDurs = weights.map(w => (w / totalWeight) * singBudget);

  // Enforce minimums: function words ≥ 40ms, content words ≥ 65ms
  fillDurs = fillDurs.map((d, wi) => {
    const c = rawWords[wi].replace(/[^a-z]/gi,'').toLowerCase();
    const min = FAST_WORDS.has(c) ? 40 : 65;
    return Math.max(d, min);
  });

  // If we've overrun, scale down proportionally (preserve shape)
  const totalFill = fillDurs.reduce((a,b) => a+b, 0);
  const budget = gapMs - totalPause;
  if (totalFill > budget && budget > 0) {
    const scale = budget / totalFill;
    fillDurs = fillDurs.map((d, wi) => {
      const c = rawWords[wi].replace(/[^a-z]/gi,'').toLowerCase();
      const min = FAST_WORDS.has(c) ? 35 : 55;
      return Math.max(min, d * scale);
    });
  }

  // Build result with cursor
  const result = [];
  let cursor = lineMs;
  for (let wi = 0; wi < n; wi++) {
    result.push({ ms: Math.round(cursor), word: rawWords[wi] });
    cursor += fillDurs[wi];
    if (pauseDurs[wi] > 40) {
      result.push({ ms: Math.round(cursor), word: '', _isPause: true });
      cursor += pauseDurs[wi];
    } else {
      cursor += pauseDurs[wi];
    }
  }
  return result;
}

function buildWordTimings(lrc) {
  const expanded = [];

  for (let i = 0; i < lrc.length; i++) {
    const line    = lrc[i];
    const nextMs  = lrc[i+1]?.ms ?? null;
    const rawText = line.text?.trim() ?? '';

    
    if (!rawText) {
      expanded.push(line);
      continue;
    }

    const { mainText, parens } = extractParens(rawText);

    
    
    if (!mainText && parens.length > 0) {
      for (const paren of parens) {
        expanded.push({
          ms: line.ms,
          text: paren.text,
          _wordTimed: null,
          _synthetic: false,
          _isParen: true,
          _parenParentMs: line.ms,  
          _wholeLine: true,         
        });
      }
      

      continue;
    }

    const mainRawWords = mainText.split(/\s+/).filter(Boolean);
    const mainSyls     = mainRawWords.reduce((a,w) => a + syllableCount(w), 0) || 1;
    const gap          = nextMs !== null ? nextMs - line.ms : 3500;

    const estSingMs = gap * 0.65;

    expanded.push({ ...line, text: mainText,
      _parensSource: parens.length > 0 ? parens : null,
      _inlineParens: parens.filter(p => p.isMidLine)
    });

    for (const paren of parens.filter(p => !p.isMidLine)) {
      const frac  = mainRawWords.length > 0
        ? Math.min(0.92, paren.afterWordIdx / mainRawWords.length) : 0.5;
      let parenMs = Math.round(line.ms + estSingMs * frac);
      if (nextMs !== null) parenMs = Math.min(parenMs, nextMs - 80);
      expanded.push({
        ms: parenMs, text: paren.text,
        _wordTimed: null, _synthetic: false,
        _isParen: true, _parenParentMs: line.ms,
      });
    }


  }

  
  for (let i = 0; i < expanded.length - 1; i++) {
    if (!expanded[i]._isParen) continue;
    let nextMain = -1;
    for (let j = i + 1; j < expanded.length; j++) {
      if (!expanded[j]._isParen && !expanded[j]._synthetic) { nextMain = j; break; }
    }
    if (nextMain === -1) continue;
    if (expanded[i].ms >= expanded[nextMain].ms) {
      const [paren] = expanded.splice(i, 1);
      paren.ms = Math.max(paren.ms, expanded[nextMain - 1].ms + 50);
      expanded.splice(nextMain, 0, paren);
      i--;
    }
  }

  
  return expanded.map((line, i) => {
    const lineMs   = line.ms;
    
    
    
    let nextMs;
    if (line._isParen || line._synthetic) {
      
      nextMs = lineMs + 3500;
      for (let j = i + 1; j < expanded.length; j++) {
        if (!expanded[j]._isParen && !expanded[j]._synthetic) {
          nextMs = expanded[j].ms;
          break;
        }
      }
    } else {
      // Use the next REAL lyric line, not the next array entry (which might be a paren)
      nextMs = lineMs + 3500;
      for (let j = i + 1; j < expanded.length; j++) {
        if (!expanded[j]._isParen && !expanded[j]._synthetic) {
          nextMs = expanded[j].ms;
          break;
        }
      }
    }
    // Filter out symbol-only tokens (♪, ~, -, *, etc.) — they aren't words to sync
    const rawWords = (line.text || '').split(/\s+/).filter(w => {
      if (!w) return false;
      // Keep if it has at least one letter or digit
      return /[a-zA-Z0-9']/.test(w);
    });

    if (!rawWords.length) {
      const nextIsWholeParen = expanded[i+1]?._wholeLine;
      const gapMs = Math.max(400, nextMs - lineMs);
      
      
      let nearbyMsPerSyl = 200; 
      for (let k = Math.max(0,i-3); k <= Math.min(expanded.length-1, i+3); k++) {
        const kl = expanded[k];
        if (!kl.text?.trim() || kl._isParen || kl._synthetic) continue;
        const kNext = expanded[k+1]?.ms ?? (kl.ms + 2000);
        const kWords = kl.text.split(/\s+/).filter(Boolean);
        const kSyls  = kWords.reduce((a,w) => a + syllableCount(w), 0) || 1;
        nearbyMsPerSyl = (kNext - kl.ms) / kSyls;
        break;
      }
      
      const bpm       = Math.round(60000 / Math.max(100, nearbyMsPerSyl * 2));
      const beatDur   = Math.round(Math.min(800, Math.max(280, 60000 / Math.max(60, bpm))));
      return { ...line, words: [], beatDur, _skipDots: !!nextIsWholeParen };
    }

    if (line._wordTimed?.length) {
      return { ...line, words: line._wordTimed };
    }

    const baseWords = timingForWords(rawWords, lineMs, nextMs);

    
    
    
    if (line._inlineParens?.length) {
      const result = [];
      let realWordIdx = 0;
      for (let wi = 0; wi < baseWords.length; wi++) {
        const w = baseWords[wi];
        if (!w._isPause && !w._isInlineParen) {
          
          for (const ip of line._inlineParens) {
            if (ip.afterWordIdx === realWordIdx) {
              
              
              result.push({ ms: w.ms, word: ip.text, _isInlineParen: true });
            }
          }
          realWordIdx++;
        }
        result.push(w);
      }
      
      for (const ip of line._inlineParens) {
        if (ip.afterWordIdx >= realWordIdx) {
          const lastReal = result.filter(w => !w._isPause && !w._isInlineParen).pop();
          result.push({ ms: lastReal?.ms ?? lineMs, word: ip.text, _isInlineParen: true });
        }
      }
      return { ...line, words: result };
    }

    return { ...line, words: baseWords };
  });
}

function extractParens(text) {
  const parens = [];
  
  let remaining = text;
  let wordCount = 0;
  const re = /^(.*?)\(([^)]+)\)([\s\S]*)$/;

  while (remaining.includes('(')) {
    const m = remaining.match(re);
    if (!m) break;
    const before      = m[1];
    const inner       = m[2];
    const after       = m[3];
    const beforeWords = before.trim().split(/\s+/).filter(w => w.length > 0);
    wordCount += beforeWords.length;
    const afterWords  = after.trim().split(/\s+/).filter(w => w.length > 0);
    parens.push({
      text: inner,
      afterWordIdx: wordCount,   
      isMidLine: afterWords.length > 0,
    });
    
    remaining = after;
    
  }

  const mainText = text.replace(/\([^)]+\)/g, '').replace(/\s+/g, ' ').trim();
  return { mainText, parens };
}

function renderLineHTML(line, i) {
  
  if (line._skipDots) return '';

  const isNote = !line.words?.length &&
    (!line.text || line.text.trim() === '♪' || line.text.trim() === '');

  let mainHTML;
  if (isNote) {
    const beatDur = line.beatDur ?? 600;
    mainHTML = `<span class="beat-dots" style="--beat-dur:${beatDur}ms"><span></span><span></span><span></span></span>`;
  } else {
    if (line.words?.length) {
      
      
      const parts = [];
      for (let wi = 0; wi < line.words.length; wi++) {
        const w = line.words[wi];
        if (w._isPause) continue;
        if (w._isInlineParen) {
          
          let nextWi = wi + 1;
          while (nextWi < line.words.length && (line.words[nextWi]._isPause || line.words[nextWi]._isInlineParen)) nextWi++;
          const nextW = line.words[nextWi];
          const ipSpan = `<span class="lw-ip-text lw upcoming" id="lw${i}_${wi}" style="--pct:-20%">${x(w.word)}</span>`;
          if (nextW && !nextW._isPause && !nextW._isInlineParen) {
            
            const wordSpan = `<span class="lw upcoming" id="lw${i}_${nextWi}" style="--pct:-20%">${x(nextW.word)}</span>`;
            parts.push(`<span class="lw-inline-paren">${ipSpan}${wordSpan}</span>`);
            wi = nextWi; 
          } else {
            parts.push(ipSpan);
          }
          continue;
        }
        parts.push(`<span class="lw upcoming" id="lw${i}_${wi}" style="--pct:-20%">${x(w.word)}</span>`);
      }
      mainHTML = parts.join(' ');
    } else {
      mainHTML = x(line.text || '');
    }
  }

  
  
  const cls = 'll' + (line._isParen && !line._wholeLine ? ' ll-sub' : '');
  return `<div class="${cls}" id="ll${i}" onclick="seekLrc(${i},event)">${mainHTML}</div>`;
}

function renderSynced() {
  
  Object.keys(_lwState).forEach(k => delete _lwState[k]);
  G('lscroll').innerHTML = ST.lrc.map((l, i) => renderLineHTML(l, i)).join('');
}

function seekLrc(i, evt) {
  if (ST.lrcType !== 'synced' || !ST.lrc[i]) return;
  
  const el = document.getElementById('ll'+i);
  if (el && evt) {
    const r = document.createElement('span');
    r.className = 'll-ripple';
    const rect = el.getBoundingClientRect();
    r.style.left = (evt.clientX - rect.left) + 'px';
    r.style.top  = (evt.clientY - rect.top)  + 'px';
    el.appendChild(r);
    setTimeout(() => r.remove(), 600);
  }
  YT_player.seekTo(ST.lrc[i].ms / 1000);
}

const _lwState = {};

function _setLwState(id, cls, pct, sweepMs) {
  const prev = _lwState[id];
  if (prev && prev.cls === cls && prev.pct === pct) return;
  _lwState[id] = { cls, pct };

  const el = document.getElementById(id);
  if (!el) return;

  const wasUpcoming = !prev || prev.cls === 'upcoming';
  const isEntry = wasUpcoming && cls === 'now-word';

  if (cls === 'now-word' && sweepMs != null) {
    // Set the transition duration directly — this is the only reliable way
    el.style.transition = `--pct ${sweepMs}ms linear, opacity 60ms ease-out`;
  } else if (cls === 'done' || cls === 'upcoming') {
    el.style.transition = 'none';
  }

  if (isEntry) {
    el.className = 'lw now-word word-enter';
    // Set start position without transition, then trigger sweep in next frame
    el.style.setProperty('--pct', '-20%');
    requestAnimationFrame(() => {
      if (_lwState[id]?.cls !== 'now-word') return;
      el.style.transition = `--pct ${sweepMs ?? 120}ms linear, opacity 60ms ease-out`;
      el.style.setProperty('--pct', '110%');
      setTimeout(() => el.classList.remove('word-enter'), 180);
    });
  } else {
    el.className = 'lw ' + cls;
    el.style.setProperty('--pct', pct);
  }
}

function _nextRealLineMs(fromIdx, fallback) {
  for (let j = fromIdx + 1; j < ST.lrc.length; j++) {
    if (!ST.lrc[j]._isParen && !ST.lrc[j]._synthetic) return ST.lrc[j].ms;
  }
  return fallback;
}

function _tickWords(lineIdx, t, nextBound) {
  const words = ST.lrc[lineIdx]?.words;
  if (!words?.length) return;

  let lastRealIdx = words.length - 1;
  while (lastRealIdx > 0 && (words[lastRealIdx]._isPause || words[lastRealIdx]._isInlineParen)) lastRealIdx--;

  const lastW = words[lastRealIdx];
  if (!lastW) return;
  const lastSyls = syllableCount(lastW.word || '');

  const realWords = words.filter(w => !w._isPause && !w._isInlineParen);
  const totalSyls = realWords.reduce((a, w) => a + syllableCount(w.word), 0) || 1;

  // msPerSyl from actual word spread — never from gap to next line
  const lineSpanMs = realWords.length > 1 ? realWords[realWords.length-1].ms - realWords[0].ms : 0;
  let msPerSyl;
  if (realWords.length > 1) {
    const nonLastSyls = Math.max(1, totalSyls - lastSyls);
    msPerSyl = Math.max(80, Math.min(500, lineSpanMs / nonLastSyls));
  } else {
    msPerSyl = Math.max(80, Math.min(380, Math.min(nextBound - lastW.ms, 1800) / totalSyls));
  }

  const pace    = _paceFactor(msPerSyl);
  const holdMul = _lerp(pace, 1.15, 1.80);
  const lastWordEnd = Math.min(
    lastW.ms + Math.round(lastSyls * msPerSyl * holdMul),
    lastW.ms + 2200,
    nextBound - 80
  );

  const singEnd = ST.lrc[lineIdx]?._singEnd;
  const effectiveEnd = (singEnd && singEnd > lastW.ms && singEnd < nextBound && singEnd <= lastWordEnd + 300)
    ? singEnd : lastWordEnd;

  let allDone = true;

  for (let wi = 0; wi < words.length; wi++) {
    const w = words[wi];
    if (w._isPause || w._isInlineParen) continue;

    const wStart = w.ms;
    const isLast = (wi === lastRealIdx);
    let wEnd = effectiveEnd;
    if (!isLast) {
      for (let ni = wi + 1; ni < words.length; ni++) {
        const nw = words[ni];
        if (!nw._isPause && !nw._isInlineParen) {
          // Sweep ends 85% of the way to next word — leaves a natural micro-gap
          wEnd = Math.round(wStart + (nw.ms - wStart) * 0.85);
          break;
        }
        if (nw._isPause) { wEnd = nw.ms; break; }
      }
    }

    const durMs = Math.max(50, wEnd - wStart);
    const id = 'lw' + lineIdx + '_' + wi;

    if (t < wStart) {
      allDone = false;
      _setLwState(id, 'upcoming', '-20%');
    } else if (t >= wEnd) {
      _setLwState(id, 'done', '110%');
    } else {
      allDone = false;
      const prev = _lwState[id];
      if (!prev || prev.cls !== 'now-word') {
        // Word just became active. Sweep from -20% → 110% over the FULL word duration (durMs).
        // This means the gradient position accurately tracks where in the word we are.
        // AHEAD=20ms so t ≈ wStart when this fires, giving us near-full sweep time.
        const el = document.getElementById(id);
        if (el) {
          const isEntry = !prev || prev.cls === 'upcoming';
          el.className = 'lw now-word' + (isEntry ? ' word-enter' : '');
          el.style.transition = 'none';
          el.style.setProperty('--pct', '-20%');
          requestAnimationFrame(() => {
            if (_lwState[id]?.cls !== 'now-word') return;
            el.style.transition = `--pct ${durMs}ms linear, opacity 60ms ease-out`;
            el.style.setProperty('--pct', '110%');
            setTimeout(() => el.classList.remove('word-enter'), 170);
          });
        }
        _lwState[id] = { cls: 'now-word', pct: '110%' };
      }
    }
  }

  // ll-sung: dim the line as soon as all sweeps complete
  const lineEl = document.getElementById('ll' + lineIdx);
  if (lineEl?.classList.contains('now')) {
    lineEl.classList.toggle('ll-sung', allDone || t >= effectiveEnd);
  }
}
function _snapDone(lineIdx) {
  (ST.lrc[lineIdx]?.words || []).forEach((w, wi) => {
    if (w._isPause) return;
    const id = 'lw'+lineIdx+'_'+wi;
    const el = document.getElementById(id);
    if (el) el.style.transition = 'none';
    _setLwState(id, 'done', '110%');
  });
}

function _resetUpcoming(lineIdx) {
  (ST.lrc[lineIdx]?.words || []).forEach((w, wi) => {
    if (w._isPause) return;
    const id = 'lw'+lineIdx+'_'+wi;
    delete _lwState[id];
    const el = document.getElementById(id);
    if (el) el.style.transition = 'none';
    _setLwState(id, 'upcoming', '-20%');
  });
}

function _resetUpcomingSelective(lineIdx, t) {
  const words = ST.lrc[lineIdx]?.words;
  if (!words) return;
  words.forEach((w, wi) => {
    if (w._isPause) return;
    const id = 'lw'+lineIdx+'_'+wi;
    delete _lwState[id];
    const el = document.getElementById(id);
    if (el) el.style.transition = 'none';
    if (w.ms > t) _setLwState(id, 'upcoming', '-20%');
  });
}

function tickLrc(posMs) {
  if (!ST.lrc.length) return;

  // Small constant lookahead — just enough to account for rAF render delay
  // The sweep is timed from wStart to wEnd (full word duration), not from t
  const AHEAD = 20;
  const t = posMs + AHEAD;

  let lo = 0, hi = ST.lrc.length - 1, active = 0;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (ST.lrc[mid].ms <= t) { active = mid; lo = mid + 1; }
    else hi = mid - 1;
  }

  const activeEntry = ST.lrc[active];
  let focus = active;
  let parenActive = -1;

  if (activeEntry._synthetic) {
    while (focus > 0 && (ST.lrc[focus]._isParen || ST.lrc[focus]._synthetic)) focus--;
  } else if (activeEntry._isParen && !activeEntry._wholeLine) {
    let prevReal = active - 1;
    while (prevReal >= 0 && (ST.lrc[prevReal]._isParen || ST.lrc[prevReal]._synthetic)) prevReal--;
    if (prevReal < 0) {
      focus = active;
    } else {
      const wasRepositioned = activeEntry._parenParentMs !== ST.lrc[prevReal].ms;
      if (wasRepositioned) { focus = active; }
      else { focus = prevReal; parenActive = active; }
    }
  } else {
    focus = active;
    const focusMs = activeEntry.ms;
    for (let j = focus + 1; j < ST.lrc.length; j++) {
      const e = ST.lrc[j];
      if (!e._isParen || e._wholeLine) break;
      if (e._parenParentMs !== focusMs) break;
      if (e.ms <= t) parenActive = j;
    }
  }

  if (focus !== ST.lrcActive) {
    const prev = ST.lrcActive;
    ST.lrcActive = focus;

    const domLines = document.querySelectorAll('#lscroll .ll');
    domLines.forEach((el, i) => {
      el.classList.remove('now','past','past2','past3','near','near2','near3','ll-sung');
      const entry = ST.lrc[i];
      let di = i;
      if (entry?._isParen || entry?._synthetic) {
        for (let k = i - 1; k >= 0; k--) {
          if (!ST.lrc[k]._isParen && !ST.lrc[k]._synthetic) { di = k; break; }
        }
      }
      const dist = di - focus;
      const absDist = Math.abs(dist);
      el.style.filter = '';
      if (dist < 0) {
        if      (absDist === 1) el.classList.add('past');
        else if (absDist === 2) el.classList.add('past2');
        else                    el.classList.add('past3');
      } else if (dist > 0) {
        if      (absDist === 1) el.classList.add('near');
        else if (absDist === 2) el.classList.add('near2');
        else                    el.classList.add('near3');
      }
    });

    const focusEl = document.getElementById('ll'+focus);
    if (focusEl) {
      focusEl.classList.remove('now');
      focusEl.offsetWidth;
      focusEl.classList.add('now');
      focusEl.scrollIntoView({ block:'center', behavior:'smooth' });
    }

    if (prev >= 0 && prev !== focus) _snapDone(prev);
    _resetUpcomingSelective(focus, t);

    if (ST._parenActive >= 0 && ST._parenActive !== parenActive) {
      document.getElementById('ll'+ST._parenActive)?.classList.remove('now');
      _snapDone(ST._parenActive);
      ST._parenActive = -1;
    }
  }

  if (parenActive !== ST._parenActive) {
    if (ST._parenActive >= 0) {
      document.getElementById('ll'+ST._parenActive)?.classList.remove('now');
      _snapDone(ST._parenActive);
    }
    ST._parenActive = parenActive;
    if (parenActive >= 0) {
      document.getElementById('ll'+focus)?.classList.remove('now');
      document.getElementById('ll'+parenActive)?.classList.add('now');
      _resetUpcomingSelective(parenActive, t);
    } else {
      document.getElementById('ll'+focus)?.classList.add('now');
    }
  }

  let focusBound = t + 6000;
  for (let j = focus + 1; j < ST.lrc.length; j++) {
    const e = ST.lrc[j];
    if (e._isParen && !e._wholeLine && e._parenParentMs === ST.lrc[focus]?.ms) continue;
    focusBound = e.ms;
    break;
  }

  if (parenActive >= 0) {
    _tickWords(focus, t, ST.lrc[parenActive].ms);
    let parenBound = t + 6000;
    for (let j = parenActive + 1; j < ST.lrc.length; j++) { parenBound = ST.lrc[j].ms; break; }
    _tickWords(parenActive, t, parenBound);
  } else {
    _tickWords(focus, t, focusBound);
  }
}


const _smartRepeatCache = {};

async function doSmartRepeat() {
  const track = ST.queue[ST.idx];
  if (!track) { YT_player.seekTo(0); YT_player.playVideo(); return; }

  const ck = (track.title + '||' + track.artist).toLowerCase();
  let seekMs = _smartRepeatCache[ck];

  if (seekMs === undefined) {
    if (ST.lrcType === 'synced' && ST.lrc.length) {
      seekMs = await _askAIRepeatPoint(track.title, track.artist, ST.lrc);
    }
    _smartRepeatCache[ck] = seekMs ?? 0;
  }

  await _blendSeek((seekMs || 0) / 1000);
}

async function _askAIRepeatPoint(title, artist, lrc) {
  
  const map = lrc
    .filter(l => l.text && !l._isParen && !l._synthetic)
    .slice(0, 60)
    .map(l => `${l.ms} ${l.text.split(/\s+/).slice(0,5).join(' ')}`)
    .join('\n');

  const prompt = `Song: "${title}" by ${artist}

You are a music producer choosing the perfect gapless loop re-entry point for seamless repeat playback (like Apple Music Dolby Atmos).

Rules:
- Pick the first line of Verse 1 (after any intro/instrumental opening)
- If there's no clear verse 1 start, pick the first line where the main vocal melody begins
- NEVER pick the first line (index 0) unless there is truly no intro
- NEVER pick an outro, bridge, or "fade out" section
- The loop should feel natural — listener shouldn't notice the restart

LRC lines available (ms timestamp then lyric snippet):
${map}

Reply with ONLY the ms integer of your chosen line. Nothing else.`;

  try {
    const res = await fetch('/ai-lyrics', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${AI_KEY}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': location.href,
        'X-Title': 'Ghost Music'
      },
      body: JSON.stringify({
        model: AI_MODEL,
        max_tokens: 20,
        temperature: 0.1,
        messages: [{ role: 'user', content: prompt }]
      }),
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) return null;
    const data = await res.json();
    const raw  = data.choices?.[0]?.message?.content?.trim();
    const ms   = parseInt(raw);
    if (isNaN(ms) || ms < 0) return null;
    
    const valid = lrc.some(l => Math.abs(l.ms - ms) < 2000);
    return valid ? ms : null;
  } catch { return null; }
}

async function _blendSeek(seekSec) {
  if (!ytReady) { YT_player.seekTo(seekSec); YT_player.playVideo(); return; }
  ST._blending = true;
  const targetVol = ST.muted ? 0 : ST.vol * 100;
  const lscroll   = G('lscroll');

  
  if (lscroll) {
    lscroll.classList.remove('blend-in');
    lscroll.classList.add('blend-out');
  }

  
  const OUT_STEPS = 48, OUT_MS = 25;
  for (let i = OUT_STEPS; i >= 0; i--) {
    const frac = i / OUT_STEPS;
    YT_player.setVolume(targetVol * frac * frac);
    await new Promise(r => setTimeout(r, OUT_MS));
  }
  YT_player.setVolume(0);

  
  await new Promise(r => setTimeout(r, 600));

  
  YT_player.seekTo(seekSec, true);
  YT_player.playVideo();

  
  await new Promise(resolve => {
    const deadline = Date.now() + 3000;
    const poll = setInterval(() => {
      if (YT_player.getPlayerState?.() === 1 || Date.now() > deadline) {
        clearInterval(poll); resolve();
      }
    }, 40);
  });

  
  if (lscroll) {
    lscroll.classList.remove('blend-out');
    lscroll.classList.add('blend-in');
    setTimeout(() => lscroll.classList.remove('blend-in'), 1300);
  }

  
  const IN_STEPS = 40, IN_MS = 25;
  for (let i = 0; i <= IN_STEPS; i++) {
    const frac = i / IN_STEPS;
    YT_player.setVolume(targetVol * (1 - Math.pow(1 - frac, 2.2)));
    await new Promise(r => setTimeout(r, IN_MS));
  }
  YT_player.setVolume(targetVol);
  ST._blending = false;
}

const _artistCache = {};

async function openArtistProfile(artistName, hintArt) {
  showPanel('artist');
  const inner = G('artist-panel-inner');
  const bg = G('artist-bg');
  const spinHTML = '<div class="artist-loading"><div style="width:18px;height:18px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--pink);border-radius:50%;animation:spin .55s linear infinite;flex-shrink:0;"></div><span>Loading artist…</span></div>';
  inner.innerHTML = spinHTML;
  if (hintArt) { bg.style.backgroundImage = `url('${hintArt}')`; bg.classList.add('on'); }

  const ck = artistName.toLowerCase().trim();
  let cached = _artistCache[ck];
  if (!cached) {
    cached = await fetchArtistData(artistName);
    _artistCache[ck] = cached;
  }

  const { tracks, artistImg } = cached;
  const heroImg = artistImg || hintArt || tracks.find(t=>t.artworkUrl100)?.artworkUrl100 || '';
  if (heroImg) { bg.style.backgroundImage = `url('${heroImg}')`; bg.classList.add('on'); }

  renderArtistProfile(artistName, tracks, heroImg, inner);
}

async function fetchArtistData(artistName) {
  let artistImg = null;
  let artistId = null;
  const al = artistName.toLowerCase();

  
  const artistData = await itunesFetch(
    `https://itunes.apple.com/search?term=${encodeURIComponent(artistName)}&entity=musicArtist&limit=15&country=US`
  );
  if (artistData?.results) {
    const match =
      artistData.results.find(r => r.wrapperType === 'artist' && r.artistName?.toLowerCase() === al) ||
      artistData.results.find(r => r.wrapperType === 'artist' && r.artistName?.toLowerCase().startsWith(al.split(' ')[0])) ||
      artistData.results.find(r => r.wrapperType === 'artist');
    if (match) artistId = match.artistId;
  }

  let tracks = [];

  
  if (artistId) {
    const ld = await itunesFetch(
      `https://itunes.apple.com/lookup?id=${artistId}&entity=song&limit=200&country=US`
    );
    tracks = (ld?.results || []).filter(r => r.wrapperType === 'track' && r.kind === 'song');
  }

  
  if (tracks.length < 3) {
    const ld = await itunesFetch(
      `https://itunes.apple.com/search?term=${encodeURIComponent(artistName)}&media=music&entity=song&limit=50&country=US`
    );
    const extra = (ld?.results || []).filter(t =>
      t.wrapperType === 'track' && t.kind === 'song' &&
      t.artistName?.toLowerCase().includes(al.split(' ')[0])
    );
    
    const seen = new Set(tracks.map(t => t.trackId));
    for (const t of extra) if (!seen.has(t.trackId)) { tracks.push(t); seen.add(t.trackId); }
  }

  
  

  
  const artTrack = tracks.find(t => t.artworkUrl100);
  if (artTrack) artistImg = artTrack.artworkUrl100.replace('100x100bb', '600x600bb');

  return { tracks: tracks.slice(0, 60), artistImg };
}

  const rowsHTML = tracks.length ? tracks.map((t, i) => {
    const sm = t.artworkUrl100 || '';

      <div class="artist-track-add" onclick="event.stopPropagation();pickTrack('${id}')"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>

  }).join('') : '<div class="artist-loading" style="padding:30px 0"><span>No tracks found</span></div>';

  container.innerHTML = `

        <div class="artist-name-big">${x(artistName)}</div>

        <button class="artist-play-all" onclick="playAllArtist('_apl_${playAllId}')">▶ Play All</button>
      </div>
    </div>
    <div class="artist-section-lbl">Songs</div>
    ${rowsHTML}
  `;
}

function playAllArtist(key) {
  const tracks = window[key]; if (!tracks?.length) return;
  ST.queue = []; ST.idx = -1;
  G('q-list').innerHTML = '';
  tracks.forEach(t => { const i = ST.queue.length; ST.queue.push({...t}); appendQI(t, i); });
  loadTrack(0);
  showPanel('queue');
  toast('Playing artist');
}

document.addEventListener('keydown', e => {
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;
  const ok=ytReady&&ST.idx>=0;
  switch(e.code){
    case 'Space': e.preventDefault(); togglePlay(); break;
    case 'ArrowRight': e.preventDefault(); if(ok)YT_player.seekTo(YT_player.getCurrentTime()+10); break;
    case 'ArrowLeft':  e.preventDefault(); if(ok)YT_player.seekTo(Math.max(0,YT_player.getCurrentTime()-10)); break;
    case 'ArrowUp':   e.preventDefault(); ST.vol=Math.min(1,ST.vol+.1);G('vol-f').style.width=(ST.vol*100)+'%';if(ytReady)YT_player.setVolume(ST.vol*100);break;
    case 'ArrowDown': e.preventDefault(); ST.vol=Math.max(0,ST.vol-.1);G('vol-f').style.width=(ST.vol*100)+'%';if(ytReady)YT_player.setVolume(ST.vol*100);break;
    case 'KeyN': nextTrack(); break;
    case 'KeyP': prevTrack(); break;
    case 'KeyS': G('btn-sf').click(); break;
    case 'KeyR': G('btn-rp').click(); break;
    case 'KeyM': G('btn-vol').click(); break;
    case 'KeyL': G('pnb-lyrics').click(); break;
    case 'KeyH': G('btn-heart').click(); break;
  }
});
</script>
</body>
