
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ghost Friends</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Google Sans", system-ui, -apple-system, sans-serif;
    background: #fff;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { display: flex; align-items: center; gap: 24px; }
  .title { font-size: 2.25rem; line-height: 1; }
  .title .bold { font-weight: 700; }
  .title .light { font-weight: 400; }
  .sub { margin-top: 6px; font-size: 1.125rem; }
  .btn {
    width: 56px; height: 56px; border-radius: 9999px;
    background: #000; color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    text-decoration: none; transition: transform .15s ease;
  }
  .btn:hover { transform: scale(1.05); }
  .btn svg { width: 24px; height: 24px; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="title"><span class="bold">Ghost</span> <span class="light">inc.</span></div>
      <div class="sub">introducing friends</div>
    </div>
    <a href="/friends" class="btn" aria-label="Go to friends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </a>
  </div>
</body>
</html>
