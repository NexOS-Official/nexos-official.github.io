<!DOCTYPE html>
<html>
<head>
  <title>Logging you in...</title>
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
      document.body.innerHTML = "No token found.";
    } else {
      localStorage.setItem("lastfm_token", token);

      window.location.href = "/main/events/sidebar/apps/music.html";
    }
  </script>
</body>
</html>
