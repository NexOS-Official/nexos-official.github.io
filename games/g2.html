<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@100..900&display=swap" rel="stylesheet">
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
        <script id="aclib" type="text/javascript" src="https://acscdn.com/script/aclib.js"></script>
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-PFE26JMWNJ"></script>
        <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PFE26JMWNJ');
        </script>
        <style>
:root {
    --bg-color: #0a0a0a;
    --accent-color: #3b82f6;
    --text-color: #ffffff;
    --card-bg: rgba(255, 255, 255, 0.05);
    --border-color: rgba(255, 255, 255, 0.05);
    --transition-speed: 0.3s;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', 'Geist', sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 0;
    background: radial-gradient(ellipse at top, rgba(59, 130, 246, 0.1) 0%, var(--bg-color) 60%);
}

.gametainer {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 80px 24px 30px 24px;
}

.search-sec {
    margin-bottom: 48px;
    animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.search-box {
    max-width: 600px;
    margin: 0 auto;
    position: relative;
}

.search-in-wpr {
    display: flex;
    align-items: center;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 14px 20px;
    backdrop-filter: blur(20px);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.search-in-wpr:hover {
    border-color: rgba(59, 130, 246, 0.3);
    background: rgba(255, 255, 255, 0.08);
}

.search-in-wpr:focus-within {
    border-color: var(--accent-color);
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
}

.search-icon {
    width: 20px;
    height: 20px;
    color: var(--accent-color);
    margin-right: 14px;
    flex-shrink: 0;
}

.search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 15px;
    font-family: inherit;
}

.search-input::placeholder {
    color: rgba(255, 255, 255, 0.3);
}

.game-cont {
    animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s both;
}

.gamegrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.gcard {
    aspect-ratio: 1;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
    animation: cardIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.gcard:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--accent-color);
    transform: scale(1.05);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
}

.gicon {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.02);
}

.gicon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
}

.gcard:hover .gicon img {
    transform: scale(1.1);
}

.game-nm {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
    padding: 20px 12px 12px;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s ease;
}

.gcard:hover .game-nm {
    opacity: 1;
    transform: translateY(0);
}

.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    color: rgba(255, 255, 255, 0.4);
}

.empty-state i {
    width: 48px;
    height: 48px;
    margin-bottom: 16px;
}

.back-btn {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 10000;
    cursor: pointer;
}

.back-btn-in {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.8);
    border: 1px solid var(--border-color);
    border-radius: 18px;
    width: 36px;
    height: 36px;
    backdrop-filter: blur(12px);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
}

.back-btn-in i {
    width: 18px;
    height: 18px;
    color: #fff;
    flex-shrink: 0;
}

.back-txt {
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    opacity: 0;
    width: 0;
    margin-left: 0;
    transition: all 0.3s ease;
}

.back-btn:hover .back-btn-in {
    width: auto;
    padding: 0 14px 0 9px;
    background: #fff;
}

.back-btn:hover .back-btn-in i {
    color: #000;
}

.back-btn:hover .back-txt {
    opacity: 1;
    width: auto;
    margin-left: 8px;
    color: #000;
}

.prov-sel {
    position: relative;
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
}

.prov-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(20px);
    transition: all 0.25s ease;
}

.prov-btn:hover {
    border-color: var(--accent-color);
    color: #fff;
    background: rgba(255, 255, 255, 0.1);
}

.prov-badge {
    font-weight: 700;
    color: var(--accent-color);
}

.prov-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    backdrop-filter: blur(24px);
    overflow: hidden;
    min-width: 200px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    z-index: 100;
    animation: dropIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes dropIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.prov-dropdown.open { display: block; }

.prov-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    transition: all 0.15s ease;
}

.prov-option:hover {
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
}

.prov-option.active {
    color: var(--accent-color);
    background: rgba(59, 130, 246, 0.1);
}

.prov-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    transition: all 0.15s ease;
}

.prov-option.active .prov-dot {
    background: var(--accent-color);
    box-shadow: 0 0 6px var(--accent-color);
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }
        </style>
    </head>
    <body>
        <div id="particles-js"></div>
        <iframe id="zoneFrame" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;"></iframe>
        <div id="closeGame" class="back-btn" style="display:none;" onclick="closeGame()">
            <div class="back-btn-in">
                <i data-lucide="x"></i>
                <span class="back-txt">Back</span>
            </div>
        </div>
        <div id="fsBtn" class="back-btn" style="display:none;top:68px;" onclick="tglFullscreen()">
            <div class="back-btn-in" style="pointer-events:none;">
                <i data-lucide="maximize"></i>
                <span class="back-txt">Fullscreen</span>
            </div>
        </div>
        <div class="gametainer">
            <div class="search-sec">
                <div class="search-box">
                    <div class="search-in-wpr">
                        <div class="search-icon">
                            <i data-lucide="search"></i>
                        </div>
                        <input type="text" class="search-input" placeholder="search games..." id="gameSearch">
                    </div>
                </div>
            </div>
            <div class="game-cont">
                <div class="gamegrid" id="gameGrid"></div>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <i data-lucide="circle-question-mark"></i>
                    <p>no games found</p>
                </div>
            </div>
        </div>
        <script>
lucide.createIcons();
let games=[];
let fGames=[];
let aGames=[];

const COVER_URL = "https://cdn.jsdelivr.net/gh/gn-math/covers@main";
const HTML_URL = "https://cdn.jsdelivr.net/gh/gn-math/html@main";
const CKV_URL = "https://cdn.jsdelivr.net/gh/WanoCapy/ChickenKingsVault@main";
const CKV_ICONS_URL = "https://raw.githubusercontent.com/carbonicality/ChickenKingsVault/main";
const HYDRA_URL = "https://cdn.jsdelivr.net/gh/Hydra-Network/hydra-assets@main";

let currProvider = localStorage.getItem('krypton_provider') || 'ckv';

window.addEventListener('message', (event) => {
    if (event.data.type === 'themeChange') {
        const colors = event.data.theme;
        for (const [key, value] of Object.entries(colors)) {
            document.documentElement.style.setProperty(`--${key}`, value);
        }
    }
});

async function fetchGames() {
    try {
        let zonesUrl = "https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json";
        try {
            const sharesponse = await fetch("https://api.github.com/repos/gn-math/assets/commits?t="+Date.now());
            if (sharesponse && sharesponse.status===200) {
                const shajson=await sharesponse.json();
                const sha=shajson[0]['sha'];
                if (sha) {
                    zonesUrl =`https://cdn.jsdelivr.net/gh/gn-math/assets@${sha}/zones.json`;
                }
            }
        } catch (error) {}
        const res = await fetch(zonesUrl+"?t="+Date.now());
        const gnMathZones = await res.json();
        games = gnMathZones
            .filter(zone => zone.id !== -1 && zone.id !== 1 && zone.id !== 64)
            .map(zone => {
                let url = zone.url.replace("{HTML_URL}",HTML_URL).replace("{COVER_URL}",COVER_URL);
                if (zone.id===0) {
                    url = "https://cdn.jsdelivr.net/gh/bubbls/youtube-playables@main/bowmasters/index.html";
                }
                return {
                    name:zone.name,
                    icon:zone.cover.replace("{COVER_URL}",COVER_URL).replace("{HTML_URL}",HTML_URL),
                    url: url
                }
            });
        localStorage.setItem('krypton_games_list',JSON.stringify(games));
        if (!navigator.onLine) {
            checkGames().then(cachedUrls => {
                fGames = games.filter(game => cachedUrls.includes(game.url));
                renderGames();
            });
        } else {
            aGames = [...games];
            fGames = [...games];
            renderGames();
        }
    } catch (error) {
        const cachedGames = localStorage.getItem('krypton_games_list');
        if (cachedGames) {
            games=JSON.parse(cachedGames);
            if (!navigator.onLine) {
                checkGames().then(cachedUrls => {
                    aGames = games.filter(game=>cachedUrls.includes(game.url));
                    fGames = [...aGames];
                    renderGames();
                });
            } else {
                fGames = [...games];
                renderGames();
            }
        }
    }
}

function loadProvider(provider) {
    currProvider = provider;
    localStorage.setItem('krypton_provider',provider);
    games = [];fGames=[];aGames=[];
    const badge  = document.getElementById('provBadge');
    if (badge) badge.textContent = provider==='ckv'?'CKV':provider==='hydra'?'Hydra':'gn-math';
    document.querySelectorAll('.prov-option').forEach(el => {
        el.classList.toggle('active',el.dataset.provider===provider);
    });
    if (provider==='ckv') fetchCKVGames();
    else if (provider==='hydra') fetchHydraGames();
    else fetchGames();
}

function initProvSel() {
    const wrapper = document.querySelector('.search-sec');
    const searchBox = document.querySelector('.search-box');
    if (!wrapper || !searchBox) return;
    const providerEl = document.createElement('div');
    providerEl.className = 'prov-sel';
    providerEl.innerHTML = `
    <div class="prov-btn" id="provBtn">
        <i data-lucide="layers"></i>
        <span id="provBadge" class="prov-badge">${currProvider === 'ckv' ? 'CKV' : currProvider === 'hydra' ? 'Hydra' : 'gn-math'}</span>
        <i data-lucide="chevron-down" class="prov-chevron"></i>
    </div>
    <div class="prov-dropdown" id="provDropdown">
        <div class="prov-option ${currProvider === 'ckv'?'active':''}" data-provider="ckv">
            <span class="prov-dot"></span>
            CKV
        </div>
        <div class="prov-option ${currProvider === 'hydra'?'active':''}" data-provider="hydra">
            <span class="prov-dot"></span>
            Hydra
        </div>
        <div class="prov-option ${currProvider === 'gnmath'?'active':''}" data-provider="gnmath">
            <span class="prov-dot"></span>
            gn-math
        </div>
    </div>`;
    wrapper.insertBefore(providerEl,searchBox);
    const btn = document.getElementById('provBtn');
    const dropdown= document.getElementById('provDropdown');
    btn.addEventListener('click',(e)=>{
        e.stopPropagation();
        dropdown.classList.toggle('open');
    });
    document.addEventListener('click',()=>dropdown.classList.remove('open'));
    providerEl.querySelectorAll('.prov-option').forEach(el=>{
        el.addEventListener('click',()=>{
            dropdown.classList.remove('open');
            loadProvider(el.dataset.provider);
        });
    });
    lucide.createIcons();
}

async function fetchCKVGames() {
    try {
        const iconMap = {};
        try {
            const iconRes = await fetch(`${CKV_ICONS_URL}/games.json?t=${Date.now()}`);
            const iconJson = await iconRes.json();
            iconJson.forEach(g => {
                const key = g.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                iconMap[key] = `${CKV_ICONS_URL}/${g.img}`;
            });
        } catch (e) {}
        const apiUrl = `https://api.github.com/repos/WanoCapy/ChickenKingsVault/contents/`;
        const res = await fetch(apiUrl);
        const json = await res.json();
        let htmlFiles = json.filter(f => f.type==='file'&&f.name.endsWith('.html') && f.name !=='index.html');
        const prettyFiles = htmlFiles.filter(f => /[A-Z\s]/.test(f.name));
        if (prettyFiles.length > 0) htmlFiles = prettyFiles;
        games = htmlFiles.map(f => {
            const normKey = f.name.replace('.html','').toLowerCase().replace(/[^a-z0-9]/g, '');
            const icon = iconMap[normKey]||'';
            return {
                name:f.name.replace('.html',''),
                icon:icon,
                url:`${CKV_URL}/${f.name}`
            };
        });
        localStorage.setItem('krypton_games_list_ckv',JSON.stringify(games));
        aGames = [...games];
        fGames = [...games];
        renderGames();
    } catch (error) {
        const cachedGames = localStorage.getItem('krypton_games_list_ckv');
        if (cachedGames) {
            games = JSON.parse(cachedGames);
            if (!navigator.onLine) {
                checkGames().then(cachedUrls => {
                    aGames=games.filter(game=>cachedUrls.includes(game.url));
                    fGames=[...aGames];
                    renderGames();
                });
            } else {
                aGames=[...games];
                fGames=[...games];
                renderGames();
            }
        }
    }
}

async function fetchHydraGames() {
    try {
        const res=await fetch(`${HYDRA_URL}/gmes.json?t=${Date.now()}`);
        const json=await res.json();
        games = json.map(g => ({
            name: g.title,
            icon: `${HYDRA_URL}/${g.thumb}`,
            url: `${HYDRA_URL}/gmes/${g.file_name}`
        }));
        localStorage.setItem('krypton_games_list_hydra',JSON.stringify(games));
        aGames=[...games];
        fGames=[...games];
        renderGames();
    } catch (error) {
        const cachedGames= localStorage.getItem('krypton_games_list_hydra');
        if (cachedGames) {
            games=JSON.parse(cachedGames);
            if (!navigator.onLine) {
                checkGames().then(cachedUrls => {
                    aGames=games.filter(game=>cachedUrls.includes(game.url));
                    fGames=[...aGames];
                    renderGames();
                });
            } else {
                aGames=[...games];
                fGames=[...games];
                renderGames();
            }
        }
    }
}

async function checkGames() {
    try {
        const cache = await caches.open('krypton-v5');
        const requests  =await cache.keys();
        const cachedUrls = requests.map(req => req.url);
        return cachedUrls;
    } catch (err) {
        return [];
    }
}

function genFallback(name) {
    const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<div style="width:100%;height:100%;background:linear-gradient(180deg,var(--accent-color),#93c5fd);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:white;text-shadow:0 2px 8px rgba(0,0,0,0.6);border-radius:inherit;letter-spacing:1px;">${initials}</div>`;
}

function createGC(game) {
    const card = document.createElement('div');
    card.className = 'gcard';
    if (localStorage.getItem('krypton_anims') === 'false') {
        card.style.transition = 'none';
    }
    card.innerHTML = `
    <div class="gicon">
        <img src="${game.icon}" alt="${game.name}" loading="lazy">
    </div>
    <div class="game-nm">${game.name}</div>`;
    const img = card.querySelector('img');
    if (!game.icon) {
        img.parentElement.innerHTML = genFallback(game.name);
    } else {
        img.addEventListener('error',()=>{
            img.parentElement.innerHTML = genFallback(game.name);
        });
    }
    card.addEventListener('click',()=>openGame(game));
    return card;
}

async function openGame(game) {
    try {
        if (game.url.startsWith("http") && !game.url.includes("cdn.jsdelivr.net")) {
            window.open(game.url,"_blank");
            return;
        }
        const res = await fetch(game.url);
        const html = await res.text();
        const frame = document.getElementById('zoneFrame');
        if (!frame) return;
        frame.style.display = 'block';
        frame.contentDocument.open();
        frame.contentDocument.write(html);
        frame.contentDocument.close();

        const removeAds = frame.contentDocument.createElement('script');
        removeAds.textContent=`
        function removeAds() {
            ['sidebarad1','sidebarad2'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.remove();
            });
        }
        removeAds();
        const observer = new MutationObserver(removeAds);
        observer.observe(document.body,{childList:true,subtree:true});`;
        frame.contentDocument.body.appendChild(removeAds);

        frame.contentDocument.body.style.backgroundColor = '#0a0a0a';
        document.getElementById('closeGame').style.display='block';
        document.getElementById('fsBtn').style.display='block';
        lucide.createIcons();
    } catch (err) {
        const frame = document.getElementById('zoneFrame');
        if (!frame || frame.style.display==='none') {
            alert("Failed to load game! :(");
        }
    }
}

function closeGame() {
    const frame = document.getElementById('zoneFrame');
    frame.remove();
    const nFrame = document.createElement('iframe');
    nFrame.id='zoneFrame';
    nFrame.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;';
    document.body.appendChild(nFrame);
    document.getElementById('closeGame').style.display='none';
    document.getElementById('fsBtn').style.display='none';
}

function tglFullscreen() {
    const iframe = document.getElementById('zoneFrame');
    const icon = document.querySelector('#fsBtn i');
    if (!document.fullscreenElement) {
        iframe.requestFullscreen();
        icon.setAttribute('data-lucide','minimize');
    } else {
        document.exitFullscreen();
        icon.setAttribute('data-lucide','maximize');
    }
    lucide.createIcons();
}

function initBack() {
    const isMenu = document.getElementById('gameGrid') !== null;
    if (!isMenu) {
        const backBtn=document.createElement('div');
        backBtn.className='back-btn';
        backBtn.innerHTML =`
        <div class="back-btn-in">
            <i data-lucide="x"></i>
            <span class="back-txt">Back</span>
        </div>`;
        document.body.appendChild(backBtn);
        lucide.createIcons();
        backBtn.addEventListener('click',()=>{
            window.history.back();
        });
    }
}

function renderGames() {
    const grid = document.getElementById('gameGrid');
    const emptyState = document.getElementById('emptyState');
    grid.innerHTML = '';
    if (fGames.length===0) {
        grid.style.display='none';
        emptyState.style.display='flex';
    } else {
        grid.style.display='grid';
        emptyState.style.display='none';
        fGames.forEach((game,index)=>{
            const card = createGC(game);
            card.style.animationDelay=`${index*0.05}s`;
            grid.appendChild(card);
        });
    }
    lucide.createIcons();
}

function searchGames(query) {
    if (!query) {
        fGames=[...aGames];
    } else {
        const lQuery = query.toLowerCase();
        fGames = aGames.filter(game=>{
            return game.name.toLowerCase().includes(lQuery);
        });
    }
    renderGames();
}

const searchInput = document.getElementById('gameSearch');
if (searchInput) {
    searchInput.addEventListener('input',(e)=>{
        searchGames(e.target.value.trim());
    });
    initProvSel();
    loadProvider(currProvider);
}
initBack();

window.addEventListener('DOMContentLoaded',()=>{
    if (!navigator.onLine) {
        const gametainer = document.querySelector('.gametainer');
        if (gametainer) {
            const offlineMsg = document.createElement('div');
            offlineMsg.className='offline-indicator';
            offlineMsg.style.cssText = 'text-align:center;color:#94a3b8;font-size:14px;margin-top:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(239,68,68,0.08);padding:10px 16px;border-radius:10px;border:1px solid rgba(239,68,68,0.2);';
            offlineMsg.innerHTML = '<i data-lucide="wifi-off" style="width=16px;height=16px;"></i> <span>you are offline - showing cached games only</span>';
            gametainer.insertBefore(offlineMsg,gametainer.firstChild);
            lucide.createIcons();
        }
    }
});

let sTimeout;
searchInput.addEventListener('input',(e)=>{
    clearTimeout(sTimeout);
    sTimeout = setTimeout(()=>{
        searchGames(e.target.value.trim());
    },150);
});

function partCount() {
    const preset = localStorage.getItem('krypton_particlePreset') || 'maximum';
    return {off:0,minimal:40,medium:60,maximum:120}[preset]??120;
}

function initParticles() {
    if (localStorage.getItem('krypton_particles')==='false') return;
    const count = partCount();
    if (typeof particlesJS !== 'undefined') {
        particlesJS('particles-js', {
            particles: {
                number: { value: count, density: { enable: true, value_area: 800 } },
                color: { value: ["#3b82f6", "#ffffff"] },
                shape: { type: "circle" },
                opacity: { value: 0.5, random: true, anim: { enable: true, speed: 0.8, opacity_min: 0.1, sync: false } },
                size: { value: 2.5, random: true, anim: { enable: true, speed: 2, size_min: 0.3, sync: false } },
                line_linked: { enable: true, distance: 120, color: "#3b82f6", opacity: 0.15, width: 1 },
                move: { enable: true, speed: 0.8, direction: "none", random: true, straight: false, out_mode: "out", bounce: false }
            },
            interactivity: {
                detect_on: "canvas",
                events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" }, resize: true },
                modes: { grab: { distance: 140, line_linked: { opacity: 0.4 } }, push: { particles_nb: 4 } }
            },
            retina_detect: true
        });
    } else {
        setTimeout(initParticles,100);
    }
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initParticles);
} else {
    initParticles();
}

window.addEventListener('offline',()=>{
    const gametainer = document.querySelector('.gametainer');
    if (gametainer && !document.querySelector('.offline-indicator')) {
        const offlineMsg = document.createElement('div');
        offlineMsg.className = 'offline-indicator';
        offlineMsg.style.cssText = 'text-align:center;color:#94a3b8;font-size:14px;margin-top:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(239,68,68,0.08);padding:10px 16px;border-radius:10px;border:1px solid rgba(239,68,68,0.2);';
        offlineMsg.innerHTML = '<i data-lucide="wifi-off" style="height=16px;width=16px;"></i> <span>you are offline - showing cached games only</span>';
        gametainer.insertBefore(offlineMsg, gametainer.firstChild);
        lucide.createIcons();
        checkGames().then(cachedUrls => {
            aGames = games.filter(game => cachedUrls.includes(game.url));
            fGames = [...aGames];
            renderGames();
        });
    }
});
