<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghostgames | By Eclipse</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Google Sans', 'Product Sans', 'Roboto', sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.in-game { overflow: hidden; }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 58px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 200;
            border-bottom: 1px solid #e8eaed;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 500;
            color: #1a1a1a;
            text-decoration: none;
            user-select: none;
        }

        .logo svg {
            width: 26px;
            height: 26px;
            color: #1a1a1a;
        }

        .search-wrap {
            position: relative;
        }

        .search-input {
            width: 240px;
            padding: 9px 18px;
            border: 1.5px solid #e0e0e0;
            border-radius: 24px;
            font-size: 13.5px;
            font-family: inherit;
            background: #fff;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input::placeholder { color: #aaa; }

        .search-input:focus {
            border-color: #bbb;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
        }

        .content {
            padding: 72px 52px 40px 20px;
        }

        .letter-header {
            grid-column: 1 / -1;
            font-size: 15px;
            font-weight: 600;
            color: #3c3c3c;
            padding: 24px 0 10px;
            letter-spacing: 0.2px;
        }

        .letter-header:first-child { padding-top: 8px; }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
            gap: 14px;
        }

        .game-card {
            aspect-ratio: 16 / 10;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: #e8eaed;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            transition: box-shadow 0.22s ease, transform 0.22s ease;
        }

        .game-card:hover {
            box-shadow: 0 6px 22px rgba(0,0,0,0.18);
            transform: translateY(-2px);
        }

        .cover-wrap {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.12s ease-out;
            will-change: transform;
            transform-origin: 50% 50%;
            pointer-events: none;
        }

        .game-title-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
            padding: 22px 10px 9px;
            font-size: 11.5px;
            font-weight: 500;
            color: #fff;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.22s ease, transform 0.22s ease;
            pointer-events: none;
        }

        .game-card:hover .game-title-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .cover-missing {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e0e0e0;
            color: #999;
            font-size: 11px;
            font-weight: 500;
        }

        .alpha-nav {
            position: fixed;
            right: 7px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 0px;
            z-index: 200;
        }

        .alpha-letter {
            width: 20px;
            height: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9.5px;
            font-weight: 600;
            color: #b0b0b0;
            cursor: pointer;
            border-radius: 4px;
            transition: color 0.14s, background 0.14s;
            user-select: none;
        }

        .alpha-letter:hover {
            color: #1a1a1a;
            background: #ebebeb;
        }

        .alpha-letter.active {
            color: #1a1a1a;
            font-weight: 700;
            background: #e8eaed;
        }

        .alpha-letter.no-games {
            opacity: 0.28;
            cursor: default;
            pointer-events: none;
        }

        .state-msg {
            grid-column: 1 / -1;
            padding: 60px 20px;
            text-align: center;
            color: #999;
            font-size: 14px;
        }

        #gameOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9000;
        }

        #gameOverlay.open { display: block; }

        #gameFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #backBtn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
        }

        #backBtn.open { display: block; }

        .back-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: rgba(255,255,255,0.92);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0,0,0,0.28);
            transition: background 0.18s, transform 0.18s, width 0.22s cubic-bezier(0.34,1.56,0.64,1), border-radius 0.22s;
            overflow: hidden;
            white-space: nowrap;
        }

        .back-inner svg {
            width: 18px;
            height: 18px;
            color: #1a1a1a;
            flex-shrink: 0;
            transition: color 0.18s;
        }

        .back-label {
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            font-family: inherit;
            transition: max-width 0.22s ease, opacity 0.18s ease, margin 0.22s ease;
        }

        #backBtn:hover .back-inner {
            width: auto;
            padding: 0 14px 0 10px;
            border-radius: 20px;
            background: #fff;
        }

        #backBtn:hover .back-label {
            max-width: 60px;
            opacity: 1;
            margin-left: 7px;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 10h.01"/><path d="M15 10h.01"/>
            <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"/>
        </svg>
        Ghostgames | By Eclipse
    </div>
    <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="Search games">
    </div>
</header>

<nav class="alpha-nav" id="alphaNav"></nav>

<main class="content">
    <div class="games-grid" id="gamesGrid">
        <div class="state-msg">Loading games...</div>
    </div>
</main>

<div id="gameOverlay">
    <iframe id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups"></iframe>
</div>

<div id="backBtn">
    <div class="back-inner" id="backBtnInner">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        <span class="back-label">Back</span>
    </div>
</div>

<script>
const AD_DOMAINS = [
    'effectivegatecpm', 'doubleclick', 'googlesyndication', 'adservice', 'adskeeper',
    'adsterra', 'propellerads', 'popads', 'popcash', 'popunder', 'clickadu', 'exoclick',
    'trafficjunky', 'juicyads', 'adcash', 'mgid', 'taboola', 'outbrain', 'revcontent',
    'contentad', 'adblade', 'nativo', 'sharethrough', 'triplelift', 'gumgum', 'inmobi',
    'mopub', 'applovin', 'unity3d.com/ads', 'vungle', 'chartboost', 'ironsource',
    'facebook.com/tr', 'analytics', 'tracking', 'pixel', 'beacon', 'telemetry',
    'cpm', 'gateway', 'api/users?token', 'clicktrack', 'adserver', 'banner', 'sponsor'
];
const AD_KEYWORDS = ['ad', 'popup', 'pop-up', 'click', 'track', 'pixel', 'cpm', 'monetiz'];

function isAdUrl(url) {
    if (!url) return false;
    const lower = url.toString().toLowerCase();
    if (AD_DOMAINS.some(d => lower.includes(d))) return true;
    if (lower.includes('api/users?token=')) return true;
    if (/\/(ads?|pop|click|track|pixel|banner)\//i.test(lower)) return true;
    return false;
}

const originalOpen = window.open;
window.open = function(url, target, features) {
    if (!url) return originalOpen(url, target, features);
    const urlStr = url.toString();
    try {
        const urlObj = new URL(urlStr, window.location.href);
        if (urlObj.origin !== window.location.origin || isAdUrl(urlStr)) {
            console.log('[v0] Blocked popup:', urlStr);
            return null;
        }
    } catch(e) {
        console.log('[v0] Blocked malformed popup:', urlStr);
        return null;
    }
    return originalOpen(url, target, features);
};

const originalFetch = window.fetch;
window.fetch = function(...args) {
    const url = (args[0] || '').toString();
    if (isAdUrl(url)) {
        console.log('[v0] Blocked fetch:', url);
        return Promise.resolve(new Response('blocked', { status: 200 }));
    }
    return originalFetch.apply(this, args);
};

const originalXHR = XMLHttpRequest.prototype.open;
XMLHttpRequest.prototype.open = function(method, url, ...rest) {
    if (isAdUrl(url)) {
        console.log('[v0] Blocked XHR:', url);
        this.send = () => {};
        return;
    }
    return originalXHR.apply(this, [method, url, ...rest]);
};

const originalCreateElement = document.createElement.bind(document);
document.createElement = function(tagName) {
    const el = originalCreateElement(tagName);
    if (tagName.toLowerCase() === 'script' || tagName.toLowerCase() === 'iframe') {
        const origSetAttr = el.setAttribute.bind(el);
        el.setAttribute = function(name, value) {
            if ((name === 'src' || name === 'href') && isAdUrl(value)) {
                console.log('[v0] Blocked injected ' + tagName + ':', value);
                return;
            }
            return origSetAttr(name, value);
        };
        Object.defineProperty(el, 'src', {
            set: function(val) {
                if (isAdUrl(val)) {
                    console.log('[v0] Blocked ' + tagName + ' src:', val);
                    return;
                }
                origSetAttr('src', val);
            },
            get: function() { return el.getAttribute('src'); }
        });
    }
    return el;
};

window.addEventListener('beforeunload', e => { e.stopImmediatePropagation(); }, true);

const COVER_URL  = "https://cdn.jsdelivr.net/gh/gn-math/covers@main";
const HTML_URL   = "https://cdn.jsdelivr.net/gh/gn-math/html@main";
const CKV_URL    = "https://cdn.jsdelivr.net/gh/WanoCapy/ChickenKingsVault@main";
const CKV_ICONS_URL = "https://raw.githubusercontent.com/carbonicality/ChickenKingsVault/main";
const HYDRA_URL  = "https://cdn.jsdelivr.net/gh/Hydra-Network/hydra-assets@main";

let allGames   = [];
let activeLetter = null;

async function fetchGnMath() {
    try {
        let zonesUrl = `${HTML_URL.replace('/html@','/assets@')
            .replace('cdn.jsdelivr.net/gh/gn-math/html','cdn.jsdelivr.net/gh/gn-math/assets')}/zones.json`;
        zonesUrl = "https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json";
        try {
            const shaRes = await fetch("https://api.github.com/repos/gn-math/assets/commits?t=" + Date.now());
            if (shaRes.ok) {
                const shaJson = await shaRes.json();
                if (shaJson[0] && shaJson[0].sha) {
                    zonesUrl = `https://cdn.jsdelivr.net/gh/gn-math/assets@${shaJson[0].sha}/zones.json`;
                }
            }
        } catch (_) {}

        const res = await fetch(zonesUrl + "?t=" + Date.now());
        if (!res.ok) return [];
        const zones = await res.json();

        return zones
            .filter(z => z.id !== -1 && z.id !== 1 && z.id !== 64 && z.name && z.url)
            .map(z => {
                let url = z.url
                    .replace("{HTML_URL}", HTML_URL)
                    .replace("{COVER_URL}", COVER_URL);
                if (z.id === 0) {
                    url = "https://cdn.jsdelivr.net/gh/bubbls/youtube-playables@main/bowmasters/index.html";
                }
                const cover = z.cover
                    ? z.cover.replace("{COVER_URL}", COVER_URL).replace("{HTML_URL}", HTML_URL)
                    : null;
                return { name: z.name, cover, url, src: 'gnmath' };
            });
    } catch (e) {
        return [];
    }
}

async function fetchCKV() {
    try {
        const iconMap = {};
        try {
            const iconRes = await fetch(`${CKV_ICONS_URL}/games.json?t=${Date.now()}`);
            if (iconRes.ok) {
                const iconJson = await iconRes.json();
                iconJson.forEach(g => {
                    const key = g.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                    iconMap[key] = `${CKV_ICONS_URL}/${g.img}`;
                });
            }
        } catch (_) {}

        const res = await fetch("https://api.github.com/repos/WanoCapy/ChickenKingsVault/contents/");
        if (!res.ok) return [];
        const json = await res.json();

        let htmlFiles = json.filter(f => f.type === 'file' && f.name.endsWith('.html') && f.name !== 'index.html');
        const pretty = htmlFiles.filter(f => /[A-Z\s]/.test(f.name));
        if (pretty.length > 0) htmlFiles = pretty;

        return htmlFiles.map(f => {
            const normKey = f.name.replace('.html', '').toLowerCase().replace(/[^a-z0-9]/g, '');
            return {
                name: f.name.replace('.html', ''),
                cover: iconMap[normKey] || null,
                url: `${CKV_URL}/${f.name}`,
                src: 'ckv'
            };
        });
    } catch (e) {
        return [];
    }
}

async function fetchHydra() {
    try {
        const res = await fetch(`${HYDRA_URL}/gmes.json?t=${Date.now()}`);
        if (!res.ok) return [];
        const json = await res.json();
        return json.map(g => ({
            name: g.title,
            cover: g.thumb ? `${HYDRA_URL}/${g.thumb}` : null,
            url: `${HYDRA_URL}/gmes/${g.file_name}`,
            src: 'hydra'
        }));
    } catch (e) {
        return [];
    }
}

async function loadAllGames() {
    const [gnmath, ckv, hydra] = await Promise.all([fetchGnMath(), fetchCKV(), fetchHydra()]);
    const combined = [...gnmath, ...ckv, ...hydra];

    const seen = new Set();
    const unique = [];
    combined.forEach(g => {
        const key = g.name.toLowerCase().trim();
        if (!seen.has(key)) { seen.add(key); unique.push(g); }
    });

    unique.sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));
    return unique;
}

function groupByLetter(games) {
    const map = {};
    games.forEach(g => {
        const ch = g.name.charAt(0).toUpperCase();
        const letter = /[A-Z]/.test(ch) ? ch : '#';
        if (!map[letter]) map[letter] = [];
        map[letter].push(g);
    });
    return map;
}

function buildCard(game) {
    const card = document.createElement('div');
    card.className = 'game-card';

    const wrap = document.createElement('div');
    wrap.className = 'cover-wrap';

    if (game.cover) {
        const img = document.createElement('img');
        img.className = 'cover-img';
        img.src = game.cover;
        img.alt = game.name;
        img.loading = 'lazy';
        img.onerror = () => {
            wrap.innerHTML = '<div class="cover-missing">missing</div>';
        };

        card.addEventListener('mousemove', e => {
            const r = card.getBoundingClientRect();
            const px = (e.clientX - r.left) / r.width;   
            const py = (e.clientY - r.top)  / r.height;  
            const shift = 9;
            const tx = (0.5 - px) * shift * 2;
            const ty = (0.5 - py) * shift * 2;
            img.style.transform = `scale(1.18) translate(${tx}%, ${ty}%)`;
        });

        card.addEventListener('mouseleave', () => {
            img.style.transform = 'scale(1)';
        });

        wrap.appendChild(img);
    } else {
        wrap.innerHTML = '<div class="cover-missing">missing</div>';
    }

    const title = document.createElement('div');
    title.className = 'game-title-overlay';
    title.textContent = game.name;

    card.appendChild(wrap);
    card.appendChild(title);
    card.addEventListener('click', () => openGame(game));
    return card;
}

function renderGames(games) {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = '';

    if (games.length === 0) {
        grid.innerHTML = '<div class="state-msg">No games found.</div>';
        buildAlphaNav(new Set());
        return;
    }

    const grouped = groupByLetter(games);
    const letters = Object.keys(grouped).sort((a, b) => {
        if (a === '#') return -1;
        if (b === '#') return 1;
        return a.localeCompare(b);
    });

    buildAlphaNav(new Set(letters));

    letters.forEach(letter => {
        const hdr = document.createElement('div');
        hdr.className = 'letter-header';
        hdr.id = `sec-${letter}`;
        hdr.dataset.letter = letter;
        hdr.textContent = letter;
        grid.appendChild(hdr);

        grouped[letter].forEach(game => grid.appendChild(buildCard(game)));
    });
}

function buildAlphaNav(available) {
    const nav = document.getElementById('alphaNav');
    const chars = ['#', ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'];
    nav.innerHTML = chars.map(l => {
        const has = available.has(l);
        return `<div class="alpha-letter${has ? '' : ' no-games'}" data-letter="${l}">${l}</div>`;
    }).join('');

    nav.querySelectorAll('.alpha-letter:not(.no-games)').forEach(el => {
        el.addEventListener('click', () => jumpTo(el.dataset.letter));
    });
}

function jumpTo(letter) {
    const sec = document.getElementById(`sec-${letter}`);
    if (!sec) return;
    const top = sec.getBoundingClientRect().top + window.scrollY - 68;
    window.scrollTo({ top, behavior: 'smooth' });
}

function onScroll() {
    const headers = document.querySelectorAll('.letter-header');
    let current = null;
    headers.forEach(h => {
        if (h.getBoundingClientRect().top <= 90) current = h.dataset.letter;
    });
    if (current && current !== activeLetter) {
        activeLetter = current;
        document.querySelectorAll('.alpha-letter').forEach(el => {
            el.classList.toggle('active', el.dataset.letter === current);
        });
    }
}

window.addEventListener('scroll', onScroll, { passive: true });

async function openGame(game) {
    const overlay = document.getElementById('gameOverlay');
    const frame   = document.getElementById('gameFrame');
    const backBtn = document.getElementById('backBtn');

    try {
        if (game.url.includes('cdn.jsdelivr.net')) {
            const res = await fetch(game.url);
            const html = await res.text();
            frame.removeAttribute('src');
            frame.contentDocument.open();
            frame.contentDocument.write(html);
            frame.contentDocument.close();
        } else {
            frame.src = game.url;
        }
    } catch (_) {
        frame.src = game.url;
    }

    overlay.classList.add('open');
    backBtn.classList.add('open');
    document.body.classList.add('in-game');
}

function closeGame() {
    const overlay = document.getElementById('gameOverlay');
    const frame   = document.getElementById('gameFrame');
    const backBtn = document.getElementById('backBtn');

    const parent = frame.parentNode;
    parent.removeChild(frame);
    const newFrame = document.createElement('iframe');
    newFrame.id = 'gameFrame';
    newFrame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups');
    parent.appendChild(newFrame);

    overlay.classList.remove('open');
    backBtn.classList.remove('open');
    document.body.classList.remove('in-game');
}

document.getElementById('backBtnInner').addEventListener('click', closeGame);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGame(); });

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        const q = e.target.value.trim().toLowerCase();
        const filtered = q ? allGames.filter(g => g.name.toLowerCase().includes(q)) : allGames;
        renderGames(filtered);
    }, 140);
});

(async () => {
    allGames = await loadAllGames();
    if (allGames.length === 0) {
        document.getElementById('gamesGrid').innerHTML =
            '<div class="state-msg">Could not load games. Check your connection and refresh.</div>';
        return;
    }
    renderGames(allGames);
})();
</script>
</body>
</html>
