<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ghost Proxy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
    }

    .topbar {
      display: flex;
      align-items: center;
      padding: 10px;
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #333;
      gap: 10px;
    }

    .logo {
      font-weight: bold;
      font-size: 16px;
      color: #00ffcc;
      padding: 0 10px;
    }

    .urlbox {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #2a2a2a;
      color: white;
      font-size: 14px;
    }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #00ccaa;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
      background: white;
    }

    .shortcuts {
      display: flex;
      gap: 10px;
      padding: 8px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .shortcut {
      padding: 6px 10px;
      background: #222;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .shortcut:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">👻 Ghost Proxy</div>

    <button class="btn" onclick="home()">Home</button>
    <button class="btn" onclick="reload()">Reload</button>

    <input id="urlInput" class="urlbox" placeholder="Enter URL (example.com)">
    <button class="btn" onclick="go()">Go</button>
  </div>

  <div class="shortcuts">
    <div class="shortcut" onclick="quick('google.com')">Google</div>
    <div class="shortcut" onclick="quick('youtube.com')">YouTube</div>
    <div class="shortcut" onclick="quick('discord.com')">Discord</div>
    <div class="shortcut" onclick="quick('github.com')">GitHub</div>
  </div>

  <iframe id="frame"></iframe>

  <script>
    const proxy = "https://flux-worker.eclipseservice.workers.dev/";

    function formatUrl(url) {
      if (!url.startsWith("http://") && !url.startsWith("https://")) {
        return "https://" + url;
      }
      return url;
    }

    function go() {
      let input = document.getElementById("urlInput").value.trim();
      if (!input) return;

      let finalUrl = formatUrl(input);
      let proxied = proxy + encodeURIComponent(finalUrl);

      document.getElementById("frame").src = proxied;
    }

    function quick(site) {
      document.getElementById("urlInput").value = site;
      go();
    }

    function reload() {
      let frame = document.getElementById("frame");
      frame.src = frame.src;
    }

    function home() {
      document.getElementById("frame").src = "";
    }

    document.getElementById("urlInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") go();
    });
  </script>

</body>
</html>
