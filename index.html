<!DOCTYPE html>

<title>Ghost Services</title>
<style>
    @font-face {
        font-family: gs;
        src: url(GoogleSans-Regular.ttf);
    }

body{
  margin:0;
  font-family:gs, sans-serif;
  background:white;
}

.wrapper{
  width:90%;
  margin:40px auto 0 auto; 
}

.textabove{
  display:flex;
  align-items:center;
  font-size:48px;
  font-weight:600;
  margin-bottom:40px;
}

.wordbox{
  height:1.2em; 
  overflow:hidden;
  display:inline-block;
  vertical-align:bottom;
  position:relative;
}

.words{
  display:flex;
  flex-direction:column;
  transition: transform 0.5s ease;
}

.words span{
  height:1.2em;
  display:flex;
  align-items:center;
  color: #6b46ff;
}

.carousel{
  width:100%;
  overflow:hidden;
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
  -webkit-mask-repeat: no-repeat;
  -webkit-mask-size: cover;

  mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
  mask-repeat: no-repeat;
  mask-size: cover;
}

.track{
  display:flex;
  align-items:center;
  gap:60px;
  width:max-content;
  animation:scroll 45s linear infinite;
}

.logo{
  width:100px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.logo img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  filter: grayscale(100%) brightness(.75);
  opacity: .6;
  transition: filter 0.3s ease, opacity 0.3s ease;
}

.carousel:hover .track {
  animation-play-state: paused;
}

.logo:hover img {
  filter: brightness(0);
  opacity: 1;
}

@keyframes scroll{
  from{ transform:translateX(-50%); }
  to{ transform:translateX(0); }
}
.textabovethatabove {
    display: flex;
    align-items: center; 
}
.textabovethatabove img{
    height: 30px;
    padding-right: 10px;
}
.buttons button {
    background-color: white;
    border: 1px solid rgb(167, 167, 167);
    font-family: gs;
    padding: 7px 20px 7px 20px;
    margin-top: 50px;
    border-radius: 50px;
    font-size: 20px;
    cursor: pointer;
    transition: 0.3s all ease;
}
.buttons button:hover {
    background-color: #6b46ff;
    color: white;
    border: 1px solid white;
}

<script>
const container = document.getElementById('wordsContainer');
const words = Array.from(container.children);
container.appendChild(words[0].cloneNode(true));

let index = 0;

function nextWord() {
  index++;
  container.style.transition = 'transform 0.5s ease';
  container.style.transform = `translateY(-${index * 1.2}em)`;
  if(index >= words.length){
    setTimeout(() => {
      container.style.transition = 'none';
      container.style.transform = 'translateY(0)';
      index = 0;
    }, 500);
  }
}
setInterval(nextWord, 1000);
</script>
