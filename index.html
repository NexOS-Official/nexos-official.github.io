<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Services</title>

<style>

@font-face{
  font-family:gs;
  src:url(GoogleSans-Regular.ttf);
}

body{
  margin:0;
  font-family:gs,sans-serif;
  background:white;
  animation:fadein .6s ease;
}

@keyframes fadein{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.wrapper{
  width:90%;
  max-width:1200px;
  margin:80px auto;
}

.textabovethatabove{
  display:flex;
  align-items:center;
}

.textabovethatabove img{
  height:32px;
  padding-right:12px;
}

.textabovethatabove h1{
  font-size:32px;
  font-weight:600;
  letter-spacing:-0.5px;
}

.textabove{
  display:flex;
  align-items:center;
  font-size:48px;
  font-weight:600;
  letter-spacing:-1px;
  margin-bottom:40px;
}

.wordbox{
  height:1.2em;
  overflow:hidden;
  display:inline-block;
  vertical-align:bottom;
  position:relative;
}

.words{
  display:flex;
  flex-direction:column;
  transition:transform .5s ease;
}

.words span{
  height:1.2em;
  display:flex;
  align-items:center;

  background:linear-gradient(90deg,#6b46ff,#a07aff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.carousel{
  width:100%;
  overflow:hidden;

  -webkit-mask-image:linear-gradient(
    to right,
    transparent,
    black 8%,
    black 92%,
    transparent
  );

  mask-image:linear-gradient(
    to right,
    transparent,
    black 8%,
    black 92%,
    transparent
  );
}

.track{
  display:flex;
  align-items:center;
  gap:60px;
  width:max-content;
  animation:scroll 70s linear infinite;
}

.logo{
  width:100px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.logo img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;

  filter:grayscale(100%) brightness(.75);
  opacity:.6;

  transition:.3s ease;
}

.carousel:hover .track{
  animation-play-state:paused;
}

.logo:hover img{
  filter:brightness(0);
  opacity:1;
}

@keyframes scroll{
  from{transform:translateX(-50%);}
  to{transform:translateX(0);}
}

.buttons{
  margin-top:50px;
}

.buttons button{
  background:white;
  border:1px solid #ddd;
  font-family:gs;
  padding:10px 26px;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
  transition:all .25s ease;
  box-shadow:0 2px 6px rgba(0,0,0,.04);
  margin-right:10px;
}

.buttons button:hover{
  background:#6b46ff;
  color:white;
  border-color:#6b46ff;
  transform:translateY(-2px);
  padding: 10px 50px;
}
.ourtoolsansstuff{
  margin-top:-10px;
  margin-bottom:40px;
  color:#777;
  font-size:18px;
}
.ourtoolsansstuff2 {
  margin-top:-30px;
  margin-bottom:40px;
  color:#000000;
  font-size:18px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="textabovethatabove">
<img src="ghost.svg">
<h1>Ghost Services</h1>
</div>

<p class="ourtoolsansstuff">
Powerful tools for anyone, all for free.
</p>

<div class="textabove">
A tool for&nbsp;

<div class="wordbox">
<div class="words" id="wordsContainer">

<span>Anything</span>
<span>Games</span>
<span>Apps</span>
<span>Music</span>
<span>Students</span>

</div>
</div>
</div>


<div class="carousel">
<div class="track">

<div class="logo"><img src="Untitled (18).png"></div>
<div class="logo"><img src="Untitled (19).png"></div>
<div class="logo"><img src="Untitled (20).png"></div>
<div class="logo"><img src="Untitled (21).png"></div>

<div class="logo"><img src="Untitled (18).png"></div>
<div class="logo"><img src="Untitled (19).png"></div>
<div class="logo"><img src="Untitled (20).png"></div>
<div class="logo"><img src="Untitled (21).png"></div>

<div class="logo"><img src="Untitled (18).png"></div>
<div class="logo"><img src="Untitled (19).png"></div>
<div class="logo"><img src="Untitled (20).png"></div>
<div class="logo"><img src="Untitled (21).png"></div>

<div class="logo"><img src="Untitled (18).png"></div>
<div class="logo"><img src="Untitled (19).png"></div>
<div class="logo"><img src="Untitled (20).png"></div>
<div class="logo"><img src="Untitled (21).png"></div>

<div class="logo"><img src="Untitled (18).png"></div>
<div class="logo"><img src="Untitled (19).png"></div>
<div class="logo"><img src="Untitled (20).png"></div>
<div class="logo"><img src="Untitled (21).png"></div>

</div>
</div>


<div class="buttons">
<button onclick="window.location.href='/login'">Login</button>
<button onclick="window.location.href='/register'">Signup</button>
</div>

</div>


<script>

const container = document.getElementById('wordsContainer');
const words = Array.from(container.children);

container.appendChild(words[0].cloneNode(true));

let index = 0;

function nextWord(){

index++;

container.style.transition = 'transform 0.5s ease';
container.style.transform = `translateY(-${index * 1.2}em)`;

if(index >= words.length){

setTimeout(()=>{

container.style.transition = 'none';
container.style.transform = 'translateY(0)';
index = 0;

},500);

}

}

setInterval(nextWord,2500);

</script>

</body>
</html>
