<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexOS — Loading</title>

    <style>
        @font-face {
            font-family: 'Satoshi';
            src: url('/fonts/Satoshi-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            font-family: 'Satoshi', sans-serif;
            overflow: hidden;
            user-select: none;
            position: relative;
        }

        #main {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2.5px solid #d0d0d0;
            border-top-color: #666666;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-text {
            font-size: 18px;
            color: #000000;
            font-weight: 400;
        }

        #refresh-btn {
            position: absolute;
            bottom: 0;
            padding: 8px 20px 8px 12px;
            font-size: 13px;
            font-family: 'Satoshi', -apple-system, sans-serif;
            color: #444;
            border: none;
            background: #ffffff;
            cursor: default;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 36px;
            border-radius: 10px 10px 0 0;
            position: absolute;
            bottom: 0;
            z-index: 1;
        }

        #refresh-btn::before,
        #refresh-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 12px;
            height: 12px;
            background: transparent;
        }

        #refresh-btn::before {
            content: '';
  position: absolute;
  bottom: 0;
  left: -11.9px;
  width: 12px;
  height: 12px;
  background: #ffffff;
  mask-image: radial-gradient(circle at 0 0, transparent 12px, black 0);
  -webkit-mask-image: radial-gradient(circle at 0 0, transparent 12px, black 0);
        }

        #refresh-btn::after {
            content: '';
  position: absolute;
  bottom: 0;
  right: -12px;
  width: 12px;
  height: 12px;
  background: #ffffff;
  mask-image: radial-gradient(circle at 12px 0, transparent 12px, black 0);
  -webkit-mask-image: radial-gradient(circle at 12px 0, transparent 12px, black 0);
        }

        .tab-favicon {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .tab-favicon svg {
            width: 14px;
            height: 14px;
            color: #5f6368;
        }
    </style>
</head>

<body>
    <div id="main">
        <div class="spinner"></div>
        <div id="loading-text">Your website is loading</div>
    </div>

    <button id="refresh-btn" onclick="location.reload()">
        <span class="tab-favicon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                <path d="M16 21h5v-5"/>
            </svg>
        </span>
        Refresh if proxy refused to load
    </button>

    <script src="uv/uv.bundle.js" charset="UTF-8"></script>
    <script src="uv/uv.config.js" charset="UTF-8"></script>
    <script src="register-sw.js"></script>
    <script src="embed.js"></script>
</body>
</html>
