<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexOS</title>
</head>

<body>
<div id="status">Starting...</div>

<script src="/ixlmath/baremux/index.js"></script>
<script src="/ixlmath/scram/scramjet.all.js"></script>

<script>
(async () => {

const status = document.getElementById("status");

try {

    // -------------------------
    // GET URL
    // -------------------------
    let target = location.hash.slice(1);

    if (!target) {
        status.innerText = "No URL.";
        return;
    }

    if (!target.startsWith("http")) {
        target = "https://" + target;
    }

    document.title = new URL(target).hostname;

    // -------------------------
    // WISP
    // -------------------------
    status.innerText = "Finding server...";

    const wisps = [
        atob("d3NzOi8vd2lzcC5yaHcub25lLw=="),
        atob("d3NzOi8vczBsYWNlLWoybnAub25yZW5kZXIuY29tL3dpc3Av"),
        atob("d3NzOi8vd2lzcC50ZXJiaXVtb24udG9wL3dpc3Av")
    ];

    async function getWisp() {
        for (const url of wisps) {
            try {
                await new Promise((res, rej) => {
                    const ws = new WebSocket(url);
                    const t = setTimeout(() => rej(), 2000);

                    ws.onopen = () => {
                        clearTimeout(t);
                        ws.close();
                        res();
                    };

                    ws.onerror = rej;
                });

                return url;
            } catch {}
        }
        return null;
    }

    const wisp = await getWisp();

    if (!wisp) {
        status.innerText = "No servers.";
        return;
    }

    // -------------------------
    // SERVICE WORKER
    // -------------------------
    status.innerText = "Starting engine...";

    if ('serviceWorker' in navigator) {

        await navigator.serviceWorker.register("/ixlmath/sw.js", {
            scope: "/ixlmath/go/"
        });

        // if not controlling, reload ONCE
        if (!navigator.serviceWorker.controller) {
            location.reload();
            return;
        }
    }

    // -------------------------
    // BAREMUX
    // -------------------------
    status.innerText = "Connecting...";

    if (!window.BareMux) {
        status.innerText = "BareMux missing.";
        return;
    }

    const conn = new BareMux.BareMuxConnection("/ixlmath/baremux/worker.js");

    await conn.setTransport("/ixlmath/libcurl/index.js", [
        { websocket: wisp }
    ]);

    // -------------------------
    // SCRAMJET
    // -------------------------
    status.innerText = "Routing...";

    if (!window.$scramjetLoadController) {
        status.innerText = "Scramjet missing.";
        return;
    }

    const { ScramjetController } = window.$scramjetLoadController();

    const scram = new ScramjetController({
        files: {
            all: "/ixlmath/scram/scramjet.all.js",
            wasm: "/ixlmath/scram/scramjet.wasm.wasm",
            sync: "/ixlmath/scram/scramjet.sync.js"
        },
        prefix: "/ixlmath/go/"
    });

    await scram.init();

    // wait until encode works (important)
    let final;
    for (let i = 0; i < 10; i++) {
        try {
            final = scram.encodeUrl(target);
            if (final) break;
        } catch {}
        await new Promise(r => setTimeout(r, 100));
    }

    if (!final) {
        status.innerText = "Failed.";
        return;
    }

    // -------------------------
    // REDIRECT
    // -------------------------
    window.location.href = final;

} catch (e) {
    console.error(e);
    status.innerText = "Error.";
}

})();
</script>

</body>
</html>
