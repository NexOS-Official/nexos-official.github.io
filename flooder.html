<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Ghost Education | The best go-to learning platform there is.‎</title>
  </head>
  <body>
    <style>
      @font-face {
        font-family: GS;
        src: url(GoogleSans-Regular.ttf);
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: GS;
      }

      .card {
        padding: 50px 60px;
        border-radius: 16px;
        text-align: center;
        max-width: 500px;
        width: 90%;
      }

      h1 {
        font-size: 26px;
        font-weight: 600;
      }

      p {
        opacity: 0.7;
        font-size: 15px;
      }

      button {
        padding: 10px 18px;
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
        font-size: 14px;
        font-family: GS;
        transition: all 0.2s ease;
      }

      img {
        height: 50px;
      }
    </style>
    <div class="card">
      <img src="ghost.svg" alt="">
      <h1 style="text-align:center;">Stay on this tab for faster redirects</h1>
      <p style="text-align:center;">Hey! Did you know this page if doing an average of 5-20 redirects PER-SECOND?</p>
    </div>
    <script>
      const MAX_PAGES = 999999999999999999999999999999999999999999999999999999999999999999999999;
      const DELAY = 0.1;
      const cloaks = [{
        title: "Google",
        icon: "https://www.google.com/favicon.ico"
      }, {
        title: "YouTube",
        icon: "https://www.youtube.com/favicon.ico"
      }, {
        title: "Home | Schoology",
        icon: "https://asset-cdn.schoology.com/sites/all/themes/schoology_theme/favicon.ico"
      }];
      function ARC() {
        const random = cloaks[Math.floor(Math.random() * cloaks.length)];
        document.title = random.title;
        let link = document.querySelector("link[rel='icon']");
        if (!link) {
          link = document.createElement("link");
          link.rel = "icon";
          document.head.appendChild(link);
        }
        link.href = random.icon;
      }
      function SF() {
        let current = parseInt(localStorage.getItem("floodIndex")) || 1;
        ARC();
        if (current >= MAX_PAGES) {
          localStorage.removeItem("floodIndex");
          return;
        }
        localStorage.setItem("floodIndex", current + 1);
        setTimeout(() => {
          window.location.href = "?=" + (current + 1);
        }, DELAY);
      }
      SF();
    </script>
  </body>
</html>
