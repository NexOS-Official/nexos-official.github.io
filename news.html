<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #111;
      color: white;
      padding: 1rem;
      text-align: center;
      font-size: 1.5rem;
    }
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .card-content {
      padding: 15px;
      flex: 1;
    }
    .card-content h3 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }
    .card-content p {
      font-size: 0.9rem;
      color: #555;
    }
    .card-content a {
      display: inline-block;
      margin-top: 10px;
      color: #007bff;
      text-decoration: none;
      font-weight: bold;
    }
    .error {
      text-align: center;
      font-size: 1.2rem;
      color: red;
    }
  </style>
</head>
<body>
  <header>Latest News</header>
  <div class="container" id="news-container"></div>

  <script>
    const API_KEY = "c26424bb346f40f9800f7e188210d7a5";
    const url = `https://newsapi.org/v2/top-headlines?country=us&pageSize=20&apiKey=${API_KEY}`;

    async function fetchNews() {
      const container = document.getElementById("news-container");
      container.innerHTML = "Loading...";

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (!res.ok || data.status !== "ok") {
          throw new Error(data.message || "API error");
        }

        container.innerHTML = "";

        data.articles.forEach(article => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${article.urlToImage || 'https://via.placeholder.com/300x180'}" />
            <div class="card-content">
              <h3>${article.title}</h3>
              <p>${article.description || 'No description available.'}</p>
              <a href="${article.url}" target="_blank">Read more →</a>
            </div>
          `;

          container.appendChild(card);
        });
      } catch (err) {
        console.error("FULL ERROR:", err);
        container.innerHTML = `<div class="error">Failed to load news.<br>${err.message}</div>`;
      }
    }

    fetchNews();
  </script>
</body>
</html>
