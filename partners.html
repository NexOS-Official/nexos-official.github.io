<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Partners</title>

<style>
@font-face {
  font-family: "googlesans";
  src: url("/assets/ghostincimgs/GoogleSans-Regular.ttf") format("truetype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

* {
  box-sizing: border-box;
  font-family: "googlesans", system-ui, sans-serif;
}

body {
  margin: 0;
  background: #fff;
  color: #111;
}

.topbar {
  height: 70px;
  display: flex;
  align-items: center;
  padding: 0 28px;
  border-bottom: 1px solid #eee;
}

.topbar img {
  height: 26px;
}

.wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 28px 80px;
}

h1 {
  font-size: 30px;
  margin: 0;
  font-weight: 600;
}

.subtitle {
  margin-top: 8px;
  font-size: 14px;
  color: #555;
}

.section {
  margin-top: 40px;
  padding-top: 28px;
  border-top: 1px solid #eee;
}

.PGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.PCard {
  border: 1px solid #eee;
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: 0.15s;
  text-decoration: none;
  color: inherit;
  background: white;
}

.PCard:hover {
  border-color: #ddd;
}

.PLogo {
  height: 40px;
  width: auto;
  margin-bottom: 14px;
}

.PName {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
}

.PBio {
  font-size: 13px;
  color: #666;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="topbar">
  <img src="/assets/ghostincimgs/ghost_dark_logo.svg" />
</div>

<div class="wrap">

<h1>Partners</h1>
<p class="subtitle">Projects and sites we collaborate with.</p>

<div class="section">

<div class="PGrid">

<a class="PCard" href="https://bestspark.onrender.com/" target="_blank">
  <img class="PLogo" src="bss.webp" />
  <div class="PName">BestSpark Games</div>
  <div class="PBio">
    Enjoy games.
  </div>
</a>

</div>

</div>

</div>

</body>
</html>
